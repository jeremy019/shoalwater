<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shoal">
<meta name="theme-color" content="#0B1A24">
<title>Shoal</title>
<style>
  :root{
    --ink:#0B1A24; --foam:#7FF0D8; --lamp:#FFC46B; --kelp:#1C6B63; --salt:#E8F4F2;
    --display: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    height:100%; width:100%; overflow:hidden; background:var(--ink); color:var(--salt);
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent; overscroll-behavior:none; touch-action:none;
  }
  #c{
    position:fixed; inset:0; display:block; touch-action:none;
    image-rendering:pixelated; image-rendering:-webkit-optimize-contrast;
  }

  /* joystick */
  #stick{
    position:fixed; z-index:5;
    right:calc(env(safe-area-inset-right,0px) + 22px);
    bottom:calc(env(safe-area-inset-bottom,0px) + 30px);
    width:122px; height:122px; border-radius:50%;
    border:1px solid rgba(232,244,242,.22);
    background:rgba(11,26,36,.3);
    backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
    touch-action:none;
  }
  #knob{
    position:absolute; left:50%; top:50%; width:50px; height:50px;
    margin:-25px 0 0 -25px; border-radius:50%;
    border:1px solid rgba(127,240,216,.5);
    background:rgba(127,240,216,.14);
    transition:background .2s;
  }
  #stick.on #knob{ background:rgba(127,240,216,.28); }

  /* what you just touched */
  #name{
    position:fixed; z-index:6; left:0; right:0;
    bottom:calc(env(safe-area-inset-bottom,0px) + 172px);
    text-align:center; pointer-events:none;
    font-family:var(--display); font-style:italic; font-size:1.5rem;
    opacity:0; text-shadow:0 0 22px currentColor;
  }
  #name.show{ animation:nm 2s cubic-bezier(.16,1,.3,1) forwards; }
  @keyframes nm{
    0%{opacity:0; transform:translateY(8px);}
    14%{opacity:1; transform:translateY(0);}
    66%{opacity:1; transform:translateY(0);}
    100%{opacity:0; transform:translateY(-10px);}
  }

  #hud{
    position:fixed; z-index:5; left:calc(env(safe-area-inset-left,0px) + 20px);
    bottom:calc(env(safe-area-inset-bottom,0px) + 34px);
    font-family:var(--mono); font-size:.58rem; letter-spacing:.18em;
    text-transform:uppercase; color:rgba(232,244,242,.34);
    pointer-events:none; line-height:2;
  }

  #start{
    position:fixed; inset:0; z-index:20; background:var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 34px; transition:opacity 1s ease;
  }
  #start.gone{ opacity:0; pointer-events:none; }
  #start h1{
    font-family:var(--display); font-weight:400; font-size:clamp(2.8rem,15vw,4.2rem);
    letter-spacing:-.02em; color:var(--lamp); text-shadow:0 0 60px rgba(255,196,107,.3);
  }
  #start .rule{ width:52px; height:1px; background:var(--kelp); margin:24px 0 22px; }
  #start p{
    font-family:var(--display); font-size:1rem; line-height:1.65;
    color:rgba(232,244,242,.7); text-align:center; max-width:19rem;
  }
  #go{
    margin-top:38px; padding:15px 42px; background:transparent; color:var(--lamp);
    border:1px solid rgba(255,196,107,.4); border-radius:999px;
    font-family:var(--display); font-size:1.05rem; letter-spacing:.06em;
    cursor:pointer; -webkit-appearance:none;
  }
  #go:active{ background:rgba(255,196,107,.12); }
  #go:focus-visible{ outline:2px solid var(--lamp); outline-offset:4px; }
  #load{
    position:absolute; bottom:calc(env(safe-area-inset-bottom,0px) + 30px);
    font-family:var(--mono); font-size:.6rem; letter-spacing:.2em;
    text-transform:uppercase; color:var(--kelp);
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="name"></div>
<div id="hud">drag to look<br>tap what you see</div>
<div id="stick"><div id="knob"></div></div>

<div id="start">
  <h1>Shoal</h1>
  <div class="rule"></div>
  <p>A beach that plays itself. Walk with the stick, look by dragging, and touch anything you find.</p>
  <button id="go" disabled>Loading</button>
  <div id="load">Fetching three.js</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

"use strict";
(function(){

  document.getElementById('load').textContent = 'three.js failed to load — check connection';
  return;
}
document.getElementById('go').disabled = false;
document.getElementById('go').textContent = 'Walk in';
document.getElementById('load').textContent = 'Sound begins on touch';

/* ══════════════════════════════════════════════════════════════
   WAVETABLES
   Each entry is {real:[…], imag:[…]} — exactly what
   createPeriodicWave() takes, and exactly what the extractor
   spits out. To use your own Zebra2 renders, paste over any of
   these. The defaults below are placeholders.
   ══════════════════════════════════════════════════════════════ */
function spectrum(f, K){
  K = K || 48;
  const real = [0], imag = [0];
  for(let k=1;k<=K;k++){ real.push(0); imag.push(f(k)); }
  return { real:real, imag:imag };
}
const WAVETABLES = {
  // wide and warm — a slow sunlit chord
  sun:   spectrum(function(k){ return Math.pow(k,-1.35) * (k%2===1 ? 1 : 0.62); }),
  // almost nothing above the fundamental — a swell you feel
  ocean: spectrum(function(k){ return Math.pow(k,-2.1) * (k<9 ? 1 : 0.15); }),
  // thin, breathy, top-heavy
  cloud: spectrum(function(k){ return Math.pow(k,-0.85) * Math.exp(-Math.pow((k-9)/11,2)); }),
  // hollow and woody, odd harmonics
  palm:  spectrum(function(k){ return k%2===1 ? Math.pow(k,-1.05) : Math.pow(k,-2.6)*0.4; }),
  // blunt, low, fast to die
  rock:  spectrum(function(k){ return k<=3 ? Math.pow(k,-1.6) : Math.pow(k,-3.2); }),
  // sparse inharmonic partials — a struck bell
  shell: spectrum(function(k){
    const parts = [1,3,5,8,13,19,27];
    let v = 0;
    for(let i=0;i<parts.length;i++) if(k===parts[i]) v = Math.pow(i+1,-1.15);
    return v;
  })
};

/* how each kind of thing behaves when touched */

  shell: { semis: 19, dur:4.0, atk:0.010,cut:6500, q:1.0, gain:0.15, roll: 14 }
};
const LABEL = { sun:'the sun', ocean:'the water', cloud:'a cloud',
                palm:'a palm', rock:'a stone', shell:'a shell' };
const ROOT  = 50;                       // D3
const DEG   = [0,5,7,10,14,17,19,22];   // D G A C E — no third, so nothing
                                        // fights the track's F#
function mtof(m){ return 440*Math.pow(2,(m-69)/12); }

function impulse(sec, decay){
  const n = Math.floor(ac.sampleRate*sec);
  const b = ac.createBuffer(2, n, ac.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d = b.getChannelData(ch);
    for(let i=0;i<n;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/n, decay);
  }
  return b;
}

function initAudio(){
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return false;
  ac = new AC();

  master = ac.createGain(); master.gain.value = 0.0001;
  const comp = ac.createDynamicsCompressor();
  comp.threshold.value=-15; comp.knee.value=24; comp.ratio.value=5;
  comp.attack.value=0.005; comp.release.value=0.3;
  master.connect(comp); comp.connect(ac.destination);
  master.gain.setTargetAtTime(0.9, ac.currentTime, 0.7);

  const conv = ac.createConvolver(); conv.buffer = impulse(4.2, 2.2);
  const lvl = ac.createGain(); lvl.gain.value = 0.6;
  verbIn = ac.createGain();
  verbIn.connect(conv); conv.connect(lvl); lvl.connect(master);

  for(const k in WAVETABLES){
    const w = WAVETABLES[k];
    waves[k] = ac.createPeriodicWave(
      Float32Array.from(w.real), Float32Array.from(w.imag),
      { disableNormalization:false });
  }

  /* the surf never stops — filtered noise, breathing */
  const n = ac.createBuffer(1, ac.sampleRate*5, ac.sampleRate);
  const d = n.getChannelData(0);
  let last = 0;
  for(let i=0;i<d.length;i++){
    const white = Math.random()*2-1;
    last = last*0.86 + white*0.14;          // brown-ish, softer than white
    d[i] = last*3.2;
  }
  const src = ac.createBufferSource();
  src.buffer = n; src.loop = true;
  const bp = ac.createBiquadFilter();
  bp.type='bandpass'; bp.frequency.value=520; bp.Q.value=0.55;
  surfGain = ac.createGain(); surfGain.gain.value = 0.055;
  src.connect(bp); bp.connect(surfGain); surfGain.connect(master);
  const sv = ac.createGain(); sv.gain.value = 0.5;
  surfGain.connect(sv); sv.connect(verbIn);

  const lfo = ac.createOscillator(); lfo.type='sine'; lfo.frequency.value = 0.085;
  const lg = ac.createGain(); lg.gain.value = 260;
  lfo.connect(lg); lg.connect(bp.frequency); lfo.start();
  const lfo2 = ac.createOscillator(); lfo2.type='sine'; lfo2.frequency.value = 0.055;
  const lg2 = ac.createGain(); lg2.gain.value = 0.045;
  lfo2.connect(lg2); lg2.connect(surfGain.gain); lfo2.start();
  src.start();

  /* the track, under everything, looping forever */
  bedGain = ac.createGain(); bedGain.gain.value = 0.0001;
  bedGain.connect(master);
  const bs = ac.createGain(); bs.gain.value = 0.3;
  bedGain.connect(bs); bs.connect(verbIn);
  fetch(BED).then(function(r){ return r.arrayBuffer(); })
    .then(function(ab){
      return new Promise(function(res, rej){
        const p = ac.decodeAudioData(ab, res, rej);
        if(p && p.then) p.then(res, rej);
      });
    })
    .then(function(buf){
      const s = ac.createBufferSource();
      s.buffer = buf; s.loop = true;
      s.connect(bedGain); s.start();
      bedGain.gain.setTargetAtTime(0.42, ac.currentTime, 2.5);
    })
    .catch(function(){ /* no bed, the surf still carries it */ });

  /* a very quiet floor under everything */
  [55, 55.4].forEach(function(f){
    const o = ac.createOscillator(); o.type='sine'; o.frequency.value=f;
    const g = ac.createGain(); g.gain.value=0.028;
    o.connect(g); g.connect(master); o.start();
  });
  return true;
}

let voices = 0;
function touchSound(kind, pos, degree){
  if(!ready || voices > 14) return;
  const P = PATCH[kind], t = ac.currentTime + 0.01;
  voices++;

  const o = ac.createOscillator();
  o.setPeriodicWave(waves[kind]);
  o.frequency.value = mtof(ROOT + P.semis + DEG[degree % DEG.length]);

  const f = ac.createBiquadFilter();
  f.type='lowpass'; f.Q.value=P.q;
  f.frequency.setValueAtTime(P.cut*0.35, t);
  f.frequency.linearRampToValueAtTime(P.cut, t + Math.max(P.atk, 0.12));
  f.frequency.exponentialRampToValueAtTime(P.cut*0.3, t + P.dur);

  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(P.gain, t + P.atk);
  g.gain.exponentialRampToValueAtTime(0.0001, t + P.dur);

  const p = ac.createPanner();
  p.panningModel = 'HRTF';
  p.distanceModel = 'inverse';
  p.refDistance = P.roll;
  p.maxDistance = 900;
  p.rolloffFactor = 1;
  if(p.positionX){
    p.positionX.value = pos.x; p.positionY.value = pos.y; p.positionZ.value = pos.z;
  } else { p.setPosition(pos.x, pos.y, pos.z); }

  o.connect(f); f.connect(g); g.connect(p); p.connect(master);
  const s = ac.createGain(); s.gain.value = 0.5; p.connect(s); s.connect(verbIn);

  o.start(t); o.stop(t + P.dur + 0.1);
  o.onended = function(){ voices--; };
}

function updateListener(cam){
  if(!ac) return;
  const l = ac.listener;
  const f = new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
  const u = new THREE.Vector3(0,1, 0).applyQuaternion(cam.quaternion);
  if(l.positionX){
    const t = ac.currentTime;
    l.positionX.setTargetAtTime(cam.position.x, t, 0.02);
    l.positionY.setTargetAtTime(cam.position.y, t, 0.02);
    l.positionZ.setTargetAtTime(cam.position.z, t, 0.02);
    l.forwardX.setTargetAtTime(f.x, t, 0.02);
    l.forwardY.setTargetAtTime(f.y, t, 0.02);
    l.forwardZ.setTargetAtTime(f.z, t, 0.02);
    l.upX.setTargetAtTime(u.x, t, 0.02);
    l.upY.setTargetAtTime(u.y, t, 0.02);
    l.upZ.setTargetAtTime(u.z, t, 0.02);
  } else {
    l.setPosition(cam.position.x, cam.position.y, cam.position.z);
    l.setOrientation(f.x,f.y,f.z, u.x,u.y,u.z);
  }
}

/* ══════════════════════════════════════════════════════════════
   PS1 SHADERS
   vertex snapping · affine texture mapping · per-vertex light
   per-vertex fog · 5-bit ordered dither · no filtering
   ══════════════════════════════════════════════════════════════ */
const FOG_COL  = new THREE.Color(0.906, 0.741, 0.522);
const FOG_NEAR = 34, FOG_FAR = 330;
const SUN_DIR  = new THREE.Vector3(0.05, 0.42, -1).normalize();

const COMMON_V = [
  'uniform vec2 uRes;',
  'uniform float uTime;',
  'uniform float uJitter;',
  'varying vec2 vUv;',
  'varying float vW;',
  'varying float vFog;',
  'varying float vLit;',
  'vec4 ps1(vec4 clip){',
  '  vec2 grid = uRes * 0.5;',
  '  vec2 snapped = floor(clip.xy / clip.w * grid + 0.5) / grid * clip.w;',
  '  clip.xy = mix(clip.xy, snapped, uJitter);',
  '  return clip;',
  '}'
].join('\n');

const COMMON_F = [
  'uniform sampler2D uMap;',
  'uniform float uTime;',
  'uniform vec3 uFogCol;',
  'uniform vec3 uTint;',
  'uniform float uCut;',
  'uniform float uFlash;',
  'varying vec2 vUv;',
  'varying float vW;',
  'varying float vFog;',
  'varying float vLit;',
  'float bayer2(vec2 a){ a = floor(a); return fract(dot(a, vec2(0.5, a.y*0.75))); }',
  'float bayer4(vec2 a){ return bayer2(0.5*a)*0.25 + bayer2(a); }',
  'vec3 crush(vec3 c){',
  '  float d = bayer4(gl_FragCoord.xy) / 0.9375;',
  '  return floor(c * 31.0 + d) / 31.0;',
  '}'
].join('\n');

function ps1Material(opts){
  const o = opts || {};
  const uni = {
    uMap:    { value: o.map || null },
    uRes:    { value: new THREE.Vector2(320,240) },
    uTime:   { value: 0 },
    uJitter: { value: o.jitter === undefined ? 1.0 : o.jitter },
    uFogCol: { value: FOG_COL },
    uTint:   { value: o.tint || new THREE.Color(1,1,1) },
    uCut:    { value: o.cutout === undefined ? -1.0 : o.cutout },
    uFlash:  { value: 0 },
    uFogNear:{ value: FOG_NEAR },
    uFogFar: { value: o.fogFar || FOG_FAR },
    uSun:    { value: SUN_DIR },
    uAmb:    { value: o.ambient === undefined ? 0.55 : o.ambient }
  };
  const m = new THREE.ShaderMaterial({
    uniforms: uni,
    vertexShader: [
      COMMON_V,
      'uniform float uFogNear; uniform float uFogFar; uniform vec3 uSun; uniform float uAmb;',
      o.vertexHead || '',
      'void main(){',
      '  vec3 p = position;',
      '  vec3 n = normal;',
      o.vertexBody || '',
      '  vec4 mv = modelViewMatrix * vec4(p, 1.0);',
      '  vec4 cl = ps1(projectionMatrix * mv);',
      '  vec3 wn = normalize(mat3(modelMatrix) * n);',
      '  vLit = uAmb + (1.0 - uAmb) * max(dot(wn, uSun), 0.0);',
      '  vFog = clamp((-mv.z - uFogNear) / (uFogFar - uFogNear), 0.0, 1.0);',
      '  vUv = uv * cl.w;',
      '  vW  = cl.w;',
      '  gl_Position = cl;',
      '}'
    ].join('\n'),
    fragmentShader: [
      COMMON_F,
      o.fragHead || '',
      'void main(){',
      '  vec2 uv = vUv / vW;',
      o.fragBody || '  vec4 tex = texture2D(uMap, uv);',
      '  if(uCut > 0.0 && tex.a < uCut) discard;',
      '  vec3 col = tex.rgb * uTint * vLit;',
      '  col += uFlash * vec3(1.0, 0.86, 0.6);',
      '  col = mix(col, uFogCol, vFog);',
      '  gl_FragColor = vec4(crush(col), tex.a);',
      '}'
    ].join('\n'),
    transparent: !!o.transparent,
    side: o.side || THREE.FrontSide,
    depthWrite: o.depthWrite === undefined ? true : o.depthWrite
  });
  m.userData.uni = uni;
  return m;
}

const allMats = [];
function reg(m){ allMats.push(m); return m; }

/* ══════════════════════════════════════════════════════════════
   PROCEDURAL TEXTURES — small, unfiltered, period-correct
   ══════════════════════════════════════════════════════════════ */
function tex(size, draw){
  const c = document.createElement('canvas');
  c.width = c.height = size;
  draw(c.getContext('2d'), size);
  const t = new THREE.CanvasTexture(c);
  t.magFilter = THREE.NearestFilter;
  t.minFilter = THREE.NearestFilter;
  t.generateMipmaps = false;
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}
function rnd(a,b){ return a + Math.random()*(b-a); }

const T = {};
T.sand = tex(64, function(g,s){
  g.fillStyle = '#d8bd8e'; g.fillRect(0,0,s,s);
  for(let i=0;i<1500;i++){
    const v = rnd(-26, 22);
    g.fillStyle = 'rgba(' + (216+v|0) + ',' + (189+v|0) + ',' + (142+v|0) + ',.85)';
    g.fillRect(rnd(0,s)|0, rnd(0,s)|0, 1, 1);
  }
  for(let i=0;i<26;i++){
    g.fillStyle = 'rgba(150,124,86,.3)';
    g.fillRect(rnd(0,s)|0, rnd(0,s)|0, rnd(1,3)|0, 1);
  }
});
T.water = tex(64, function(g,s){
  g.fillStyle = '#1c5566'; g.fillRect(0,0,s,s);
  for(let y=0;y<s;y++){
    const b = Math.sin(y*0.42)*0.5 + Math.sin(y*0.13)*0.5;
    g.fillStyle = 'rgba(120,200,205,' + (0.05 + Math.max(0,b)*0.15) + ')';
    g.fillRect(0,y,s,1);
  }
  for(let i=0;i<220;i++){
    g.fillStyle = 'rgba(190,235,230,.16)';
    g.fillRect(rnd(0,s)|0, rnd(0,s)|0, rnd(1,4)|0, 1);
  }
});
T.bark = tex(32, function(g,s){
  g.fillStyle = '#6b5334'; g.fillRect(0,0,s,s);
  for(let i=0;i<70;i++){
    g.fillStyle = 'rgba(' + rnd(58,120) + ',' + rnd(44,92) + ',' + rnd(28,58) + ',.75)';
    g.fillRect(rnd(0,s)|0, rnd(0,s)|0, rnd(1,3)|0, rnd(2,7)|0);
  }
  for(let y=0;y<s;y+=5){
    g.fillStyle = 'rgba(40,30,18,.34)'; g.fillRect(0,y,s,1);
  }
});
T.frond = tex(64, function(g,s){
  g.clearRect(0,0,s,s);
  g.strokeStyle = '#3f7a3a'; g.lineWidth = 2;
  g.beginPath(); g.moveTo(2,s/2); g.lineTo(s-2,s/2); g.stroke();
  for(let i=3;i<s-4;i+=3){
    const t = i/s;
    const len = Math.sin(t*Math.PI)*s*0.36;
    g.strokeStyle = 'rgba(' + (52+Math.sin(i)*22|0) + ',' + (118+Math.cos(i*1.3)*26|0) + ',48,1)';
    g.lineWidth = 2;
    g.beginPath(); g.moveTo(i, s/2); g.lineTo(i+4, s/2 - len); g.stroke();
    g.beginPath(); g.moveTo(i, s/2); g.lineTo(i+4, s/2 + len); g.stroke();
  }
});
T.cloud = tex(64, function(g,s){
  g.clearRect(0,0,s,s);
  for(let i=0;i<11;i++){
    const x = rnd(s*0.16, s*0.84), y = rnd(s*0.34, s*0.62), r = rnd(s*0.10, s*0.23);
    const grd = g.createRadialGradient(x,y,0,x,y,r);
    grd.addColorStop(0, 'rgba(255,246,232,.95)');
    grd.addColorStop(0.62,'rgba(246,224,205,.6)');
    grd.addColorStop(1, 'rgba(240,210,190,0)');
    g.fillStyle = grd; g.beginPath(); g.arc(x,y,r,0,6.2832); g.fill();
  }
});
T.rock = tex(32, function(g,s){
  g.fillStyle = '#726a63'; g.fillRect(0,0,s,s);
  for(let i=0;i<300;i++){
    const v = rnd(-30,26);
    g.fillStyle = 'rgba(' + (114+v|0) + ',' + (106+v|0) + ',' + (99+v|0) + ',.9)';
    g.fillRect(rnd(0,s)|0, rnd(0,s)|0, 1, 1);
  }
});
T.shell = tex(32, function(g,s){
  g.fillStyle = '#f0e0cd'; g.fillRect(0,0,s,s);
  for(let i=0;i<9;i++){
    g.strokeStyle = 'rgba(214,168,150,.7)'; g.lineWidth = 1;
    g.beginPath(); g.arc(s/2, s, s*0.14*i, Math.PI, Math.PI*2); g.stroke();
  }
});

function terrainH(x, z){
  if(z < 0.5) return 0;
  let h = Math.sin(x*0.055)*1.15 + Math.cos(z*0.048)*0.95 + Math.sin(x*0.14 + z*0.09)*0.5;
  h += Math.sin(x*0.31 + z*0.22)*0.18;
  return h * Math.min(1, Math.max(0, (z-0.5)/16));
}

/* palms */
function palm(x, z, deg){
  const grp = new THREE.Group();
  const h = rnd(6.5, 9.5);
  const tg = new THREE.CylinderGeometry(0.22, 0.44, h, 6, 5);
  const tp = tg.attributes.position;
  for(let i=0;i<tp.count;i++){
    const t = (tp.getY(i) + h/2)/h;
    tp.setX(i, tp.getX(i) + Math.sin(t*2.1)*t*1.5);
    tp.setZ(i, tp.getZ(i) + Math.cos(t*1.4)*t*0.7);
  }
  tp.needsUpdate = true; tg.computeVertexNormals();
  const trunk = new THREE.Mesh(tg, reg(ps1Material({ map:T.bark, ambient:0.5 })));
  trunk.position.y = h/2;
  grp.add(trunk);

  const topX = Math.sin(2.1)*1.5, topZ = Math.cos(1.4)*0.7;
  const fmat = reg(ps1Material({ map:T.frond, cutout:0.42, transparent:true,
                                 side:THREE.DoubleSide, ambient:0.62 }));
  for(let i=0;i<7;i++){
    const f = new THREE.Mesh(new THREE.PlaneGeometry(7.5, 3.2, 3, 1), fmat);
    const a = (i/7)*Math.PI*2 + rnd(-0.2,0.2);
    f.position.set(topX + Math.cos(a)*3.1, h - 0.3 - rnd(0,0.5), topZ + Math.sin(a)*3.1);
    f.rotation.y = -a;
    f.rotation.z = rnd(-0.55, -0.2);
    grp.add(f);
  }
  grp.position.set(x, terrainH(x,z) - 0.2, z);
  return place(grp, 'palm', deg);
}

/* rocks */
function rock(x, z, r, deg){
  const g = new THREE.IcosahedronGeometry(r, 0);
  const p = g.attributes.position;
  for(let i=0;i<p.count;i++){
    p.setXYZ(i, p.getX(i)*rnd(0.7,1.3), p.getY(i)*rnd(0.55,0.95), p.getZ(i)*rnd(0.7,1.3));
  }
  p.needsUpdate = true; g.computeVertexNormals();
  const m = new THREE.Mesh(g, reg(ps1Material({ map:T.rock, ambient:0.45 })));
  m.position.set(x, terrainH(x,z) + r*0.35, z);
  m.rotation.set(rnd(0,3), rnd(0,3), rnd(0,3));
  return place(m, 'rock', deg);
}

/* shells */
function shell(x, z, deg){
  const g = new THREE.ConeGeometry(0.5, 0.85, 6, 1);
  const m = new THREE.Mesh(g, reg(ps1Material({ map:T.shell, ambient:0.7 })));
  m.position.set(x, terrainH(x,z) + 0.2, z);
  m.rotation.set(Math.PI*0.5, rnd(0,3), rnd(0,3));
  return place(m, 'shell', deg);
}

/* clouds */
const clouds = [];
function cloud(x, y, z, s, deg){
  const cm = reg(ps1Material({ map:T.cloud, cutout:0.05, transparent:true,
                               ambient:1.0, jitter:0.35, depthWrite:false,
                               side:THREE.DoubleSide, fogFar:900 }));
  const m = new THREE.Mesh(new THREE.PlaneGeometry(s, s*0.44), cm);
  m.position.set(x, y, z);
  m.renderOrder = -6;
  clouds.push(m);
  return place(m, 'cloud', deg);
}

(function populate(){
  const palmSpots = [[-30,26],[-14,52],[22,34],[41,60],[-46,74],[9,84],[-24,104],[35,96]];
  palmSpots.forEach(function(s,i){ palm(s[0], s[1], i); });

  const rockSpots = [[-8,14,1.5],[17,9,1.1],[-33,17,2.2],[28,20,1.7],[-52,40,2.6],[48,44,1.9]];
  rockSpots.forEach(function(s,i){ rock(s[0], s[1], s[2], i+2); });

  const shellSpots = [[-4,7],[11,5],[-19,9],[6,12],[-12,4],[23,7]];
  shellSpots.forEach(function(s,i){ shell(s[0], s[1], i+1); });

  for(let i=0;i<16;i++){
    cloud(rnd(-420,420), rnd(70,165), rnd(-560,-90), rnd(70,190), i);
  }
})();

/* ══════════════════════════════════════════════════════════════
   INPUT
   ══════════════════════════════════════════════════════════════ */
let yaw = 0, pitch = -0.02;
const move = { x:0, y:0 };
let stickId = null, lookId = null;
let lookX = 0, lookY = 0, lookMoved = 0, lookAt = 0;

const stick = document.getElementById('stick');
const knob  = document.getElementById('knob');
const R = 44;

function stickSet(t){
  const r = stick.getBoundingClientRect();
  let dx = t.clientX - (r.left + r.width/2);
  let dy = t.clientY - (r.top  + r.height/2);
  const d = Math.hypot(dx,dy);
  if(d > R){ dx = dx/d*R; dy = dy/d*R; }
  knob.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
  move.x = dx/R; move.y = dy/R;
}
function stickClear(){
  knob.style.transform = '';
  move.x = move.y = 0;
  stick.classList.remove('on');
  stickId = null;
}
stick.addEventListener('touchstart', function(e){
  e.preventDefault(); e.stopPropagation();
  const t = e.changedTouches[0];
  stickId = t.identifier; stick.classList.add('on'); stickSet(t);
}, {passive:false});
stick.addEventListener('touchmove', function(e){
  e.preventDefault(); e.stopPropagation();
  for(const t of e.changedTouches) if(t.identifier === stickId) stickSet(t);
}, {passive:false});
['touchend','touchcancel'].forEach(function(ev){
  stick.addEventListener(ev, function(e){
    e.preventDefault(); e.stopPropagation();
    for(const t of e.changedTouches) if(t.identifier === stickId) stickClear();
  }, {passive:false});
});

cv.addEventListener('touchstart', function(e){
  e.preventDefault();
  if(lookId !== null) return;
  const t = e.changedTouches[0];
  lookId = t.identifier; lookX = t.clientX; lookY = t.clientY;
  lookMoved = 0; lookAt = performance.now();
}, {passive:false});
cv.addEventListener('touchmove', function(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier !== lookId) continue;
    const dx = t.clientX - lookX, dy = t.clientY - lookY;
    lookMoved += Math.hypot(dx,dy);
    yaw   -= dx * 0.0042;
    pitch -= dy * 0.0042;
    pitch = Math.max(-1.15, Math.min(0.95, pitch));
    lookX = t.clientX; lookY = t.clientY;
  }
}, {passive:false});
['touchend','touchcancel'].forEach(function(ev){
  cv.addEventListener(ev, function(e){
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier !== lookId) continue;
      if(lookMoved < 12 && performance.now() - lookAt < 380) shoot(t.clientX, t.clientY);
      lookId = null;
    }
  }, {passive:false});
});
document.addEventListener('gesturestart', function(e){ e.preventDefault(); });

/* keyboard + mouse, for building on a laptop */
const keys = {};
addEventListener('keydown', function(e){ keys[e.key.toLowerCase()] = true; });
addEventListener('keyup',   function(e){ keys[e.key.toLowerCase()] = false; });
let md = false, mx = 0, my = 0, mMoved = 0;
cv.addEventListener('mousedown', function(e){ md = true; mx = e.clientX; my = e.clientY; mMoved = 0; });
cv.addEventListener('mousemove', function(e){
  if(!md) return;
  const dx = e.clientX-mx, dy = e.clientY-my;
  mMoved += Math.hypot(dx,dy);
  yaw -= dx*0.0042; pitch -= dy*0.0042;
  pitch = Math.max(-1.15, Math.min(0.95, pitch));
  mx = e.clientX; my = e.clientY;
});
addEventListener('mouseup', function(e){
  if(md && mMoved < 8) shoot(e.clientX, e.clientY);
  md = false;
});

/* ══════════════════════════════════════════════════════════════
   TOUCHING THINGS
   ══════════════════════════════════════════════════════════════ */
const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();
const PRIORITY = { sun:5, cloud:4, shell:3, palm:2, rock:2, ocean:1 };

function owner(o){
  while(o){ if(o.userData && o.userData.kind) return o; o = o.parent; }
  return null;
}

function shoot(cx, cy){
  ndc.x =  (cx / innerWidth)  * 2 - 1;
  ndc.y = -(cy / innerHeight) * 2 + 1;
  ray.setFromCamera(ndc, cam);
  const hits = ray.intersectObjects(targets.concat([ocean]), true);
  let best = null, bestP = -1;
  for(let i=0;i<hits.length;i++){
    const o = owner(hits[i].object);
    if(!o) continue;
    const p = PRIORITY[o.userData.kind] || 0;
    if(p > bestP){ bestP = p; best = o; if(p >= 5) break; }
  }
  if(!best) return;

  const k = best.userData.kind;
  const wp = new THREE.Vector3();
  if(k === 'ocean'){
    for(let i=0;i<hits.length;i++){
      if(owner(hits[i].object) === best){ wp.copy(hits[i].point); break; }
    }
  } else {
    best.getWorldPosition(wp);
  }
  touchSound(k, wp, best.userData.deg);
  best.userData.flash = 1;

  const n = document.getElementById('name');
  n.textContent = LABEL[k];
  n.style.color = k==='sun'   ? '#FFC46B'
                : k==='ocean' ? '#7FF0D8'
                : k==='cloud' ? '#F2DCC4'
                : k==='palm'  ? '#8FD98A'
                : k==='rock'  ? '#C0B6AC' : '#F3D9C8';
  n.classList.remove('show'); void n.offsetWidth; n.classList.add('show');
}

/* ══════════════════════════════════════════════════════════════
   LOOP
   ══════════════════════════════════════════════════════════════ */
const clock = new THREE.Clock();
let bob = 0;

function tick(){
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  /* walk */
  let ix = move.x, iy = move.y;
  if(keys['w']||keys['arrowup'])    iy -= 1;
  if(keys['s']||keys['arrowdown'])  iy += 1;
  if(keys['a']||keys['arrowleft'])  ix -= 1;
  if(keys['d']||keys['arrowright']) ix += 1;
  const mag = Math.min(1, Math.hypot(ix,iy));

  if(mag > 0.04){
    const sp = 12.5 * dt * mag;
    const nx = ix/(Math.hypot(ix,iy)||1), ny = iy/(Math.hypot(ix,iy)||1);
    const fx = -Math.sin(yaw), fz = -Math.cos(yaw);
    const rx =  Math.cos(yaw), rz = -Math.sin(yaw);
    cam.position.x += (fx*(-ny) + rx*nx) * sp;
    cam.position.z += (fz*(-ny) + rz*nx) * sp;
    bob += sp * 0.9;
  }
  cam.position.x = Math.max(-118, Math.min(118, cam.position.x));
  cam.position.z = Math.max(1.5,  Math.min(178, cam.position.z));
  cam.position.y = terrainH(cam.position.x, cam.position.z) + 2.3
                 + Math.sin(bob*1.9)*0.055*mag;
  cam.rotation.y = yaw;
  cam.rotation.x = pitch;

  /* sun and clouds are painted on the sky, so they follow you */
  sky.position.copy(cam.position);
  sun.position.x = cam.position.x + 6;
  sun.position.z = cam.position.z - 520;
  sun.lookAt(cam.position.x, sun.position.y, cam.position.z);

  clouds.forEach(function(c, i){
    c.position.x += dt * (1.4 + (i%4)*0.5);
    if(c.position.x > cam.position.x + 460) c.position.x = cam.position.x - 460;
    c.lookAt(cam.position.x, c.position.y, cam.position.z);
  });

  /* flashes */
  targets.forEach(function(o){
    const u = o.userData;
    if(u.flash > 0){
      u.flash = Math.max(0, u.flash - dt*2.3);
      const s = 1 + u.flash*0.16;
      o.scale.setScalar(s);
      if(u.kind === 'sun') sunMat.uniforms.uFlash.value = u.flash*0.55;
      o.traverse(function(m){
        if(m.material && m.material.userData && m.material.userData.uni)
          m.material.userData.uni.uFlash.value = u.flash*0.5;
      });
    }
  });
  if(ocean.userData.flash > 0){
    ocean.userData.flash = Math.max(0, ocean.userData.flash - dt*2.0);
    oceanMat.userData.uni.uFlash.value = ocean.userData.flash*0.35;
  }

  /* the surf gets louder as you approach it */
  if(surfGain){
    const near = 1 - Math.min(1, Math.max(0, (cam.position.z - 2) / 90));
    surfGain.gain.setTargetAtTime(0.028 + near*0.085, ac.currentTime, 0.35);
  }

  allMats.forEach(function(m){ m.userData.uni.uTime.value = t; });
  updateListener(cam);
  renderer.render(scene, cam);
}

/* ══════════════════════════════════════════════════════════════
   START
   ══════════════════════════════════════════════════════════════ */
document.getElementById('go').addEventListener('click', function(){
  if(!ready){
    try{ ready = initAudio(); }catch(e){ ready = false; }
    if(ready && ac.state === 'suspended') ac.resume();
  }
  const s = document.getElementById('start');
  s.classList.add('gone');
  setTimeout(function(){ s.style.display = 'none'; }, 1050);
});
document.addEventListener('visibilitychange', function(){
  if(!ac) return;
  if(document.hidden) ac.suspend(); else ac.resume();
});

fit();
tick();

})();
</script>
