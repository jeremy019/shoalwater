<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Douglas">
<meta name="theme-color" content="#7E8E93">
<title>Douglas</title>
<style>
  :root{
    --cold:#26343A; --ice:#B8D4E0; --ember:#FF9A3C; --moss:#7FA890; --pale:#DCE6E8;
    --display: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    height:100%; width:100%; overflow:hidden; background:var(--cold); color:var(--pale);
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent; overscroll-behavior:none; touch-action:none;
  }
  #c{ position:fixed; inset:0; display:block; touch-action:none;
      image-rendering:pixelated; image-rendering:-webkit-optimize-contrast; }

  #stick{
    position:fixed; z-index:5;
    right:calc(env(safe-area-inset-right,0px) + 22px);
    bottom:calc(env(safe-area-inset-bottom,0px) + 30px);
    width:122px; height:122px; border-radius:50%;
    border:1px solid rgba(220,230,232,.24); background:rgba(38,52,58,.28);
    backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px); touch-action:none;
  }
  #knob{
    position:absolute; left:50%; top:50%; width:50px; height:50px; margin:-25px 0 0 -25px;
    border-radius:50%; border:1px solid rgba(184,212,224,.55); background:rgba(184,212,224,.15);
    transition:background .2s;
  }
  #stick.on #knob{ background:rgba(184,212,224,.3); }

  #name{
    position:fixed; z-index:6; left:0; right:0;
    bottom:calc(env(safe-area-inset-bottom,0px) + 172px);
    text-align:center; pointer-events:none;
    font-family:var(--display); font-style:italic; font-size:1.5rem;
    opacity:0; text-shadow:0 0 22px currentColor;
  }
  #name.show{ animation:nm 2s cubic-bezier(.16,1,.3,1) forwards; }
  @keyframes nm{
    0%{opacity:0; transform:translateY(8px);} 14%{opacity:1; transform:translateY(0);}
    66%{opacity:1;} 100%{opacity:0; transform:translateY(-10px);}
  }

  #back{
    position:fixed; z-index:6;
    left:calc(env(safe-area-inset-left,0px) + 18px);
    top:calc(env(safe-area-inset-top,0px) + 16px);
    padding:9px 17px; background:rgba(38,52,58,.42);
    border:1px solid rgba(220,230,232,.24); color:rgba(220,230,232,.8);
    font-family:var(--mono); font-size:.58rem; letter-spacing:.2em; text-transform:uppercase;
    text-decoration:none; -webkit-appearance:none; cursor:pointer;
  }
  #back:active{ background:rgba(220,230,232,.16); }

  #hud{
    position:fixed; z-index:5; left:calc(env(safe-area-inset-left,0px) + 20px);
    bottom:calc(env(safe-area-inset-bottom,0px) + 34px);
    font-family:var(--mono); font-size:.58rem; letter-spacing:.18em;
    text-transform:uppercase; color:rgba(220,230,232,.3); pointer-events:none; line-height:2;
  }

  #start{
    position:fixed; inset:0; z-index:20; background:var(--cold);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 34px; transition:opacity 1s ease;
  }
  #start.gone{ opacity:0; pointer-events:none; }
  #start h1{
    font-family:var(--display); font-weight:400; font-size:clamp(2.8rem,15vw,4.2rem);
    letter-spacing:-.02em; color:var(--ice); text-shadow:0 0 60px rgba(184,212,224,.26);
  }
  #start .rule{ width:52px; height:1px; background:rgba(127,168,144,.6); margin:24px 0 22px; }
  #start p{
    font-family:var(--display); font-size:1rem; line-height:1.65;
    color:rgba(220,230,232,.7); text-align:center; max-width:19.5rem;
  }
  #go{
    margin-top:38px; padding:15px 42px; background:transparent; color:var(--ice);
    border:1px solid rgba(184,212,224,.4); border-radius:999px;
    font-family:var(--display); font-size:1.05rem; letter-spacing:.06em;
    cursor:pointer; -webkit-appearance:none;
  }
  #go:active{ background:rgba(184,212,224,.12); }
  #go:focus-visible{ outline:2px solid var(--ice); outline-offset:4px; }
  #load{
    position:absolute; bottom:calc(env(safe-area-inset-bottom,0px) + 30px);
    font-family:var(--mono); font-size:.6rem; letter-spacing:.2em;
    text-transform:uppercase; color:rgba(127,168,144,.85);
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="name"></div>
<a id="back" href="hub.html">&larr; the house</a>
<div id="hud">drag to look<br>tap what you see</div>
<div id="stick"><div id="knob"></div></div>

<div id="start">
  <h1>Douglas</h1>
  <div class="rule"></div>
  <p>Cold rock and standing water. Follow the boardwalk down out of the trees — someone left a fire going.</p>
  <button id="go" disabled>Loading</button>
  <div id="load">Fetching three.js</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
(function(){
if(typeof THREE==='undefined'){
  document.getElementById('load').textContent='three.js failed to load — check connection';
  return;
}
document.getElementById('go').disabled=false;
document.getElementById('go').textContent='Step out';
document.getElementById('load').textContent='Sound begins on touch';

/* ══════════════════════════════════════════════════════════════
   WAVETABLES — same block as Shoal. Paste extractor output over
   any entry to swap in your own Zebra2 material.
   ══════════════════════════════════════════════════════════════ */
function spectrum(f,K){
  K=K||48; const real=[0], imag=[0];
  for(let k=1;k<=K;k++){ real.push(0); imag.push(f(k)); }
  return {real:real, imag:imag};
}
const WAVETABLES={
  fire:    spectrum(function(k){ return Math.pow(k,-1.2)*(k%2===1?1:0.7); }),
  water:   spectrum(function(k){ return Math.pow(k,-2.2)*(k<8?1:0.12); }),
  plant:   spectrum(function(k){ return Math.pow(k,-0.95)*Math.exp(-Math.pow((k-7)/9,2)); }),
  star:    spectrum(function(k){
             const p=[1,4,7,11,17,24]; let v=0;
             for(let i=0;i<p.length;i++) if(k===p[i]) v=Math.pow(i+1,-1.0);
             return v; }),
  anemone: spectrum(function(k){ return k<=2?Math.pow(k,-0.7):Math.pow(k,-2.9); }),
  stone:   spectrum(function(k){ return k<=3?Math.pow(k,-1.5):Math.pow(k,-3.4); })
};
const PATCH={
  fire:    { semis: -5, dur:6.0, atk:0.90, cut:1300, q:1.1, gain:0.30, roll:26 },
  water:   { semis:-12, dur:7.5, atk:1.70, cut: 600, q:1.0, gain:0.30, roll:110 },
  plant:   { semis: 12, dur:3.0, atk:0.05, cut:3800, q:1.6, gain:0.15, roll:16 },
  star:    { semis: 19, dur:4.4, atk:0.01, cut:6800, q:1.0, gain:0.14, roll:12 },
  anemone: { semis:  5, dur:1.5, atk:0.004,cut:1100, q:6.0, gain:0.24, roll:11 },
  stone:   { semis:-17, dur:2.6, atk:0.004,cut: 480, q:1.6, gain:0.32, roll:16 }
};
const LABEL={ fire:'the fire', water:'the inlet', plant:'beach rye',
              star:'an ochre star', anemone:'an anemone', stone:'a stone' };
const ROOT=45;                            // A2 — colder than Shoal's D
const DEG=[0,3,5,7,10,12,15,17];          // A minor pentatonic
function mtof(m){ return 440*Math.pow(2,(m-69)/12); }

/* ══════════════════════════════════════════════════════════════
   AUDIO
   ══════════════════════════════════════════════════════════════ */
let ac=null, master=null, verbIn=null, waves={}, ready=false;
let surfGain=null, windGain=null, fireGain=null, firePan=null;

function impulse(sec,decay){
  const n=Math.floor(ac.sampleRate*sec), b=ac.createBuffer(2,n,ac.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=b.getChannelData(ch);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,decay);
  }
  return b;
}
function noiseBuf(sec,smooth){
  const n=Math.floor(ac.sampleRate*sec), b=ac.createBuffer(1,n,ac.sampleRate);
  const d=b.getChannelData(0); let last=0;
  for(let i=0;i<n;i++){ last=last*smooth+(Math.random()*2-1)*(1-smooth); d[i]=last*(1/(1-smooth))*0.6; }
  return b;
}
function panner(x,y,z,ref){
  const p=ac.createPanner();
  p.panningModel='HRTF'; p.distanceModel='inverse';
  p.refDistance=ref||20; p.maxDistance=900; p.rolloffFactor=1;
  if(p.positionX){ p.positionX.value=x; p.positionY.value=y; p.positionZ.value=z; }
  else p.setPosition(x,y,z);
  return p;
}

const FIRE=new THREE.Vector3(9, 0, 15);

function initAudio(){
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC) return false;
  ac=new AC();
  master=ac.createGain(); master.gain.value=0.0001;
  const comp=ac.createDynamicsCompressor();
  comp.threshold.value=-15; comp.knee.value=24; comp.ratio.value=5;
  comp.attack.value=0.005; comp.release.value=0.3;
  master.connect(comp); comp.connect(ac.destination);
  master.gain.setTargetAtTime(0.9, ac.currentTime, 0.7);

  const conv=ac.createConvolver(); conv.buffer=impulse(4.6,2.0);
  const lv=ac.createGain(); lv.gain.value=0.62;
  verbIn=ac.createGain(); verbIn.connect(conv); conv.connect(lv); lv.connect(master);

  for(const k in WAVETABLES){
    const w=WAVETABLES[k];
    waves[k]=ac.createPeriodicWave(Float32Array.from(w.real), Float32Array.from(w.imag),
                                   {disableNormalization:false});
  }

  /* surf on gravel — coarser than sand */
  const s1=ac.createBufferSource(); s1.buffer=noiseBuf(5,0.80); s1.loop=true;
  const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=820; bp.Q.value=0.5;
  surfGain=ac.createGain(); surfGain.gain.value=0.09;
  s1.connect(bp); bp.connect(surfGain); surfGain.connect(master);
  const sv=ac.createGain(); sv.gain.value=0.5; surfGain.connect(sv); sv.connect(verbIn);
  const l1=ac.createOscillator(); l1.frequency.value=0.075;
  const g1=ac.createGain(); g1.gain.value=300; l1.connect(g1); g1.connect(bp.frequency); l1.start();
  s1.start();

  /* wind through the spruce */
  const s2=ac.createBufferSource(); s2.buffer=noiseBuf(6,0.93); s2.loop=true;
  const hp=ac.createBiquadFilter(); hp.type='bandpass'; hp.frequency.value=1900; hp.Q.value=0.35;
  windGain=ac.createGain(); windGain.gain.value=0.05;
  s2.connect(hp); hp.connect(windGain); windGain.connect(master);
  const l2=ac.createOscillator(); l2.frequency.value=0.043;
  const g2=ac.createGain(); g2.gain.value=0.035; l2.connect(g2); g2.connect(windGain.gain); l2.start();
  s2.start();

  /* the fire, in its actual spot on the beach */
  const s3=ac.createBufferSource(); s3.buffer=noiseBuf(4,0.62); s3.loop=true;
  const fb=ac.createBiquadFilter(); fb.type='bandpass'; fb.frequency.value=1500; fb.Q.value=0.8;
  fireGain=ac.createGain(); fireGain.gain.value=0.16;
  firePan=panner(FIRE.x, 1.0, FIRE.z, 9);
  s3.connect(fb); fb.connect(fireGain); fireGain.connect(firePan);
  firePan.connect(master);
  const fv=ac.createGain(); fv.gain.value=0.34; firePan.connect(fv); fv.connect(verbIn);
  s3.start();

  /* the floor of the whole thing */
  [55,55.35,82.5].forEach(function(f){
    const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f;
    const g=ac.createGain(); g.gain.value=0.026;
    o.connect(g); g.connect(master); o.start();
  });
  return true;
}

/* a log popping */
function crackle(){
  if(!ready) return;
  const t=ac.currentTime;
  const n=Math.floor(ac.sampleRate*0.09), b=ac.createBuffer(1,n,ac.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,9);
  const s=ac.createBufferSource(); s.buffer=b;
  const f=ac.createBiquadFilter(); f.type='bandpass';
  f.frequency.value=900+Math.random()*2600; f.Q.value=2.5;
  const g=ac.createGain(); g.gain.value=0.09+Math.random()*0.16;
  s.connect(f); f.connect(g); g.connect(firePan); s.start(t);
}

/* the local bird, unavoidable */
function raven(){
  if(!ready) return;
  const t=ac.currentTime+0.02;
  const p=panner((Math.random()-0.5)*90, 26, 40+Math.random()*70, 55);
  p.connect(master);
  const pv=ac.createGain(); pv.gain.value=0.7; p.connect(pv); pv.connect(verbIn);
  const n=2+(Math.random()*2|0);
  for(let i=0;i<n;i++){
    const st=t+i*0.30;
    const o=ac.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(232+Math.random()*26, st);
    o.frequency.exponentialRampToValueAtTime(122, st+0.19);
    const f=ac.createBiquadFilter(); f.type='bandpass';
    f.frequency.value=1250; f.Q.value=3.4;
    const g=ac.createGain();
    g.gain.setValueAtTime(0.0001,st);
    g.gain.linearRampToValueAtTime(0.2,st+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,st+0.22);
    o.connect(f); f.connect(g); g.connect(p);
    o.start(st); o.stop(st+0.25);
  }
}

let voices=0;
function touchSound(kind,pos,degree){
  if(!ready || voices>14) return;
  const P=PATCH[kind], t=ac.currentTime+0.01;
  voices++;
  const o=ac.createOscillator();
  o.setPeriodicWave(waves[kind]);
  o.frequency.value=mtof(ROOT+P.semis+DEG[degree%DEG.length]);
  const f=ac.createBiquadFilter(); f.type='lowpass'; f.Q.value=P.q;
  f.frequency.setValueAtTime(P.cut*0.32,t);
  f.frequency.linearRampToValueAtTime(P.cut, t+Math.max(P.atk,0.1));
  f.frequency.exponentialRampToValueAtTime(P.cut*0.28, t+P.dur);
  const g=ac.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(P.gain, t+P.atk);
  g.gain.exponentialRampToValueAtTime(0.0001, t+P.dur);
  const p=panner(pos.x,pos.y,pos.z,P.roll);
  o.connect(f); f.connect(g); g.connect(p); p.connect(master);
  const s=ac.createGain(); s.gain.value=0.5; p.connect(s); s.connect(verbIn);
  o.start(t); o.stop(t+P.dur+0.1);
  o.onended=function(){ voices--; };
}

function updateListener(cam){
  if(!ac) return;
  const l=ac.listener;
  const f=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
  const u=new THREE.Vector3(0,1,0).applyQuaternion(cam.quaternion);
  if(l.positionX){
    const t=ac.currentTime;
    l.positionX.setTargetAtTime(cam.position.x,t,0.02);
    l.positionY.setTargetAtTime(cam.position.y,t,0.02);
    l.positionZ.setTargetAtTime(cam.position.z,t,0.02);
    l.forwardX.setTargetAtTime(f.x,t,0.02); l.forwardY.setTargetAtTime(f.y,t,0.02);
    l.forwardZ.setTargetAtTime(f.z,t,0.02);
    l.upX.setTargetAtTime(u.x,t,0.02); l.upY.setTargetAtTime(u.y,t,0.02);
    l.upZ.setTargetAtTime(u.z,t,0.02);
  } else {
    l.setPosition(cam.position.x,cam.position.y,cam.position.z);
    l.setOrientation(f.x,f.y,f.z,u.x,u.y,u.z);
  }
}

/* ══════════════════════════════════════════════════════════════
   PS1 PIPELINE — with firelight, because the fire is the only
   warm thing in this scene and it should light what's near it
   ══════════════════════════════════════════════════════════════ */
const FOG_COL=new THREE.Color(0.694, 0.757, 0.780);
const FOG_NEAR=26, FOG_FAR=280;
const SUN_DIR=new THREE.Vector3(-0.25,0.72,-0.62).normalize();
const uFirePos={value:new THREE.Vector3(FIRE.x,1.2,FIRE.z)};
const uFireI  ={value:1.0};

const allMats=[];
function ps1(o){
  o=o||{};
  const uni={
    uMap:{value:o.map||null}, uRes:{value:new THREE.Vector2(320,240)},
    uTime:{value:0}, uJitter:{value:o.jitter===undefined?1:o.jitter},
    uFogCol:{value:FOG_COL}, uTint:{value:o.tint||new THREE.Color(1,1,1)},
    uCut:{value:o.cutout===undefined?-1:o.cutout}, uFlash:{value:0},
    uFogNear:{value:FOG_NEAR}, uFogFar:{value:o.fogFar||FOG_FAR},
    uSun:{value:SUN_DIR}, uAmb:{value:o.ambient===undefined?0.62:o.ambient},
    uGlow:{value:o.glow||0}, uFirePos:uFirePos, uFireI:uFireI,
    uFireR:{value:o.fireReach===undefined?16.0:o.fireReach}
  };
  const m=new THREE.ShaderMaterial({
    uniforms:uni, transparent:!!o.transparent,
    side:o.side||THREE.FrontSide,
    depthWrite:o.depthWrite===undefined?true:o.depthWrite,
    vertexShader:[
      'uniform vec2 uRes; uniform float uJitter; uniform float uTime;',
      'uniform float uFogNear; uniform float uFogFar;',
      'uniform vec3 uSun; uniform float uAmb;',
      'uniform vec3 uFirePos; uniform float uFireI; uniform float uFireR;',
      'varying vec2 vUv; varying float vW; varying float vFog;',
      'varying float vLit; varying float vFire;',
      o.vertexHead||'',
      'void main(){',
      '  vec3 p = position;',
      '  vec3 n = normal;',
      o.vertexBody||'',
      '  vec4 wp = modelMatrix * vec4(p,1.0);',
      '  vec4 mv = viewMatrix * wp;',
      '  vec4 cl = projectionMatrix * mv;',
      '  vec2 g = uRes*0.5;',
      '  cl.xy = mix(cl.xy, floor(cl.xy/cl.w*g + 0.5)/g*cl.w, uJitter);',
      '  vec3 wn = normalize(mat3(modelMatrix)*n);',
      '  vLit = uAmb + (1.0-uAmb)*max(dot(wn,uSun),0.0);',
      '  float fd = distance(wp.xyz, uFirePos);',
      '  vFire = uFireI * pow(clamp(1.0 - fd/uFireR, 0.0, 1.0), 2.0);',
      '  vFog = clamp((-mv.z-uFogNear)/(uFogFar-uFogNear),0.0,1.0);',
      '  vUv = uv*cl.w; vW = cl.w;',
      '  gl_Position = cl;',
      '}'].join('\n'),
    fragmentShader:[
      'uniform sampler2D uMap; uniform float uTime; uniform vec3 uFogCol;',
      'uniform vec3 uTint; uniform float uCut; uniform float uFlash; uniform float uGlow;',
      'varying vec2 vUv; varying float vW; varying float vFog;',
      'varying float vLit; varying float vFire;',
      'float b2(vec2 a){ a=floor(a); return fract(dot(a, vec2(0.5, a.y*0.75))); }',
      'float b4(vec2 a){ return b2(0.5*a)*0.25 + b2(a); }',
      o.fragHead||'',
      'void main(){',
      '  vec2 uv = vUv/vW;',
      o.fragBody||'  vec4 tex = texture2D(uMap, uv);',
      '  if(uCut > 0.0 && tex.a < uCut) discard;',
      '  vec3 col = tex.rgb * uTint * mix(vLit, 1.0, uGlow);',
      '  col += vFire * vec3(1.05, 0.52, 0.16);',
      '  col += uFlash * vec3(1.0,0.9,0.7);',
      '  col = mix(col, uFogCol, vFog*(1.0-uGlow));',
      '  float d = b4(gl_FragCoord.xy)/0.9375;',
      '  gl_FragColor = vec4(floor(col*31.0 + d)/31.0, tex.a);',
      '}'].join('\n')
  });
  m.userData.uni=uni; allMats.push(m); return m;
}

/* ══════════════════════════════════════════════════════════════
   TEXTURES
   ══════════════════════════════════════════════════════════════ */
function tex(w,h,draw){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  draw(c.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(c);
  t.magFilter=t.minFilter=THREE.NearestFilter;
  t.generateMipmaps=false; t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}
function rnd(a,b){ return a+Math.random()*(b-a); }
function tiled(t,rx,ry){ const c=t.clone(); c.needsUpdate=true; c.repeat.set(rx,ry); return c; }

const T={};
/* wet cobble — this beach is gravel, not sand */
T.cobble=tex(64,64,function(g,w,h){
  g.fillStyle='#5A6166'; g.fillRect(0,0,w,h);
  for(let i=0;i<180;i++){
    const x=rnd(0,w), y=rnd(0,h), r=rnd(1.6,4.4), v=rnd(-30,26);
    g.fillStyle='rgba('+(96+v|0)+','+(102+v|0)+','+(104+v|0)+',.9)';
    g.beginPath(); g.arc(x,y,r,0,6.2832); g.fill();
    g.fillStyle='rgba(190,205,210,.15)';
    g.beginPath(); g.arc(x-r*0.3,y-r*0.3,r*0.4,0,6.2832); g.fill();
  }
  for(let i=0;i<80;i++){
    g.fillStyle='rgba(46,60,52,.4)';

/* ── ground ──────────────────────────────────────────────── */
function terrainH(x,z){
  if(z<0.5) return -0.2;
  let h=z*0.048;
  h+=Math.sin(x*0.07)*0.72+Math.cos(z*0.055)*0.5;
  h+=Math.sin(x*0.19+z*0.14)*0.3;
  return h*Math.min(1,Math.max(0,(z-0.5)/7));
}
/* the boardwalk curves as it comes down out of the trees */
function walkX(z){ return Math.sin((z-24)*0.026)*7.5; }
function walkH(z){
  const t=Math.min(1,Math.max(0,(z-24)/78));
  return 1.05 + t*2.9 + terrainH(walkX(z),z)*0.55;
}
function onWalk(x,z){ return z>23 && z<104 && Math.abs(x-walkX(z))<3.0; }
function groundH(x,z){ return onWalk(x,z) ? walkH(z) : terrainH(x,z); }

}));

function ridge(zPos, height, seed, tintLo, tintHi, segs){
  const W=2600;
  const geo=new THREE.PlaneGeometry(W, height, segs, 1);
  const pos=geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    if(pos.getY(i) <= 0) continue;                  // only lift the top edge
    const x=pos.getX(i);
    let h=0;
    h+=Math.sin(x*0.0032+seed)*0.30;
    h+=Math.sin(x*0.0081+seed*2.1)*0.20;
    h+=Math.sin(x*0.0193+seed*3.7)*0.10;
    h+=Math.sin(x*0.0402+seed*1.3)*0.045;
    pos.setY(i, height*0.5 + h*height*0.62);
  }
  pos.needsUpdate=true; geo.computeVertexNormals();
  const mat=new THREE.ShaderMaterial({
    uniforms:{ uLo:{value:new THREE.Color(tintLo)}, uHi:{value:new THREE.Color(tintHi)},
               uFogCol:{value:FOG_COL}, uMix:{value:0} },
    depthWrite:true,
    vertexShader:['varying float vY; varying float vX;',
      'void main(){ vec4 wp=modelMatrix*vec4(position,1.0);',
      '  vY=wp.y; vX=wp.x;',
      '  gl_Position=projectionMatrix*viewMatrix*wp; }'].join('\n'),
    fragmentShader:['uniform vec3 uLo; uniform vec3 uHi; uniform vec3 uFogCol; uniform float uMix;',
      'varying float vY; varying float vX;',
      'float b2(vec2 a){ a=floor(a); return fract(dot(a, vec2(0.5, a.y*0.75))); }',
      'float b4(vec2 a){ return b2(0.5*a)*0.25+b2(a); }',
      'void main(){',
      '  float t=clamp(vY/170.0,0.0,1.0);',
      '  float band=floor(t*7.0)/7.0;',                 // hard PS1 steps
      '  vec3 c=mix(uLo,uHi,band);',
      /* glacier tongues: cold blue where the valleys run */
      '  float ice=smoothstep(0.55,0.95,sin(vX*0.021)*0.5+0.5) * smoothstep(0.30,0.72,t);',
      '  c=mix(c, vec3(0.760,0.870,0.918), ice*0.7);',
      '  c=mix(c, uFogCol, uMix);',
      '  float d=b4(gl_FragCoord.xy)/0.9375;',
      '  gl_FragColor=vec4(floor(c*31.0+d)/31.0,1.0);',
      '}'].join('\n')
  });
  const m=new THREE.Mesh(geo,mat);
  m.position.set(0, 0, zPos);
  scene.add(m);
  return m;
}

/* Merging the static scenery into a handful of geometries. Without this
   the spruce alone are 440 separate draw calls, which a phone will not
   forgive. Anything clickable stays its own mesh so it can flash. */
const _q=new THREE.Quaternion(), _e=new THREE.Euler(),
      _v=new THREE.Vector3(), _sc=new THREE.Vector3();
function mat(x,y,z,rx,ry,rz){
  _e.set(rx||0,ry||0,rz||0); _q.setFromEuler(_e);
  _v.set(x,y,z); _sc.set(1,1,1);
  return new THREE.Matrix4().compose(_v,_q,_sc);
}
function mergeAll(items){
  let vc=0;
  const gs=items.map(function(it){
    const g = it.geo.index ? it.geo.toNonIndexed() : it.geo.clone();
    g.applyMatrix4(it.m);
    vc += g.attributes.position.count;
    return g;
  });
  const pos=new Float32Array(vc*3), nor=new Float32Array(vc*3), uvs=new Float32Array(vc*2);
  let po=0, uo=0;
  gs.forEach(function(g){
    pos.set(g.attributes.position.array, po);
    if(g.attributes.normal) nor.set(g.attributes.normal.array, po);
    if(g.attributes.uv)     uvs.set(g.attributes.uv.array, uo);
    po += g.attributes.position.count*3;
    uo += g.attributes.position.count*2;
    g.dispose();
  });
  const out=new THREE.BufferGeometry();
  out.setAttribute('position', new THREE.BufferAttribute(pos,3));
  out.setAttribute('normal',   new THREE.BufferAttribute(nor,3));
  out.setAttribute('uv',       new THREE.BufferAttribute(uvs,2));
  return out;
}
function bake(items, material){
  if(!items.length) return null;
  const m=new THREE.Mesh(mergeAll(items), material);
  m.frustumCulled=false;
  scene.add(m);
  return m;
}

  const base=terrainH(x,z)-0.3;
  _trunks.push({geo:new THREE.CylinderGeometry(0.24,0.62,h,5,1),
                m:mat(x,base+h/2,z,0,rnd(0,6),0)});

    _needles.push({geo:new THREE.ConeGeometry(r,h*0.34,6,1),
                   m:mat(x, base+h*0.30+t*h*0.62, z, 0, rnd(0,3), 0)});
  }
}

  const g=new THREE.IcosahedronGeometry(r,0);

    p.setXYZ(i,p.getX(i)*rnd(.72,1.3),p.getY(i)*rnd(.5,.92),p.getZ(i)*rnd(.72,1.3));
  p.needsUpdate=true; g.computeVertexNormals();
  return g;
}

    m.rotation.set(rnd(0,3),rnd(0,3),rnd(0,3));

bake(_rocks, stoneMat);

  .forEach(function(s,i){ boulder(s[0],s[1],s[2],i+2,true); });

/* beach rye and salal */
const grassMat=ps1({map:T.grass,cutout:0.35,transparent:true,
                    side:THREE.DoubleSide,ambient:0.6,fireReach:14});
const _grass=[];
function plant(x,z,s,deg,click){
  if(click){
    const g=new THREE.Group();
    for(let i=0;i<2;i++){
      const q=new THREE.Mesh(new THREE.PlaneGeometry(s,s*0.9),grassMat);
      q.rotation.y=i*Math.PI/2; q.position.y=s*0.45; g.add(q);
    }
    g.position.set(x,terrainH(x,z),z);
    return place(g,'plant',deg);
  }
  const y=terrainH(x,z)+s*0.45, ry=rnd(0,3);
  for(let i=0;i<2;i++)
    _grass.push({geo:new THREE.PlaneGeometry(s,s*0.9), m:mat(x,y,z,0,ry+i*Math.PI/2,0)});
}
for(let i=0;i<170;i++){
  const x=rnd(-120,120), z=rnd(26,90);
  if(onWalk(x,z)) continue;
  plant(x,z,rnd(1.1,2.6),0,false);
}
bake(_grass, grassMat);
[[-13,34],[19,41],[-27,29],[8,49],[31,37],[-38,45]]
  .forEach(function(s,i){ plant(s[0],s[1],2.3,i+1,true); });

/* tidepool life, down near the water */
function starfish(x,z,deg){
  const sh=new THREE.Shape();
  for(let i=0;i<10;i++){
    const a=(i/10)*Math.PI*2-Math.PI/2;
    const r=i%2===0?1.0:0.40;
    const px=Math.cos(a)*r, py=Math.sin(a)*r;
    i?sh.lineTo(px,py):sh.moveTo(px,py);
  }
  sh.closePath();
  const g=new THREE.ShapeGeometry(sh,2);
  g.rotateX(-Math.PI/2);
  g.scale(0.8,0.8,0.8);
  const m=new THREE.Mesh(g, ps1({map:T.star, ambient:0.72,
                                 side:THREE.DoubleSide, fireReach:13}));
  m.position.set(x, terrainH(x,z)+0.16, z);
  m.rotation.y=rnd(0,6);
  return place(m,'star',deg);
}
[[-9,4],[14,3],[-21,6],[6,2],[26,5],[-3,7]]
  .forEach(function(s,i){ starfish(s[0],s[1],i+1); });

function anemone(x,z,deg){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.44,0.5,7,1),
                            ps1({map:T.anem, ambient:0.6, fireReach:12}));
  body.position.y=0.25; g.add(body);
  const tm=ps1({map:T.anem, ambient:0.75, side:THREE.DoubleSide, fireReach:12});
  for(let i=0;i<9;i++){
    const a=(i/9)*Math.PI*2;
    const t=new THREE.Mesh(new THREE.PlaneGeometry(0.13,0.42),tm);
    t.position.set(Math.cos(a)*0.28, 0.62, Math.sin(a)*0.28);
    t.rotation.set(rnd(-0.5,-0.15),-a,0);
    g.add(t);
  }
  g.position.set(x, terrainH(x,z)+0.02, z);
  g.userData_wob=rnd(0,6);
  return place(g,'anemone',deg);
}
const anemones=[[-11,3],[16,5],[-24,4],[3,6],[29,3]]
  .map(function(s,i){ const a=anemone(s[0],s[1],i+1); return a; });

/* the fire */
const fireGrp=new THREE.Group();
fireGrp.position.set(FIRE.x, terrainH(FIRE.x,FIRE.z), FIRE.z);
const logMat=ps1({map:T.log, ambient:0.5, fireReach:6});
for(let i=0;i<7;i++){
  const a=(i/7)*Math.PI*2;
  const l=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.2,2.6,5,1),logMat);
  l.position.set(Math.cos(a)*0.55,0.85,Math.sin(a)*0.55);
  l.rotation.set(0.5*Math.cos(a),-a,0.5*Math.sin(a));
  fireGrp.add(l);
}
for(let i=0;i<14;i++){                       // ring of stones round the pit
  const a=(i/14)*Math.PI*2;
  const s=new THREE.Mesh(new THREE.IcosahedronGeometry(rnd(0.28,0.5),0),stoneMat);
  s.position.set(Math.cos(a)*2.0,0.1,Math.sin(a)*2.0);
  s.rotation.set(rnd(0,3),rnd(0,3),rnd(0,3));
  fireGrp.add(s);
}
const flameMat=ps1({map:T.flame,cutout:0.06,transparent:true,ambient:1,glow:0.96,
                    side:THREE.DoubleSide,depthWrite:false,jitter:0.5});
const flames=[];
for(let i=0;i<7;i++){
  const f=new THREE.Mesh(new THREE.PlaneGeometry(1.5,2.6),flameMat);
  f.position.set(rnd(-.4,.4), 1.1+rnd(0,.7), rnd(-.4,.4));
  f.renderOrder=4;
  f.userData={ph:rnd(0,6.3), sp:rnd(2.2,4.0), sc:rnd(.7,1.35)};
  fireGrp.add(f); flames.push(f);
}
scene.add(fireGrp);
const fireHit=new THREE.Mesh(new THREE.BoxGeometry(3.4,3.6,3.4),
  new THREE.MeshBasicMaterial({visible:false}));
fireHit.position.set(FIRE.x, terrainH(FIRE.x,FIRE.z)+1.6, FIRE.z);
place(fireHit,'fire',0);

/* ══════════════════════════════════════════════════════════════
   INPUT
   ══════════════════════════════════════════════════════════════ */
let yaw=Math.PI, pitch=-0.03;
const move={x:0,y:0};
let stickId=null, lookId=null, lx=0, ly=0, moved=0, at=0;
const stick=document.getElementById('stick'), knob=document.getElementById('knob'), R=44;

function stickSet(t){
  const r=stick.getBoundingClientRect();
  let dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2);
  const d=Math.hypot(dx,dy);
  if(d>R){ dx=dx/d*R; dy=dy/d*R; }
  knob.style.transform='translate('+dx+'px,'+dy+'px)';
  move.x=dx/R; move.y=dy/R;
}
function stickClear(){ knob.style.transform=''; move.x=move.y=0;
  stick.classList.remove('on'); stickId=null; }
stick.addEventListener('touchstart',function(e){
  e.preventDefault(); e.stopPropagation();
  const t=e.changedTouches[0]; stickId=t.identifier; stick.classList.add('on'); stickSet(t);
},{passive:false});
stick.addEventListener('touchmove',function(e){
  e.preventDefault(); e.stopPropagation();
  for(const t of e.changedTouches) if(t.identifier===stickId) stickSet(t);
},{passive:false});
['touchend','touchcancel'].forEach(function(ev){
  stick.addEventListener(ev,function(e){
    e.preventDefault(); e.stopPropagation();
    for(const t of e.changedTouches) if(t.identifier===stickId) stickClear();
  },{passive:false});
});

cv.addEventListener('touchstart',function(e){
  e.preventDefault(); if(lookId!==null) return;
  const t=e.changedTouches[0];
  lookId=t.identifier; lx=t.clientX; ly=t.clientY; moved=0; at=performance.now();
},{passive:false});
cv.addEventListener('touchmove',function(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==lookId) continue;
    const dx=t.clientX-lx, dy=t.clientY-ly;
    moved+=Math.hypot(dx,dy);
    yaw-=dx*0.0042; pitch-=dy*0.0042;
    pitch=Math.max(-1.15,Math.min(0.95,pitch));
    lx=t.clientX; ly=t.clientY;
  }
},{passive:false});
['touchend','touchcancel'].forEach(function(ev){
  cv.addEventListener(ev,function(e){
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier!==lookId) continue;
      if(moved<12 && performance.now()-at<380) shoot(t.clientX,t.clientY);
      lookId=null;
    }
  },{passive:false});
});
document.addEventListener('gesturestart',function(e){ e.preventDefault(); });

const keys={};
addEventListener('keydown',function(e){ keys[e.key.toLowerCase()]=true; });
addEventListener('keyup',function(e){ keys[e.key.toLowerCase()]=false; });
let md=false,mx=0,my=0,mm=0;
cv.addEventListener('mousedown',function(e){ md=true; mx=e.clientX; my=e.clientY; mm=0; });
cv.addEventListener('mousemove',function(e){
  if(!md) return;
  const dx=e.clientX-mx, dy=e.clientY-my; mm+=Math.hypot(dx,dy);
  yaw-=dx*0.0042; pitch-=dy*0.0042;
  pitch=Math.max(-1.15,Math.min(0.95,pitch));
  mx=e.clientX; my=e.clientY;
});
addEventListener('mouseup',function(e){ if(md&&mm<8) shoot(e.clientX,e.clientY); md=false; });

/* ── tapping ─────────────────────────────────────────────── */
const ray=new THREE.Raycaster(), ndc=new THREE.Vector2();
const PRIORITY={fire:6,star:5,anemone:5,plant:4,stone:3,water:1};
function owner(o){ while(o){ if(o.userData&&o.userData.kind) return o; o=o.parent; } return null; }

function shoot(cx,cy){
  ndc.x=(cx/innerWidth)*2-1; ndc.y=-(cy/innerHeight)*2+1;
  ray.setFromCamera(ndc,cam);
  const hits=ray.intersectObjects(targets.concat([water]),true);
  let best=null,bp=-1;
  for(let i=0;i<hits.length;i++){
    const o=owner(hits[i].object); if(!o) continue;
    const p=PRIORITY[o.userData.kind]||0;
    if(p>bp){ bp=p; best=o; if(p>=6) break; }
  }
  if(!best) return;
  const k=best.userData.kind, wp=new THREE.Vector3();
  if(k==='water'){
    for(let i=0;i<hits.length;i++)
      if(owner(hits[i].object)===best){ wp.copy(hits[i].point); break; }
  } else best.getWorldPosition(wp);

  touchSound(k,wp,best.userData.deg);
  best.userData.flash=1;
  if(k==='fire'){ crackle(); setTimeout(crackle,90); setTimeout(crackle,210); }

  const n=document.getElementById('name');
  n.textContent=LABEL[k];
  n.style.color = k==='fire'?'#FF9A3C' : k==='water'?'#9FC4CC' :
                  k==='star'?'#E07A44' : k==='anemone'?'#7FD8AC' :
                  k==='plant'?'#B8CE8A' : '#C4CACE';
  n.classList.remove('show'); void n.offsetWidth; n.classList.add('show');
}

/* ══════════════════════════════════════════════════════════════
   LOOP
   ══════════════════════════════════════════════════════════════ */
const clock=new THREE.Clock();
const _fw=new THREE.Vector3();
let bob=0, nextCrackle=0, nextRaven=6;

function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),0.05), t=clock.elapsedTime;

  let ix=move.x, iy=move.y;
  if(keys['w']||keys['arrowup'])   iy-=1;
  if(keys['s']||keys['arrowdown']) iy+=1;
  if(keys['a']||keys['arrowleft']) ix-=1;
  if(keys['d']||keys['arrowright'])ix+=1;
  const mag=Math.min(1,Math.hypot(ix,iy));
  if(mag>0.04){
    const sp=12.0*dt*mag, den=Math.hypot(ix,iy)||1;
    const nx=ix/den, ny=iy/den;
    const fx=-Math.sin(yaw), fz=-Math.cos(yaw);
    const rx= Math.cos(yaw), rz=-Math.sin(yaw);
    cam.position.x+=(fx*(-ny)+rx*nx)*sp;
    cam.position.z+=(fz*(-ny)+rz*nx)*sp;
    bob+=sp*0.9;
  }
  cam.position.x=Math.max(-140,Math.min(140,cam.position.x));
  cam.position.z=Math.max(1.5,Math.min(210,cam.position.z));
  cam.position.y=groundH(cam.position.x,cam.position.z)+2.3+Math.sin(bob*1.9)*0.055*mag;
  cam.rotation.y=yaw; cam.rotation.x=pitch;

  sky.position.copy(cam.position);

  /* flames */
  flames.forEach(function(f){
    const u=f.userData;
    const s=u.sc*(0.72+Math.sin(t*u.sp+u.ph)*0.28+Math.random()*0.09);
    f.scale.set(s,s*(1.05+Math.sin(t*u.sp*1.7+u.ph)*0.22),1);
    f.position.y=1.1+Math.sin(t*u.sp*0.6+u.ph)*0.22;
    f.getWorldPosition(_fw);
    f.lookAt(cam.position.x, _fw.y, cam.position.z);
  });
  uFireI.value=0.86+Math.sin(t*7.3)*0.09+Math.sin(t*13.1)*0.05+Math.random()*0.04;

  /* anemones sway */
  anemones.forEach(function(a){
    a.rotation.z=Math.sin(t*0.8+a.userData_wob)*0.06;
    a.rotation.x=Math.cos(t*0.7+a.userData_wob)*0.05;
  });

  /* fire pops more often when you're near it */
  const fd=Math.hypot(cam.position.x-FIRE.x,cam.position.z-FIRE.z);
  if(ready && t>nextCrackle){
    if(fd<40) crackle();
    nextCrackle=t+rnd(0.18,0.9)*(1+fd/26);
  }
  if(ready && t>nextRaven){ raven(); nextRaven=t+rnd(16,44); }
  if(fireGain) fireGain.gain.setTargetAtTime(0.16+uFireI.value*0.04, ac.currentTime, 0.2);

  /* surf up near the water, wind up in the trees */
  if(surfGain){
    const near=1-Math.min(1,Math.max(0,(cam.position.z-2)/70));
    surfGain.gain.setTargetAtTime(0.03+near*0.11, ac.currentTime, 0.35);
  }
  if(windGain){
    const inTrees=Math.min(1,Math.max(0,(cam.position.z-45)/60));
    windGain.gain.setTargetAtTime(0.028+inTrees*0.07, ac.currentTime, 0.5);
  }

  targets.forEach(function(o){
    const u=o.userData;
    if(u.flash>0){
      u.flash=Math.max(0,u.flash-dt*2.3);
      o.traverse(function(m){
        if(m.material&&m.material.userData&&m.material.userData.uni)
          m.material.userData.uni.uFlash.value=u.flash*0.5;
      });
    }
  });

  allMats.forEach(function(m){ m.userData.uni.uTime.value=t; });
  updateListener(cam);
  renderer.render(scene,cam);
}

document.getElementById('go').addEventListener('click',function(){
  if(!ready){ try{ ready=initAudio(); }catch(e){ ready=false; }
    if(ready && ac.state==='suspended') ac.resume(); }
  const s=document.getElementById('start');
  s.classList.add('gone');
  setTimeout(function(){ s.style.display='none'; },1050);
});
document.addEventListener('visibilitychange',function(){
  if(!ac) return;
  if(document.hidden) ac.suspend(); else ac.resume();
});

fit(); tick();
})();
</script>
