<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cathedral">
<meta name="theme-color" content="#0C1A12">
<title>Cathedral</title>
<style>
  :root{
    --dark:#0C1A12; --moss:#7FC48A; --shaft:#DCE9C0; --spathe:#F2D24B; --pale:#DCE8DC;
    --display: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    height:100%; width:100%; overflow:hidden; background:var(--dark); color:var(--pale);
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent; overscroll-behavior:none; touch-action:none;
  }
  #c{ position:fixed; inset:0; display:block; touch-action:none;
      image-rendering:pixelated; image-rendering:-webkit-optimize-contrast; }
  #vig{
    position:fixed; inset:0; pointer-events:none; z-index:2;
    background:radial-gradient(ellipse at 50% 42%, transparent 40%, rgba(4,12,7,.62) 100%);
  }
  #stick{
    position:fixed; z-index:5;
    right:calc(env(safe-area-inset-right,0px) + 22px);
    bottom:calc(env(safe-area-inset-bottom,0px) + 30px);
    width:122px; height:122px; border-radius:50%;
    border:1px solid rgba(220,232,220,.22); background:rgba(12,26,18,.3);
    backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px); touch-action:none;
  }
  #knob{
    position:absolute; left:50%; top:50%; width:50px; height:50px; margin:-25px 0 0 -25px;
    border-radius:50%; border:1px solid rgba(127,196,138,.55); background:rgba(127,196,138,.15);
    transition:background .2s;
  }
  #stick.on #knob{ background:rgba(127,196,138,.3); }
  #name{
    position:fixed; z-index:6; left:0; right:0;
    bottom:calc(env(safe-area-inset-bottom,0px) + 172px);
    text-align:center; pointer-events:none;
    font-family:var(--display); font-style:italic; font-size:1.5rem;
    opacity:0; text-shadow:0 0 22px currentColor;
  }
  #name.show{ animation:nm 2.1s cubic-bezier(.16,1,.3,1) forwards; }
  @keyframes nm{
    0%{opacity:0; transform:translateY(8px);} 14%{opacity:1; transform:translateY(0);}
    68%{opacity:1;} 100%{opacity:0; transform:translateY(-10px);}
  }
  #back{
    position:fixed; z-index:6;
    left:calc(env(safe-area-inset-left,0px) + 18px);
    top:calc(env(safe-area-inset-top,0px) + 16px);
    padding:9px 17px; background:rgba(12,26,18,.44);
    border:1px solid rgba(220,232,220,.22); color:rgba(220,232,220,.78);
    font-family:var(--mono); font-size:.58rem; letter-spacing:.2em; text-transform:uppercase;
    text-decoration:none; -webkit-appearance:none; cursor:pointer;
  }
  #back:active{ background:rgba(220,232,220,.14); }
  #hud{
    position:fixed; z-index:5; left:calc(env(safe-area-inset-left,0px) + 20px);
    bottom:calc(env(safe-area-inset-bottom,0px) + 34px);
    font-family:var(--mono); font-size:.58rem; letter-spacing:.18em;
    text-transform:uppercase; color:rgba(220,232,220,.28); pointer-events:none; line-height:2;
  }
  #start{
    position:fixed; inset:0; z-index:20; background:var(--dark);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 34px; transition:opacity 1s ease;
  }
  #start.gone{ opacity:0; pointer-events:none; }
  #start h1{
    font-family:var(--display); font-weight:400; font-size:clamp(2.6rem,13vw,3.9rem);
    letter-spacing:-.02em; color:var(--moss); text-shadow:0 0 60px rgba(127,196,138,.26);
  }
  #start .rule{ width:52px; height:1px; background:rgba(242,210,75,.5); margin:24px 0 22px; }
  #start p{
    font-family:var(--display); font-size:1rem; line-height:1.65;
    color:rgba(220,232,220,.68); text-align:center; max-width:20rem;
  }
  #go{
    margin-top:38px; padding:15px 42px; background:transparent; color:var(--moss);
    border:1px solid rgba(127,196,138,.4); border-radius:999px;
    font-family:var(--display); font-size:1.05rem; letter-spacing:.06em;
    cursor:pointer; -webkit-appearance:none;
  }
  #go:active{ background:rgba(127,196,138,.12); }
  #go:focus-visible{ outline:2px solid var(--moss); outline-offset:4px; }
  #load{
    position:absolute; bottom:calc(env(safe-area-inset-bottom,0px) + 30px);
    font-family:var(--mono); font-size:.6rem; letter-spacing:.2em;
    text-transform:uppercase; color:rgba(242,210,75,.7);
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="vig"></div>
<div id="name"></div>
<a id="back" href="hub.html">&larr; the house</a>
<div id="hud">drag to look<br>tap what you see</div>
<div id="stick"><div id="knob"></div></div>

<div id="start">
  <h1>Cathedral</h1>
  <div class="rule"></div>
  <p>what is old, is sometimes new</p>
  <button id="go" disabled>Loading</button>
  <div id="load">Fetching three.js</div>
</div>

/* ══════════════════════════════════════════════════════════════

function spectrum(f,K){
  K=K||48; const real=[0], imag=[0];
  for(let k=1;k<=K;k++){ real.push(0); imag.push(f(k)); }
  return {real:real, imag:imag};
}
const WAVETABLES={
  spruce:  spectrum(function(k){ return Math.pow(k,-1.5)*(k%2===1?1:0.55); }),
  salal:   spectrum(function(k){ return Math.pow(k,-1.25)*Math.exp(-Math.pow((k-4)/7,2)); }),
  devil:   spectrum(function(k){ return k%2===1?Math.pow(k,-0.8):Math.pow(k,-2.4)*0.5; }),
  skunk:   spectrum(function(k){ return k<=3?Math.pow(k,-0.6):Math.pow(k,-2.7); }),
  berry:   spectrum(function(k){
             const p=[1,3,6,10,15,22]; let v=0;
             for(let i=0;i<p.length;i++) if(k===p[i]) v=Math.pow(i+1,-1.05);
             return v; }),
  deer:    spectrum(function(k){ return Math.pow(k,-1.1)*Math.exp(-Math.pow((k-3)/5,2)); }),
  plank:   spectrum(function(k){ return k<=4?Math.pow(k,-1.3):Math.pow(k,-3.0); })
};
const PATCH={
  spruce:{ semis:-24, dur:13.0, atk:2.60, cut: 420, q:1.0, gain:0.40, roll:40 },
  salal: { semis:  0, dur: 3.4, atk:0.05, cut:2200, q:2.0, gain:0.20, roll:13 },

  deer:  { semis: 12, dur: 1.2, atk:0.02, cut:1800, q:3.0, gain:0.22, roll:20 },

};

/* ══════════════════════════════════════════════════════════════

let ac=null, master=null, verbIn=null, waves={}, ready=false;
let canopyGain=null, musicGain=null;

/* the track — embedded above as CATHEDRAL_MP3 so the file stays self-contained.
   Decoded into a buffer source so the loop is sample-accurate: mp3 encoders pad
   the ends with silence, so we scan the decoded audio and loop between the
   first and last real samples instead of the file boundaries. */
function startMusic(){
  if(typeof CATHEDRAL_MP3==='undefined' || !ac) return;
  try{
    const bin=atob(CATHEDRAL_MP3);
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    const done=function(buf){
      const d=buf.getChannelData(0), th=0.0015;
      let s=0, e=buf.length-1;
      while(s<e && Math.abs(d[s])<th) s++;
      while(e>s && Math.abs(d[e])<th) e--;
      const src=ac.createBufferSource();
      src.buffer=buf; src.loop=true;
      src.loopStart=s/buf.sampleRate;
      src.loopEnd=(e+1)/buf.sampleRate;
      musicGain=ac.createGain(); musicGain.gain.value=0.0001;
      src.connect(musicGain); musicGain.connect(master);
      const send=ac.createGain(); send.gain.value=0.28;   // let the room have it too
      musicGain.connect(send); send.connect(verbIn);
      src.start(ac.currentTime+0.05, src.loopStart);
      musicGain.gain.setTargetAtTime(0.5, ac.currentTime+0.05, 2.8);
    };
    /* callback form for older Safari; promise form as fallback */
    const p=ac.decodeAudioData(bytes.buffer, done, function(){});
    if(p && p.then) p.then(function(){}).catch(function(){});
  }catch(e){ /* no music is better than no forest */ }
}

function impulse(sec,decay){
  const n=Math.floor(ac.sampleRate*sec), b=ac.createBuffer(2,n,ac.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=b.getChannelData(ch);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,decay);
  }
  return b;
}
function noiseBuf(sec,smooth){
  const n=Math.floor(ac.sampleRate*sec), b=ac.createBuffer(1,n,ac.sampleRate);
  const d=b.getChannelData(0); let last=0;
  for(let i=0;i<n;i++){ last=last*smooth+(Math.random()*2-1)*(1-smooth); d[i]=last*(1/(1-smooth))*0.6; }
  return b;
}
function panner(x,y,z,ref){
  const p=ac.createPanner();
  p.panningModel='HRTF'; p.distanceModel='inverse';
  p.refDistance=ref||20; p.maxDistance=700; p.rolloffFactor=1;
  if(p.positionX){ p.positionX.value=x; p.positionY.value=y; p.positionZ.value=z; }
  else p.setPosition(x,y,z);
  return p;
}

function initAudio(){

  const lg=ac.createGain(); lg.gain.value=0.03;
  l.connect(lg); lg.connect(canopyGain.gain); l.start();
  s.start();

  [41.2,41.45,61.7].forEach(function(f){
    const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f;
    const g=ac.createGain(); g.gain.value=0.03;
    o.connect(g); g.connect(master); o.start();
  });
  startMusic();
  return true;
}

/* water coming off the needles, hours after the rain stopped */
function drip(){
  if(!ready) return;
  const t=ac.currentTime+0.01;
  const p=panner((Math.random()-0.5)*40, 1+Math.random()*7, (Math.random()-0.5)*40, 6);
  p.connect(master);
  const pv=ac.createGain(); pv.gain.value=0.8; p.connect(pv); pv.connect(verbIn);
  const o=ac.createOscillator(); o.type='sine';
  const f0=900+Math.random()*1700;
  o.frequency.setValueAtTime(f0,t);
  o.frequency.exponentialRampToValueAtTime(f0*0.42,t+0.09);
  const g=ac.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(0.10+Math.random()*0.08,t+0.004);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
  o.connect(g); g.connect(p); o.start(t); o.stop(t+0.2);
}

/* varied thrush — one held tone on a burr, then silence */
function thrush(){
  if(!ready) return;
  const t=ac.currentTime+0.02;
  const p=panner((Math.random()-0.5)*80, 14+Math.random()*10, (Math.random()-0.5)*80, 40);
  p.connect(master);
  const pv=ac.createGain(); pv.gain.value=0.9; p.connect(pv); pv.connect(verbIn);
  const n=1+(Math.random()*2|0);
  for(let i=0;i<n;i++){
    const st=t+i*rnd(1.4,2.6);
    const f0=[1480,1760,2100,1320][Math.random()*4|0];
    const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f0;
    const vib=ac.createOscillator(); vib.type='sine'; vib.frequency.value=34;
    const vg=ac.createGain(); vg.gain.value=f0*0.028;
    vib.connect(vg); vg.connect(o.frequency); vib.start(st); vib.stop(st+1.3);
    const bpf=ac.createBiquadFilter(); bpf.type='bandpass';
    bpf.frequency.value=f0; bpf.Q.value=2.2;
    const g=ac.createGain();
    g.gain.setValueAtTime(0.0001,st);
    g.gain.linearRampToValueAtTime(0.075,st+0.08);
    g.gain.setValueAtTime(0.075,st+0.72);
    g.gain.exponentialRampToValueAtTime(0.0001,st+1.15);
    o.connect(bpf); bpf.connect(g); g.connect(p);
    o.start(st); o.stop(st+1.2);
  }
}

/* a blacktail blowing through its nose when you get too close */
function snort(pos){
  if(!ready) return;
  const t=ac.currentTime+0.01;
  const p=panner(pos.x,pos.y,pos.z,18); p.connect(master);
  const pv=ac.createGain(); pv.gain.value=0.6; p.connect(pv); pv.connect(verbIn);
  const n=Math.floor(ac.sampleRate*0.3), b=ac.createBuffer(1,n,ac.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,3.5);
  const src=ac.createBufferSource(); src.buffer=b;
  const f=ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=480; f.Q.value=1.4;
  const g=ac.createGain(); g.gain.value=0.3;
  src.connect(f); f.connect(g); g.connect(p); src.start(t);
}

let voices=0;
function touchSound(kind,pos,degree){
  if(!ready || voices>16) return;
  const P=PATCH[kind], t=ac.currentTime+0.01;
  voices++;
  const o=ac.createOscillator();
  o.setPeriodicWave(waves[kind]);
  o.frequency.value=mtof(ROOT+P.semis+DEG[degree%DEG.length]);
  const f=ac.createBiquadFilter(); f.type='lowpass'; f.Q.value=P.q;
  f.frequency.setValueAtTime(P.cut*0.3,t);
  f.frequency.linearRampToValueAtTime(P.cut, t+Math.max(P.atk,0.1));
  f.frequency.exponentialRampToValueAtTime(P.cut*0.26, t+P.dur);
  const g=ac.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(P.gain, t+P.atk);
  g.gain.exponentialRampToValueAtTime(0.0001, t+P.dur);
  const p=panner(pos.x,pos.y,pos.z,P.roll);
  o.connect(f); f.connect(g); g.connect(p); p.connect(master);
  const s=ac.createGain(); s.gain.value=0.62; p.connect(s); s.connect(verbIn);
  o.start(t); o.stop(t+P.dur+0.1);
  o.onended=function(){ voices--; };

  /* the old tree gets a second, lower voice under the first */
  if(kind==='spruce'){
    const o2=ac.createOscillator(); o2.type='sine';
    o2.frequency.value=mtof(ROOT+P.semis-12);
    const g2=ac.createGain();
    g2.gain.setValueAtTime(0.0001,t);
    g2.gain.linearRampToValueAtTime(0.30,t+3.2);
    g2.gain.exponentialRampToValueAtTime(0.0001,t+P.dur+2);
    o2.connect(g2); g2.connect(master); g2.connect(verbIn);
    o2.start(t); o2.stop(t+P.dur+2.2);
  }
}

function updateListener(cam){
  if(!ac) return;
  const l=ac.listener;
  const f=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
  const u=new THREE.Vector3(0,1,0).applyQuaternion(cam.quaternion);
  if(l.positionX){
    const t=ac.currentTime;
    l.positionX.setTargetAtTime(cam.position.x,t,0.02);
    l.positionY.setTargetAtTime(cam.position.y,t,0.02);
    l.positionZ.setTargetAtTime(cam.position.z,t,0.02);
    l.forwardX.setTargetAtTime(f.x,t,0.02); l.forwardY.setTargetAtTime(f.y,t,0.02);
    l.forwardZ.setTargetAtTime(f.z,t,0.02);
    l.upX.setTargetAtTime(u.x,t,0.02); l.upY.setTargetAtTime(u.y,t,0.02);
    l.upZ.setTargetAtTime(u.z,t,0.02);
  } else {
    l.setPosition(cam.position.x,cam.position.y,cam.position.z);
    l.setOrientation(f.x,f.y,f.z,u.x,u.y,u.z);
  }
}

/* ══════════════════════════════════════════════════════════════
   PS1 PIPELINE
   Light falls from the canopy, so height drives brightness —
   the floor is dim and the crowns are lit.
   ══════════════════════════════════════════════════════════════ */
const FOG_COL=new THREE.Color(0.267, 0.373, 0.298);
const FOG_NEAR=13, FOG_FAR=135;
const SUN_DIR=new THREE.Vector3(-0.22,0.94,-0.26).normalize();

const allMats=[];
function ps1(o){
  o=o||{};
  const uni={
    uMap:{value:o.map||null}, uRes:{value:new THREE.Vector2(320,240)},
    uTime:{value:0}, uJitter:{value:o.jitter===undefined?1:o.jitter},
    uFogCol:{value:FOG_COL}, uTint:{value:o.tint||new THREE.Color(1,1,1)},
    uCut:{value:o.cutout===undefined?-1:o.cutout}, uFlash:{value:0},
    uFogNear:{value:FOG_NEAR}, uFogFar:{value:o.fogFar||FOG_FAR},
    uSun:{value:SUN_DIR}, uAmb:{value:o.ambient===undefined?0.5:o.ambient},
    uGlow:{value:o.glow||0}, uSway:{value:o.sway||0}
  };
  const m=new THREE.ShaderMaterial({
    uniforms:uni, transparent:!!o.transparent,
    side:o.side||THREE.FrontSide,
    depthWrite:o.depthWrite===undefined?true:o.depthWrite,
    blending:o.blending||THREE.NormalBlending,
    vertexShader:[
      'uniform vec2 uRes; uniform float uJitter; uniform float uTime;',
      'uniform float uFogNear; uniform float uFogFar;',
      'uniform vec3 uSun; uniform float uAmb; uniform float uSway;',
      'varying vec2 vUv; varying float vW; varying float vFog; varying float vLit;',
      o.vertexHead||'',
      'void main(){',
      '  vec3 p = position;',
      '  vec3 n = normal;',
      o.vertexBody||'',
      '  vec4 wp = modelMatrix * vec4(p,1.0);',
      /* understory stirs; nothing here is ever quite still */
      '  wp.x += uSway * sin(uTime*0.9 + wp.z*0.3 + wp.y*0.6) * 0.09;',
      '  wp.z += uSway * cos(uTime*0.7 + wp.x*0.3) * 0.07;',
      '  vec4 mv = viewMatrix * wp;',
      '  vec4 cl = projectionMatrix * mv;',
      '  vec2 g = uRes*0.5;',
      '  cl.xy = mix(cl.xy, floor(cl.xy/cl.w*g + 0.5)/g*cl.w, uJitter);',
      '  vec3 wn = normalize(mat3(modelMatrix)*n);',
      '  float lam = uAmb + (1.0-uAmb)*max(dot(wn,uSun),0.0);',
      /* all the light in here comes down from a long way up */
      '  vLit = lam * mix(0.52, 1.30, clamp(wp.y/62.0, 0.0, 1.0));',
      '  vFog = clamp((-mv.z-uFogNear)/(uFogFar-uFogNear),0.0,1.0);',
      '  vUv = uv*cl.w; vW = cl.w;',
      '  gl_Position = cl;',
      '}'].join('\n'),
    fragmentShader:[
      'uniform sampler2D uMap; uniform float uTime; uniform vec3 uFogCol;',
      'uniform vec3 uTint; uniform float uCut; uniform float uFlash; uniform float uGlow;',
      'varying vec2 vUv; varying float vW; varying float vFog; varying float vLit;',
      'float b2(vec2 a){ a=floor(a); return fract(dot(a, vec2(0.5, a.y*0.75))); }',
      'float b4(vec2 a){ return b2(0.5*a)*0.25 + b2(a); }',
      o.fragHead||'',
      'void main(){',
      '  vec2 uv = vUv/vW;',
      o.fragBody||'  vec4 tex = texture2D(uMap, uv);',
      '  if(uCut > 0.0 && tex.a < uCut) discard;',
      '  vec3 col = tex.rgb * uTint * mix(vLit, 1.0, uGlow);',
      '  col += uFlash * vec3(0.9,1.0,0.75);',
      '  col = mix(col, uFogCol, vFog*(1.0-uGlow));',
      '  float d = b4(gl_FragCoord.xy)/0.9375;',
      '  gl_FragColor = vec4(floor(col*31.0 + d)/31.0, tex.a);',
      '}'].join('\n')
  });
  m.userData.uni=uni; allMats.push(m); return m;
}

function tex(w,h,draw){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  draw(c.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(c);
  t.magFilter=t.minFilter=THREE.NearestFilter;
  t.generateMipmaps=false; t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}
function rnd(a,b){ return a+Math.random()*(b-a); }
function tiled(t,rx,ry){ const c=t.clone(); c.needsUpdate=true; c.repeat.set(rx,ry); return c; }
function leafy(g,x,y,w,h,ang,c1,c2){
  g.save(); g.translate(x,y); g.rotate(ang);
  const grd=g.createLinearGradient(0,-h/2,0,h/2);
  grd.addColorStop(0,c1); grd.addColorStop(1,c2);
  g.fillStyle=grd;
  g.beginPath();
  g.moveTo(0,-h/2);
  g.quadraticCurveTo(w/2,0,0,h/2);
  g.quadraticCurveTo(-w/2,0,0,-h/2);
  g.fill();
  g.strokeStyle='rgba(20,44,26,.5)'; g.lineWidth=1;
  g.beginPath(); g.moveTo(0,-h/2); g.lineTo(0,h/2); g.stroke();
  g.restore();
}

let RW=320,RH=240;
function fit(){
  const w=innerWidth,h=innerHeight;
  const s=Math.max(1,Math.min(w,h)/172);
  RW=Math.max(96,Math.round(w/s)); RH=Math.max(96,Math.round(h/s));
  renderer.setSize(RW,RH,false);
  cv.style.width=w+'px'; cv.style.height=h+'px';
  cam.aspect=w/h; cam.updateProjectionMatrix();
  allMats.forEach(function(m){ m.userData.uni.uRes.value.set(RW,RH); });

function terrainH(x,z){
  const d=Math.hypot(x,z);
  let h=24*Math.exp(-(d*d)/9800);            // the hill itself — the whole grove sits on it
  h+=6.5*Math.exp(-(d*d)/700);               // and it mounds hard right under the old tree
  h+=Math.sin(x*0.041)*2.8+Math.cos(z*0.047)*2.4;
  h+=Math.sin(x*0.021-z*0.027)*3.2;          // long ridges falling off the shoulder
  h+=Math.sin(x*0.105+z*0.09)*1.25;
  h+=Math.sin(x*0.3+z*0.26)*0.3;             // hummocks underfoot
  return h;
}

/* ══════════════════════════════════════════════════════════════
   MERGING — same reasoning as Douglas
   ══════════════════════════════════════════════════════════════ */
const _q=new THREE.Quaternion(), _e=new THREE.Euler(),
      _v=new THREE.Vector3(), _sc=new THREE.Vector3();
function mat(x,y,z,rx,ry,rz,s){
  _e.set(rx||0,ry||0,rz||0); _q.setFromEuler(_e);
  _v.set(x,y,z); _sc.set(s||1,s||1,s||1);
  return new THREE.Matrix4().compose(_v,_q,_sc);
}
function mergeAll(items){
  let vc=0;
  const gs=items.map(function(it){
    const g=it.geo.index ? it.geo.toNonIndexed() : it.geo.clone();
    g.applyMatrix4(it.m);
    vc+=g.attributes.position.count;
    return g;
  });
  const pos=new Float32Array(vc*3), nor=new Float32Array(vc*3), uvs=new Float32Array(vc*2);
  let po=0,uo=0;
  gs.forEach(function(g){
    pos.set(g.attributes.position.array,po);
    if(g.attributes.normal) nor.set(g.attributes.normal.array,po);
    if(g.attributes.uv)     uvs.set(g.attributes.uv.array,uo);
    po+=g.attributes.position.count*3;
    uo+=g.attributes.position.count*2;
    g.dispose();
  });
  const out=new THREE.BufferGeometry();
  out.setAttribute('position',new THREE.BufferAttribute(pos,3));
  out.setAttribute('normal',  new THREE.BufferAttribute(nor,3));
  out.setAttribute('uv',      new THREE.BufferAttribute(uvs,2));
  return out;
}
function bake(items,material){
  if(!items.length) return null;
  const m=new THREE.Mesh(mergeAll(items),material);
  m.frustumCulled=false; scene.add(m); return m;
}

/* ══════════════════════════════════════════════════════════════
   THE BOARDWALK — it comes in from the south and rings the tree
   ══════════════════════════════════════════════════════════════ */
const walkCurve=new THREE.CatmullRomCurve3([
  new THREE.Vector3(  6,0, 138), new THREE.Vector3( -8,0, 104),
  new THREE.Vector3(  8,0,  72), new THREE.Vector3( 22,0,  46),
  new THREE.Vector3( 34,0,  16), new THREE.Vector3( 28,0, -20),
  new THREE.Vector3(  0,0, -38), new THREE.Vector3(-30,0, -24),
  new THREE.Vector3(-38,0,  10), new THREE.Vector3(-33,0,  42),
  new THREE.Vector3(-28,0,  76), new THREE.Vector3(-36,0, 140)
], false, 'catmullrom', 0.5);
const WALKN=420;
const walkPts=walkCurve.getSpacedPoints(WALKN);
walkPts.forEach(function(p){ p.y=terrainH(p.x,p.z)+1.75; });
const WALK_HALF=2.55;

function nearWalk(x,z){
  let bd=1e9, by=0;
  for(let i=0;i<walkPts.length;i++){
    const p=walkPts[i];
    const d=(p.x-x)*(p.x-x)+(p.z-z)*(p.z-z);
    if(d<bd){ bd=d; by=p.y; }
  }
  return { d:Math.sqrt(bd), y:by };
}
function groundH(x,z){
  const n=nearWalk(x,z);
  return n.d<WALK_HALF ? n.y : terrainH(x,z);
}

(function buildWalk(){
  const planks=[], rails=[];
  for(let i=1;i<walkPts.length-1;i++){
    const p=walkPts[i], a=walkPts[i-1], b=walkPts[i+1];
    const turn=Math.atan2(b.x-a.x, b.z-a.z);
    const slope=Math.atan2(b.y-a.y, Math.hypot(b.x-a.x,b.z-a.z));
    if(i%2===0)
      planks.push({geo:new THREE.BoxGeometry(5.3,0.15,1.25), m:mat(p.x,p.y,p.z,-slope,turn,0)});
    if(i%14===0){
      const gy=terrainH(p.x,p.z);
      [-2.35,2.35].forEach(function(o){
        const px=p.x+Math.cos(turn)*o, pz=p.z-Math.sin(turn)*o;
        rails.push({geo:new THREE.BoxGeometry(0.28,Math.max(0.5,p.y-gy+0.5),0.28),
                    m:mat(px,(p.y+gy)/2-0.2,pz,0,turn,0)});
        rails.push({geo:new THREE.BoxGeometry(0.15,1.0,0.15), m:mat(px,p.y+0.58,pz,0,turn,0)});
      });
    }
    if(i%4===0){
      [-2.35,2.35].forEach(function(o){
        const px=p.x+Math.cos(turn)*o, pz=p.z-Math.sin(turn)*o;
        rails.push({geo:new THREE.BoxGeometry(0.12,0.12,1.6), m:mat(px,p.y+1.03,pz,-slope,turn,0)});
      });
    }
  }
  bake(planks, ps1({map:tiled(T.plank,1,.5), ambient:0.5}));
  bake(rails,  ps1({map:tiled(T.plank,.4,2), ambient:0.42}));
})();

/* ══════════════════════════════════════════════════════════════
   THE OLD SPRUCE
   ══════════════════════════════════════════════════════════════ */
const TREE_R=20.0;

const heroBark=ps1({map:tiled(T.bark,10,9), ambient:0.42, fogFar:190});
(function heroTree(){
  const parts=[], base=terrainH(0,0);
  /* a lathe profile that flares hard at the foot and keeps going up past the fog —
     four times the tree it used to be */
  const prof=[];
  for(let i=0;i<=24;i++){
    const t=i/24, y=t*210;
    prof.push(new THREE.Vector2(13.5*Math.exp(-t*6.5)+5.2+(1-t)*2.2, y));
  }
  parts.push({geo:new THREE.LatheGeometry(prof,20), m:mat(0,base-2.5,0,0,0,0)});

  /* buttresses — each one the size of a whole ordinary trunk */
  for(let i=0;i<9;i++){
    const a=(i/9)*Math.PI*2+rnd(-0.12,0.12);
    const reach=rnd(9,15), rise=rnd(17,30), thick=rnd(1.9,3.4);
    const sh=new THREE.Shape();
    sh.moveTo(0,0); sh.lineTo(reach,0);
    sh.quadraticCurveTo(reach*0.26, rise*0.32, 0, rise);
    sh.closePath();
    const g=new THREE.ExtrudeGeometry(sh,{depth:thick,bevelEnabled:false});
    g.translate(0,0,-thick/2);
    /* the shape reaches along +X; ry=-a swings that to the radial direction */
    parts.push({geo:g, m:mat(Math.cos(a)*7.5, base-2.6, Math.sin(a)*7.5, 0, -a, 0)});
  }

  /* the root field — great gnarled arms wandering downhill, humping in and
     out of the moss, each throwing off smaller roots as it goes */
  for(let i=0;i<18;i++){
    let a=(i/18)*Math.PI*2+rnd(-0.2,0.2);
    const L=rnd(20,46), humpF=rnd(1.2,2.6), humpA=rnd(0.5,1.7);
    const pts=[];
    for(let s=0;s<=8;s++){
      const t=s/8, r=6.5+t*L;
      a+=rnd(-0.09,0.09);
      const px=Math.cos(a)*r, pz=Math.sin(a)*r;
      const hump=Math.max(0, Math.sin(t*Math.PI*humpF)*humpA*(1-t)*(1-t));
      pts.push(new THREE.Vector3(px, terrainH(px,pz)+0.3+(1-t)*(1-t)*3.8+hump, pz));
    }
    parts.push({geo:new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),16,rnd(1.0,1.9),6,false),
                m:mat(0,0,0,0,0,0)});
    /* secondaries peeling off the big one */
    for(let b=0;b<2+(Math.random()*2|0);b++){
      const bt=rnd(0.25,0.7), br=6.5+bt*L;
      let ba=a+rnd(-0.7,0.7);
      const bl=rnd(6,15), bp=[];
      for(let s=0;s<=5;s++){
        const t=s/5, r2=br+t*bl;
        ba+=rnd(-0.12,0.12);
        const px=Math.cos(ba)*r2, pz=Math.sin(ba)*r2;
        bp.push(new THREE.Vector3(px, terrainH(px,pz)+0.25+(1-t)*1.2, pz));
      }
      parts.push({geo:new THREE.TubeGeometry(new THREE.CatmullRomCurve3(bp),10,rnd(0.35,0.8),5,false),
                  m:mat(0,0,0,0,0,0)});
    }
  }
  /* root knees — short knuckles arching clear of the ground near the foot */
  for(let i=0;i<12;i++){
    const a=rnd(0,6.2832), r0=rnd(9,20), span=rnd(2.5,6);
    const x0=Math.cos(a)*r0, z0=Math.sin(a)*r0;
    const x1=Math.cos(a)*(r0+span), z1=Math.sin(a)*(r0+span);
    const midx=(x0+x1)/2, midz=(z0+z1)/2;
    const pts=[
      new THREE.Vector3(x0, terrainH(x0,z0)-0.4, z0),
      new THREE.Vector3(midx, terrainH(midx,midz)+rnd(1.2,2.8), midz),
      new THREE.Vector3(x1, terrainH(x1,z1)-0.4, z1)
    ];
    parts.push({geo:new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),8,rnd(0.5,1.1),5,false),
                m:mat(0,0,0,0,0,0)});
  }
  bake(parts, heroBark);

  /* the hollow — the chamber in the foot of the tree, facing the walk-in */
  const hs=new THREE.Shape();
  hs.moveTo(-3.6,0); hs.lineTo(3.6,0);
  hs.quadraticCurveTo(4.2,6.0, 0,10.5);
  hs.quadraticCurveTo(-4.2,6.0, -3.6,0);
  const hg=new THREE.ExtrudeGeometry(hs,{depth:1.4,bevelEnabled:false});
  const hollow=new THREE.Mesh(hg, ps1({map:T.moss, tint:new THREE.Color(0.05,0.07,0.05), ambient:0.03}));
  hollow.position.set(0, base-1.2, 18.9);
  hollow.frustumCulled=false; scene.add(hollow);
})();
/* the crown, far enough up that it climbs out of the fog entirely */
(function crown(){

})();

/* Clickables need their own material instance, or flashing one plant
   flashes every plant that shares the material. */
function ownMats(obj){
  obj.traverse(function(m){
    if(m.material && m.material.userData && m.material.userData.uni){
      const c=m.material.clone();
      c.userData={uni:c.uniforms};
      allMats.push(c);
      m.material=c;
    }
  });
  return obj;
}

const targets=[];
function place(o,kind,deg,extraMat){
  ownMats(o);
  o.userData={kind:kind,deg:deg,flash:0,extraMat:extraMat||null};
  targets.push(o); scene.add(o); return o;
}

(function forest(){
  const tr=[], nd=[];
  /* the old cohort — big trunks, close enough together to lose the sky */
  for(let i=0;i<240;i++){
    const a=rnd(0,6.2832), r=rnd(46,168);
    const x=Math.cos(a)*r, z=Math.sin(a)*r;

    const h=rnd(24,58), base=terrainH(x,z)-0.4;
    tr.push({geo:new THREE.CylinderGeometry(0.5,1.9,h,6,1), m:mat(x,base+h/2,z,0,rnd(0,6),0)});
    const tiers=5+(Math.random()*3|0);
    for(let k=0;k<tiers;k++){
      const t=k/tiers, rr=(1-t)*h*0.19+0.9;
      nd.push({geo:new THREE.ConeGeometry(rr,h*0.30,6,1),
               m:mat(x, base+h*0.30+t*h*0.64, z, 0, rnd(0,3), 0)});
    }
  }
  /* the mid-story, filling every gap the giants left */
  for(let i=0;i<220;i++){
    const a=rnd(0,6.2832), r=rnd(40,170);
    const x=Math.cos(a)*r, z=Math.sin(a)*r;
    if(nearWalk(x,z).d<3.8) continue;

    tr.push({geo:new THREE.CylinderGeometry(0.22,0.8,h,5,1), m:mat(x,base+h/2,z,0,rnd(0,6),0)});
    const tiers=4+(Math.random()*2|0);

               m:mat(x, base+h*0.30+t*h*0.62, z, 0, rnd(0,3), 0)});
    }

  /* and the saplings coming up in the dark, patient */
  for(let i=0;i<280;i++){
    const a=rnd(0,6.2832), r=rnd(36,170);
    const x=Math.cos(a)*r, z=Math.sin(a)*r;

/* ══════════════════════════════════════════════════════════════
   THE DEER
   A wander loop with four states. This is the NPC that Hilyard
   and Reedway will both be built on, so it's written to be reused.
   ══════════════════════════════════════════════════════════════ */
const hideMat =ps1({map:T.hide, ambient:0.54});
const hideDark=ps1({map:T.hide, tint:new THREE.Color(0.55,0.5,0.45), ambient:0.5});
const deerList=[];

function buildDeer(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.62,0.72,1.42),hideMat);
  body.position.y=0.95; g.add(body);
  const rump=new THREE.Mesh(new THREE.BoxGeometry(0.58,0.6,0.4),hideMat);
  rump.position.set(0,0.98,-0.72); g.add(rump);

  const neck=new THREE.Mesh(new THREE.BoxGeometry(0.28,0.62,0.3),hideMat);
  neck.position.set(0,0.3,0.28); neck.rotation.x=-0.5;
  const head=new THREE.Mesh(new THREE.BoxGeometry(0.24,0.26,0.5),hideMat);
  head.position.set(0,0.36,0.12); head.rotation.x=0.55; neck.add(head);
  const snout=new THREE.Mesh(new THREE.BoxGeometry(0.16,0.16,0.22),hideDark);
  snout.position.set(0,-0.03,0.32); head.add(snout);
  [-1,1].forEach(function(s){
    const ear=new THREE.Mesh(new THREE.PlaneGeometry(0.16,0.3),hideMat);
    ear.position.set(s*0.15,0.14,-0.1); ear.rotation.set(0,s*0.7,s*0.35);
    head.add(ear);
  });
  const neckPivot=new THREE.Object3D();
  neckPivot.position.set(0,1.15,0.6); neckPivot.add(neck); g.add(neckPivot);

  const tail=new THREE.Mesh(new THREE.BoxGeometry(0.14,0.3,0.1),hideDark);
  tail.position.set(0,1.12,-0.94); g.add(tail);

  const legs=[];
  [[0.22,0.52],[-0.22,0.52],[0.22,-0.5],[-0.22,-0.5]].forEach(function(p){
    const pv=new THREE.Object3D();
    pv.position.set(p[0],0.66,p[1]);
    const l=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.68,0.14),hideMat);
    l.position.y=-0.34; pv.add(l);
    const hoof=new THREE.Mesh(new THREE.BoxGeometry(0.13,0.12,0.16),hideDark);
    hoof.position.y=-0.66; pv.add(hoof);
    g.add(pv); legs.push(pv);
  });
  g.userData_parts={ legs:legs, neck:neckPivot, tail:tail };
  return g;
}

function Deer(x,z,deg){
  this.g=buildDeer();
  this.g.position.set(x, terrainH(x,z), z);
  this.heading=rnd(0,6.2832);
  this.g.rotation.y=this.heading;
  this.state='graze'; this.timer=rnd(1,6);
  this.tx=x; this.tz=z; this.travel=0; this.speed=0;
  this.deg=deg;
  place(this.g,'deer',deg);
  deerList.push(this);
}
Deer.prototype.newTarget=function(far){
  const a=rnd(0,6.2832), r=far?rnd(22,44):rnd(7,20);
  this.tx=Math.max(-150,Math.min(150,this.g.position.x+Math.cos(a)*r));
  this.tz=Math.max(-150,Math.min(150,this.g.position.z+Math.sin(a)*r));
  /* nothing walks through the old tree */
  if(Math.hypot(this.tx,this.tz)<TREE_R+3){
    const a2=Math.atan2(this.tz,this.tx);
    this.tx=Math.cos(a2)*(TREE_R+6); this.tz=Math.sin(a2)*(TREE_R+6);
  }
};
Deer.prototype.startle=function(){
  this.state='flee'; this.timer=rnd(2.5,4.5); this.newTarget(true);
  snort(this.g.position);
};
Deer.prototype.update=function(dt,camPos){
  const p=this.g.position;
  const pd=Math.hypot(p.x-camPos.x, p.z-camPos.z);

  if(this.state!=='flee' && pd<8.5 && Math.random()<dt*2.2) this.startle();

  this.timer-=dt;
  if(this.state==='graze'){
    this.speed+=(0-this.speed)*Math.min(1,dt*4);
    if(this.timer<=0){ this.state='walk'; this.timer=rnd(4,10); this.newTarget(false); }
  } else if(this.state==='walk'||this.state==='flee'){
    const tgt=this.state==='flee'?3.9:1.35;
    this.speed+=(tgt-this.speed)*Math.min(1,dt*2.6);
    const dx=this.tx-p.x, dz=this.tz-p.z;
    const d=Math.hypot(dx,dz);
    if(d<1.4 || this.timer<=0){
      this.state='graze'; this.timer=rnd(3,9);
    } else {
      const want=Math.atan2(dx,dz);
      let diff=want-this.heading;
      while(diff> Math.PI) diff-=Math.PI*2;
      while(diff<-Math.PI) diff+=Math.PI*2;
      this.heading+=diff*Math.min(1,dt*2.6);
      p.x+=Math.sin(this.heading)*this.speed*dt;
      p.z+=Math.cos(this.heading)*this.speed*dt;
      this.travel+=this.speed*dt;
    }
  }
  /* never let one clip into the trunk */
  const dc=Math.hypot(p.x,p.z);
  if(dc<TREE_R+2.2){
    const a=Math.atan2(p.z,p.x);
    p.x=Math.cos(a)*(TREE_R+2.2); p.z=Math.sin(a)*(TREE_R+2.2);
  }
  p.y=terrainH(p.x,p.z);
  this.g.rotation.y=this.heading;

  const P=this.g.userData_parts;
  const sw=Math.sin(this.travel*3.1)*Math.min(1,this.speed*0.42);
  P.legs[0].rotation.x= sw;  P.legs[1].rotation.x=-sw;
  P.legs[2].rotation.x=-sw;  P.legs[3].rotation.x= sw;
  const down=this.state==='graze'?1:0;
  P.neck.rotation.x += ((down*1.15) - P.neck.rotation.x)*Math.min(1,dt*2.2);
  P.tail.rotation.x=Math.sin(this.travel*7+this.deg)*0.25*(this.state==='flee'?2.4:1);
  this.g.position.y += Math.abs(Math.sin(this.travel*3.1))*0.05*Math.min(1,this.speed*0.4);
};

const ray=new THREE.Raycaster(), ndc=new THREE.Vector2();
const PRIORITY={deer:7,berry:6,skunk:6,devil:6,salal:5,plank:2,spruce:3};
function owner(o){ while(o){ if(o.userData&&o.userData.kind) return o; o=o.parent; } return null; }

function shoot(cx,cy){
  ndc.x=(cx/innerWidth)*2-1; ndc.y=-(cy/innerHeight)*2+1;
  ray.setFromCamera(ndc,cam);
  const hits=ray.intersectObjects(targets,true);
  let best=null,bp=-1;
  for(let i=0;i<hits.length;i++){
    const o=owner(hits[i].object); if(!o) continue;
    const p=PRIORITY[o.userData.kind]||0;
    if(p>bp){ bp=p; best=o; if(p>=7) break; }
  }
  if(!best) return;
  const k=best.userData.kind, wp=new THREE.Vector3();
  best.getWorldPosition(wp);
  touchSound(k,wp,best.userData.deg);
  best.userData.flash=1;

  if(k==='deer'){
    for(let i=0;i<deerList.length;i++)
      if(deerList[i].g===best){ setTimeout(function(d){ return function(){ d.startle(); }; }(deerList[i]), 320); break; }
  }

  const n=document.getElementById('name');
  n.textContent=LABEL[k];
  n.style.color = k==='spruce'?'#B9A27E' : k==='skunk'?'#F2D24B' :
                  k==='berry' ?'#F0925A' : k==='devil'?'#B8DC8A' :
                  k==='deer'  ?'#D2B08A' : k==='salal'?'#7FC48A' : '#A8B49A';
  n.classList.remove('show'); void n.offsetWidth; n.classList.add('show');
}

   LOOP
   ══════════════════════════════════════════════════════════════ */
const clock=new THREE.Clock();
let bob=0, nextDrip=1, nextThrush=8;

function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),0.05), t=clock.elapsedTime;

  let ix=move.x, iy=move.y;
  if(keys['w']||keys['arrowup'])   iy-=1;
  if(keys['s']||keys['arrowdown']) iy+=1;
  if(keys['a']||keys['arrowleft']) ix-=1;
  if(keys['d']||keys['arrowright'])ix+=1;
  const mag=Math.min(1,Math.hypot(ix,iy));
  if(mag>0.04){
    const sp=10.5*dt*mag, den=Math.hypot(ix,iy)||1;
    const nx=ix/den, ny=iy/den;
    const fx=-Math.sin(yaw), fz=-Math.cos(yaw);
    const rx= Math.cos(yaw), rz=-Math.sin(yaw);
    cam.position.x+=(fx*(-ny)+rx*nx)*sp;
    cam.position.z+=(fz*(-ny)+rz*nx)*sp;
    bob+=sp*0.9;
  }
  cam.position.x=Math.max(-155,Math.min(155,cam.position.x));
  cam.position.z=Math.max(-155,Math.min(155,cam.position.z));
  /* you can walk right up to the trunk but not into it */
  const dc=Math.hypot(cam.position.x,cam.position.z);
  if(dc<TREE_R){
    const a=Math.atan2(cam.position.z,cam.position.x);
    cam.position.x=Math.cos(a)*TREE_R; cam.position.z=Math.sin(a)*TREE_R;
  }
  cam.position.y=groundH(cam.position.x,cam.position.z)+2.25+Math.sin(bob*1.9)*0.055*mag;
  cam.rotation.y=yaw; cam.rotation.x=pitch;
  sky.position.copy(cam.position);

  deerList.forEach(function(d){ d.update(dt,cam.position); });

  shafts.forEach(function(s,i){ s.rotation.y=t*0.03+i; });
  shaftMat.uniforms.uTime.value=t;

  if(ready && t>nextDrip){ drip(); nextDrip=t+rnd(0.5,3.4); }
  if(ready && t>nextThrush){ thrush(); nextThrush=t+rnd(22,55); }

  targets.forEach(function(o){
    const u=o.userData;
    if(u.flash>0){
      u.flash=Math.max(0,u.flash-dt*2.2);
      o.traverse(function(m){
        if(m.material&&m.material.userData&&m.material.userData.uni)
          m.material.userData.uni.uFlash.value=u.flash*0.5;
      });
      if(u.extraMat) u.extraMat.userData.uni.uFlash.value=u.flash*0.4;
    }
  });

  allMats.forEach(function(m){ m.userData.uni.uTime.value=t; });
  updateListener(cam);
  renderer.render(scene,cam);
}

document.getElementById('go').addEventListener('click',function(){
  if(!ready){ try{ ready=initAudio(); }catch(e){ ready=false; }
    if(ready && ac.state==='suspended') ac.resume(); }
  const s=document.getElementById('start');
  s.classList.add('gone');
  setTimeout(function(){ s.style.display='none'; },1050);
});
document.addEventListener('visibilitychange',function(){
  if(!ac) return;
  if(document.hidden) ac.suspend(); else ac.resume();
});

fit(); tick();
})();
</script>
</body>
