<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reedway">
<meta name="theme-color" content="#7FA8CC">
<title>Reedway</title>
<style>
  :root{
    --sky:#7FA8CC; --brick:#A85A3E; --neon:#FF3B6B; --amber:#FFB24A; --pale:#F4EFE6;
    --display: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    height:100%; width:100%; overflow:hidden; background:var(--sky); color:var(--pale);
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent; overscroll-behavior:none; touch-action:none;
  }
  #c{ position:fixed; inset:0; display:block; touch-action:none;
      image-rendering:pixelated; image-rendering:-webkit-optimize-contrast; }
  /* warms up and closes in when you step inside */
  #room{
    position:fixed; inset:0; pointer-events:none; z-index:2; opacity:0;
    transition:opacity .5s ease;
    background:radial-gradient(ellipse at 50% 46%, transparent 24%, rgba(28,10,6,.72) 100%);
  }
  #stick{
    position:fixed; z-index:5;
    right:calc(env(safe-area-inset-right,0px) + 22px);
    bottom:calc(env(safe-area-inset-bottom,0px) + 30px);
    width:122px; height:122px; border-radius:50%;
    border:1px solid rgba(244,239,230,.3); background:rgba(30,44,60,.24);
    backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px); touch-action:none;
  }
  #knob{
    position:absolute; left:50%; top:50%; width:50px; height:50px; margin:-25px 0 0 -25px;
    border-radius:50%; border:1px solid rgba(255,178,74,.6); background:rgba(255,178,74,.16);
    transition:background .2s;
  }
  #stick.on #knob{ background:rgba(255,178,74,.32); }
  #name{
    position:fixed; z-index:6; left:0; right:0;
    bottom:calc(env(safe-area-inset-bottom,0px) + 172px);
    text-align:center; pointer-events:none;
    font-family:var(--display); font-style:italic; font-size:1.5rem;
    opacity:0; text-shadow:0 2px 14px rgba(10,16,28,.7);
  }
  #name.show{ animation:nm 2s cubic-bezier(.16,1,.3,1) forwards; }
  @keyframes nm{
    0%{opacity:0; transform:translateY(8px);} 14%{opacity:1; transform:translateY(0);}
    66%{opacity:1;} 100%{opacity:0; transform:translateY(-10px);}
  }
  #back{
    position:fixed; z-index:6;
    left:calc(env(safe-area-inset-left,0px) + 18px);
    top:calc(env(safe-area-inset-top,0px) + 16px);
    padding:9px 17px; background:rgba(22,32,46,.5);
    border:1px solid rgba(244,239,230,.3); color:rgba(244,239,230,.9);
    font-family:var(--mono); font-size:.58rem; letter-spacing:.2em; text-transform:uppercase;
    text-decoration:none; -webkit-appearance:none; cursor:pointer;
  }
  #back:active{ background:rgba(244,239,230,.2); }
  #hud{
    position:fixed; z-index:5; left:calc(env(safe-area-inset-left,0px) + 20px);
    bottom:calc(env(safe-area-inset-bottom,0px) + 34px);
    font-family:var(--mono); font-size:.58rem; letter-spacing:.18em;
    text-transform:uppercase; color:rgba(244,239,230,.5); pointer-events:none; line-height:2;
    text-shadow:0 1px 4px rgba(10,16,28,.6);
  }
  #start{
    position:fixed; inset:0; z-index:20; background:#22303F;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 34px; transition:opacity 1s ease;
  }
  #start.gone{ opacity:0; pointer-events:none; }
  #start h1{
    font-family:var(--display); font-weight:400; font-size:clamp(2.8rem,15vw,4.2rem);
    letter-spacing:-.02em; color:var(--amber); text-shadow:0 0 60px rgba(255,178,74,.3);
  }
  #start .rule{ width:52px; height:1px; background:var(--neon); margin:24px 0 22px; }
  #start p{
    font-family:var(--display); font-size:1rem; line-height:1.65;
    color:rgba(244,239,230,.74); text-align:center; max-width:20.5rem;
  }
  #go{
    margin-top:38px; padding:15px 42px; background:transparent; color:var(--amber);
    border:1px solid rgba(255,178,74,.5); border-radius:999px;
    font-family:var(--display); font-size:1.05rem; letter-spacing:.06em;
    cursor:pointer; -webkit-appearance:none;
  }
  #go:active{ background:rgba(255,178,74,.14); }
  #go:focus-visible{ outline:2px solid var(--amber); outline-offset:4px; }
  #load{
    position:absolute; bottom:calc(env(safe-area-inset-bottom,0px) + 30px);
    font-family:var(--mono); font-size:.6rem; letter-spacing:.2em;
    text-transform:uppercase; color:rgba(255,59,107,.9);
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="room"></div>
<div id="name"></div>
<a id="back" href="index.html">&larr; the house</a>
<div id="hud">drag to look<br>the bar is open</div>
<div id="stick"><div id="knob"></div></div>

<div id="start">
  <h1>Reedway</h1>
  <div class="rule"></div>
  <p>The square, mid-afternoon. Train every minute or so, carts and coffee on the east side, stalls on the west, pigeons everywhere, and a door beyond the stalls that's darker inside than it looks.</p>
  <button id="go" disabled>Loading</button>
  <div id="load">Fetching three.js</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
(function(){
if(typeof THREE==='undefined'){
  document.getElementById('load').textContent='three.js failed to load — check connection';
  return;
}
document.getElementById('go').disabled=false;
document.getElementById('go').textContent='Step out';
document.getElementById('load').textContent='Sound begins on touch';

function rnd(a,b){ return a+Math.random()*(b-a); }

/* ══════════════════════════════════════════════════════════════
   WAVETABLES
   ══════════════════════════════════════════════════════════════ */
function spectrum(f,K){
  K=K||48; const real=[0], imag=[0];
  for(let k=1;k<=K;k++){ real.push(0); imag.push(f(k)); }
  return {real:real, imag:imag};
}
const WAVETABLES={
  max:    spectrum(function(k){ return Math.pow(k,-1.4)*(k<10?1:0.2); }),
  cart:   spectrum(function(k){ return Math.pow(k,-1.0)*Math.exp(-Math.pow((k-6)/9,2)); }),
  person: spectrum(function(k){ return Math.pow(k,-1.1)*Math.exp(-Math.pow((k-5)/8,2)); }),
  plane:  spectrum(function(k){ return Math.pow(k,-2.4); }),
  water:  spectrum(function(k){ return Math.pow(k,-1.7)*(k%2===1?1:0.6); }),
  juke:   spectrum(function(k){ return k%2===1?Math.pow(k,-0.8):Math.pow(k,-2.2)*0.4; }),
  taps:   spectrum(function(k){
            const p=[1,3,5,9,14,20]; let v=0;
            for(let i=0;i<p.length;i++) if(k===p[i]) v=Math.pow(i+1,-1.0);
            return v; }),
  neon:   spectrum(function(k){ return Math.pow(k,-0.6)*Math.exp(-Math.pow((k-11)/9,2)); }),
  stall:  spectrum(function(k){
            const p=[1,4,10,16]; let v=0;
            for(let i=0;i<p.length;i++) if(k===p[i]) v=Math.pow(i+1,-0.9);
            return v; }),
  statue: spectrum(function(k){
            const p=[1,2,3,5,8]; let v=0;
            for(let i=0;i<p.length;i++) if(k===p[i]) v=Math.pow(i+1,-0.7);
            return v; }),
  coffee: spectrum(function(k){ return (k%2===1?1:0.25)*Math.pow(k,-0.9)*Math.exp(-Math.pow((k-9)/7,2)); })
};
const PATCH={
  max:    { semis:-12, dur:5.0, atk:0.03, cut:1400, q:1.4, gain:0.30, roll:34 },
  cart:   { semis:  0, dur:2.6, atk:0.02, cut:2600, q:2.2, gain:0.20, roll:13 },
  person: { semis:  5, dur:2.4, atk:0.06, cut:2400, q:2.2, gain:0.18, roll:14 },
  plane:  { semis:-24, dur:7.0, atk:1.20, cut: 420, q:1.0, gain:0.34, roll:160 },
  water:  { semis:  7, dur:4.0, atk:0.30, cut:3600, q:1.6, gain:0.18, roll:16 },
  juke:   { semis:-12, dur:3.2, atk:0.004,cut:1700, q:3.0, gain:0.28, roll:8 },
  taps:   { semis: 12, dur:3.0, atk:0.006,cut:5200, q:1.2, gain:0.18, roll:7 },
  neon:   { semis: 19, dur:3.6, atk:0.05, cut:6400, q:1.4, gain:0.15, roll:7 },
  stall:  { semis:  7, dur:1.9, atk:0.008,cut:3400, q:1.6, gain:0.20, roll:12 },
  statue: { semis: -5, dur:5.5, atk:0.01, cut:1900, q:1.8, gain:0.24, roll:20 },
  coffee: { semis: 12, dur:2.2, atk:0.01, cut:5200, q:1.4, gain:0.13, roll:10 }
};
const LABEL={ max:'the train', cart:'a cart', person:'somebody', plane:'something high up',
              water:'the falls', juke:'the jukebox', taps:'the taps', neon:'the sign',
              stall:'a stall', statue:'the man with the umbrella', coffee:'the coffee stand',
              bird:'a pigeon', dog:'a good dog', wm:'the weather machine', sun:'the sun' };
const ROOT=48;                              // C3
const DEG=[0,3,5,6,7,10,12,15];             // blues — for the room at the end
function mtof(m){ return 440*Math.pow(2,(m-69)/12); }

/* ══════════════════════════════════════════════════════════════
   AUDIO
   ══════════════════════════════════════════════════════════════ */
let ac=null, master=null, verbIn=null, waves={}, ready=false;
let streetGain=null, streetLP=null, crowdGain=null;
let barGain=null, barPan=null, jukeBus=null, railGain=null, railPan=null;
let fallsGain=null, echoGain=null;

function impulse(sec,decay){
  const n=Math.floor(ac.sampleRate*sec), b=ac.createBuffer(2,n,ac.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=b.getChannelData(ch);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,decay);
  }
  return b;
}
function noiseBuf(sec,smooth){
  const n=Math.floor(ac.sampleRate*sec), b=ac.createBuffer(1,n,ac.sampleRate);
  const d=b.getChannelData(0); let last=0;
  for(let i=0;i<n;i++){ last=last*smooth+(Math.random()*2-1)*(1-smooth); d[i]=last*(1/(1-smooth))*0.6; }
  return b;
}
function panner(x,y,z,ref){
  const p=ac.createPanner();
  p.panningModel='HRTF'; p.distanceModel='inverse';
  p.refDistance=ref||20; p.maxDistance=900; p.rolloffFactor=1;
  if(p.positionX){ p.positionX.value=x; p.positionY.value=y; p.positionZ.value=z; }
  else p.setPosition(x,y,z);
  return p;
}
function movePan(p,v){
  if(!p) return;
  if(p.positionX){
    const t=ac.currentTime;
    p.positionX.setTargetAtTime(v.x,t,0.05);
    p.positionY.setTargetAtTime(v.y,t,0.05);
    p.positionZ.setTargetAtTime(v.z,t,0.05);
  } else p.setPosition(v.x,v.y,v.z);
}

const BAR={ x:-76, z:-16, w:18, d:22, h:5.4, doorZ:-16, doorW:3.6 };

function initAudio(){
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC) return false;
  ac=new AC();
  master=ac.createGain(); master.gain.value=0.0001;
  const comp=ac.createDynamicsCompressor();
  comp.threshold.value=-15; comp.knee.value=24; comp.ratio.value=5;
  comp.attack.value=0.005; comp.release.value=0.3;
  master.connect(comp); comp.connect(ac.destination);
  master.gain.setTargetAtTime(0.9, ac.currentTime, 0.7);

  const conv=ac.createConvolver(); conv.buffer=impulse(2.4,3.0);
  const lv=ac.createGain(); lv.gain.value=0.44;
  verbIn=ac.createGain(); verbIn.connect(conv); conv.connect(lv); lv.connect(master);

  for(const k in WAVETABLES){
    const w=WAVETABLES[k];
    waves[k]=ac.createPeriodicWave(Float32Array.from(w.real), Float32Array.from(w.imag),
                                   {disableNormalization:false});
  }

  /* everything outdoors runs through one filter, so the whole street
     can go muffled the moment the door shuts behind you */
  streetLP=ac.createBiquadFilter();
  streetLP.type='lowpass'; streetLP.frequency.value=14000; streetLP.Q.value=0.4;
  streetLP.connect(master);
  const sv=ac.createGain(); sv.gain.value=0.4; streetLP.connect(sv); sv.connect(verbIn);

  const s1=ac.createBufferSource(); s1.buffer=noiseBuf(6,0.968); s1.loop=true;
  const f1=ac.createBiquadFilter(); f1.type='lowpass'; f1.frequency.value=300;
  streetGain=ac.createGain(); streetGain.gain.value=0.085;
  s1.connect(f1); f1.connect(streetGain); streetGain.connect(streetLP); s1.start();

  const s2=ac.createBufferSource(); s2.buffer=noiseBuf(6,0.90); s2.loop=true;
  const f2=ac.createBiquadFilter(); f2.type='bandpass'; f2.frequency.value=680; f2.Q.value=0.7;
  crowdGain=ac.createGain(); crowdGain.gain.value=0.05;
  s2.connect(f2); f2.connect(crowdGain); crowdGain.connect(streetLP); s2.start();

  /* rail hum, parked on the train and moved with it */
  const s3=ac.createBufferSource(); s3.buffer=noiseBuf(5,0.955); s3.loop=true;
  const f3=ac.createBiquadFilter(); f3.type='bandpass'; f3.frequency.value=170; f3.Q.value=1.1;
  railGain=ac.createGain(); railGain.gain.value=0.0001;
  railPan=panner(0,2,38,30);
  s3.connect(f3); f3.connect(railGain); railGain.connect(railPan); railPan.connect(streetLP);
  s3.start();

  /* the falls never stop either */
  const s5=ac.createBufferSource(); s5.buffer=noiseBuf(5,0.80); s5.loop=true;
  const f5=ac.createBiquadFilter(); f5.type='bandpass'; f5.frequency.value=2400; f5.Q.value=0.6;
  fallsGain=ac.createGain(); fallsGain.gain.value=0.11;
  const fpan=panner(-32,1.4,0,9);
  s5.connect(f5); f5.connect(fallsGain); fallsGain.connect(fpan); fpan.connect(streetLP);
  s5.start();

  /* stand dead centre of the bowl and the square answers back */
  const ed=ac.createDelay(0.5); ed.delayTime.value=0.17;
  const ef=ac.createGain(); ef.gain.value=0.34;
  echoGain=ac.createGain(); echoGain.gain.value=0.0001;
  streetLP.connect(ed); ed.connect(ef); ef.connect(ed);
  ed.connect(echoGain); echoGain.connect(master);

  /* inside: room tone, a jukebox, glassware */
  barPan=panner(BAR.x,2,BAR.z,7);
  barPan.connect(master);
  const bv=ac.createGain(); bv.gain.value=0.75; barPan.connect(bv); bv.connect(verbIn);
  barGain=ac.createGain(); barGain.gain.value=0.0001; barGain.connect(barPan);
  const s4=ac.createBufferSource(); s4.buffer=noiseBuf(6,0.93); s4.loop=true;
  const f4=ac.createBiquadFilter(); f4.type='bandpass'; f4.frequency.value=520; f4.Q.value=0.6;
  s4.connect(f4); f4.connect(barGain); s4.start();
  jukeBus=ac.createGain(); jukeBus.gain.value=0.0001;
  const jf=ac.createBiquadFilter(); jf.type='lowpass'; jf.frequency.value=2100; jf.Q.value=0.7;
  jukeBus.connect(jf); jf.connect(barPan);

  [65.4,65.7,98.0].forEach(function(f){
    const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f;
    const g=ac.createGain(); g.gain.value=0.022;
    o.connect(g); g.connect(master); o.start();
  });
  return true;
}

/* the MAX door chime — two tones, then the doors */
function chime(pos){
  if(!ready) return;
  const t=ac.currentTime+0.02;
  const p=panner(pos.x,pos.y,pos.z,26); p.connect(streetLP);
  const pv=ac.createGain(); pv.gain.value=0.7; p.connect(pv); pv.connect(verbIn);
  [[880,0],[1174,0.16],[880,0.32]].forEach(function(n){
    const o=ac.createOscillator(); o.type='sine'; o.frequency.value=n[0];
    const g=ac.createGain();
    g.gain.setValueAtTime(0.0001,t+n[1]);
    g.gain.linearRampToValueAtTime(0.15,t+n[1]+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+n[1]+0.42);
    o.connect(g); g.connect(p); o.start(t+n[1]); o.stop(t+n[1]+0.45);
  });
  /* hiss of the doors */
  const n=Math.floor(ac.sampleRate*0.7), b=ac.createBuffer(1,n,ac.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,1.6);
  const src=ac.createBufferSource(); src.buffer=b;
  const hf=ac.createBiquadFilter(); hf.type='bandpass'; hf.frequency.value=3400; hf.Q.value=0.9;
  const hg=ac.createGain(); hg.gain.value=0.10;
  src.connect(hf); hf.connect(hg); hg.connect(p); src.start(t+0.5);
}
/* glass on wood */
function clink(){
  if(!ready) return;
  const t=ac.currentTime+0.01;
  [1,2.4,4.1].forEach(function(r,i){
    const o=ac.createOscillator(); o.type='sine';
    o.frequency.value=(1500+Math.random()*900)*r;
    const g=ac.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(0.055/(1+i*1.6),t+0.003);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.5-i*0.12);
    o.connect(g); g.connect(barPan); o.start(t); o.stop(t+0.55);
  });
}

/* the crossing bell — one bright strike, rung in pairs */
function bellStrike(x,when,amp,f0){
  const p=panner(x,3.4,TRACK_Z,30); p.connect(streetLP);
  const pv=ac.createGain(); pv.gain.value=0.5; p.connect(pv); pv.connect(verbIn);
  [[1,1.0,1.1],[2.02,0.55,0.75],[2.96,0.34,0.5],[4.13,0.2,0.36],[5.42,0.11,0.26]]
  .forEach(function(q){
    const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f0*q[0];
    const g=ac.createGain();
    g.gain.setValueAtTime(0.0001,when);
    g.gain.linearRampToValueAtTime(amp*q[1],when+0.004);
    g.gain.exponentialRampToValueAtTime(0.0001,when+q[2]);
    o.connect(g); g.connect(p); o.start(when); o.stop(when+q[2]+0.05);
  });
  const n=Math.floor(ac.sampleRate*0.03), b=ac.createBuffer(1,n,ac.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2);
  const s=ac.createBufferSource(); s.buffer=b;
  const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=3200; bp.Q.value=1.2;
  const bg=ac.createGain(); bg.gain.value=amp*0.5;
  s.connect(bp); bp.connect(bg); bg.connect(p); s.start(when);
}
function dingDing(x){
  if(!ready) return;
  const t=ac.currentTime+0.02;
  bellStrike(x,t,0.16,1085);
  bellStrike(x,t+0.21,0.13,1101);
}
/* a pigeon, saying what pigeons say */
function coo(pos){
  if(!ready) return;
  const t=ac.currentTime+0.02;
  const p=panner(pos.x,pos.y,pos.z,7); p.connect(streetLP);
  [0,0.42].forEach(function(off,i){
    const o=ac.createOscillator(); o.type='sine'; o.frequency.value=330-i*24;
    const vib=ac.createOscillator(); vib.frequency.value=7.5;
    const vg=ac.createGain(); vg.gain.value=22;
    vib.connect(vg); vg.connect(o.frequency);
    const g=ac.createGain();
    g.gain.setValueAtTime(0.0001,t+off);
    g.gain.linearRampToValueAtTime(0.05,t+off+0.09);
    g.gain.exponentialRampToValueAtTime(0.0001,t+off+0.36);
    o.connect(g); g.connect(p);
    o.start(t+off); o.stop(t+off+0.4); vib.start(t+off); vib.stop(t+off+0.4);
  });
}
/* and their wings when they change their mind */
function flutter(pos){
  if(!ready) return;
  const t=ac.currentTime+0.01;
  const p=panner(pos.x,pos.y+0.6,pos.z,8); p.connect(streetLP);
  for(let i=0;i<6;i++){
    const n=Math.floor(ac.sampleRate*0.035), b=ac.createBuffer(1,n,ac.sampleRate);
    const d=b.getChannelData(0);
    for(let j=0;j<n;j++) d[j]=(Math.random()*2-1)*Math.pow(1-j/n,1.4);
    const s=ac.createBufferSource(); s.buffer=b;
    const f=ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1700+i*120; f.Q.value=0.9;
    const g=ac.createGain(); g.gain.value=0.055;
    s.connect(f); f.connect(g); g.connect(p); s.start(t+i*0.055);
  }
}
/* two yips, tail included free of charge */
function bark(pos){
  if(!ready) return;
  const t=ac.currentTime+0.01;
  [0,0.22].forEach(function(off){
    const o=ac.createOscillator(); o.type='square';
    o.frequency.setValueAtTime(640,t+off);
    o.frequency.exponentialRampToValueAtTime(360,t+off+0.09);
    const f=ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=980; f.Q.value=1.4;
    const g=ac.createGain();
    g.gain.setValueAtTime(0.0001,t+off);
    g.gain.linearRampToValueAtTime(0.13,t+off+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+off+0.13);
    const p=panner(pos.x,pos.y,pos.z,10); p.connect(streetLP);
    o.connect(f); f.connect(g); g.connect(p); o.start(t+off); o.stop(t+off+0.16);
  });
}
/* the wand, the milk, the little porcelain tap on the saucer */
function steam(pos){
  if(!ready) return;
  const t=ac.currentTime+0.02;
  const p=panner(pos.x,pos.y,pos.z,9); p.connect(streetLP);
  const n=Math.floor(ac.sampleRate*0.9), b=ac.createBuffer(1,n,ac.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,0.7);
  const s=ac.createBufferSource(); s.buffer=b;
  const f=ac.createBiquadFilter(); f.type='bandpass'; f.Q.value=1.1;
  f.frequency.setValueAtTime(2200,t);
  f.frequency.exponentialRampToValueAtTime(5200,t+0.7);
  const g=ac.createGain(); g.gain.value=0.07;
  s.connect(f); f.connect(g); g.connect(p); s.start(t);
  [2600,4300].forEach(function(fr,i){
    const o=ac.createOscillator(); o.type='sine'; o.frequency.value=fr;
    const og=ac.createGain();
    og.gain.setValueAtTime(0.0001,t+0.95);
    og.gain.linearRampToValueAtTime(0.045/(1+i),t+0.955);
    og.gain.exponentialRampToValueAtTime(0.0001,t+1.3);
    o.connect(og); og.connect(p); o.start(t+0.95); o.stop(t+1.35);
  });
}
/* a small municipal fanfare */

  const pv=ac.createGain(); pv.gain.value=0.6; p.connect(pv); pv.connect(verbIn);

/* the jukebox never stops, it just gets quieter when you leave */
const RIFF=[0,0,10,0,12,10,7,0, 0,0,10,0,15,14,12,10];
let jukeNext=0, jukeStep=0;
function jukePump(){
  if(!ready || !jukeBus) return;
  const SPB=0.1875;                                    // 16ths at 80 bpm
  if(jukeNext===0) jukeNext=ac.currentTime+0.1;
  while(jukeNext < ac.currentTime+0.5){
    const st=jukeNext, i=jukeStep%16;
    const n=RIFF[i];
    if(i%2===0 || Math.random()<0.4){
      const o=ac.createOscillator(); o.type='sawtooth';
      o.frequency.value=mtof(ROOT-12+n);
      const f=ac.createBiquadFilter(); f.type='lowpass';
      f.frequency.setValueAtTime(1500,st);
      f.frequency.exponentialRampToValueAtTime(420,st+0.3); f.Q.value=4;
      const g=ac.createGain();
      g.gain.setValueAtTime(0.0001,st);
      g.gain.linearRampToValueAtTime(0.13,st+0.008);
      g.gain.exponentialRampToValueAtTime(0.0001,st+0.34);
      o.connect(f); f.connect(g); g.connect(jukeBus);
      o.start(st); o.stop(st+0.36);
    }
    if(i===4||i===12){                                  // a chord on the back beat
      [0,3,7,10].forEach(function(iv,k){
        const o=ac.createOscillator(); o.type='triangle';
        o.frequency.value=mtof(ROOT+12+iv);
        const g=ac.createGain();
        g.gain.setValueAtTime(0.0001,st);
        g.gain.linearRampToValueAtTime(0.035/(1+k*0.5),st+0.01);
        g.gain.exponentialRampToValueAtTime(0.0001,st+0.5);
        o.connect(g); g.connect(jukeBus); o.start(st); o.stop(st+0.55);
      });
    }
    if(i%4===2){                                        // brushed snare
      const nn=Math.floor(ac.sampleRate*0.14), b=ac.createBuffer(1,nn,ac.sampleRate);
      const d=b.getChannelData(0);
      for(let j=0;j<nn;j++) d[j]=(Math.random()*2-1)*Math.pow(1-j/nn,4);
      const s=ac.createBufferSource(); s.buffer=b;
      const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2400; bp.Q.value=0.8;
      const g=ac.createGain(); g.gain.value=0.05;
      s.connect(bp); bp.connect(g); g.connect(jukeBus); s.start(st);
    }
    jukeStep++; jukeNext+=SPB;
  }
}

let voices=0;
function touchSound(kind,pos,degree){
  if(!ready || voices>16) return;
  const P=PATCH[kind], t=ac.currentTime+0.01;
  voices++;
  const o=ac.createOscillator();
  o.setPeriodicWave(waves[kind]);
  o.frequency.value=mtof(ROOT+P.semis+DEG[degree%DEG.length]);
  const f=ac.createBiquadFilter(); f.type='lowpass'; f.Q.value=P.q;
  f.frequency.setValueAtTime(P.cut*0.35,t);
  f.frequency.linearRampToValueAtTime(P.cut, t+Math.max(P.atk,0.08));
  f.frequency.exponentialRampToValueAtTime(P.cut*0.3, t+P.dur);
  const g=ac.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(P.gain, t+P.atk);
  g.gain.exponentialRampToValueAtTime(0.0001, t+P.dur);
  const p=panner(pos.x,pos.y,pos.z,P.roll);
  o.connect(f); f.connect(g); g.connect(p);
  /* things inside the bar go through the room, not the street */
  p.connect(kind==='juke'||kind==='taps'||kind==='neon' ? barPan : streetLP);
  const s=ac.createGain(); s.gain.value=0.42; p.connect(s); s.connect(verbIn);
  o.start(t); o.stop(t+P.dur+0.1);
  o.onended=function(){ voices--; };
}

function updateListener(cam){
  if(!ac) return;
  const l=ac.listener;
  const f=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
  const u=new THREE.Vector3(0,1,0).applyQuaternion(cam.quaternion);
  if(l.positionX){
    const t=ac.currentTime;
    l.positionX.setTargetAtTime(cam.position.x,t,0.02);
    l.positionY.setTargetAtTime(cam.position.y,t,0.02);
    l.positionZ.setTargetAtTime(cam.position.z,t,0.02);
    l.forwardX.setTargetAtTime(f.x,t,0.02); l.forwardY.setTargetAtTime(f.y,t,0.02);
    l.forwardZ.setTargetAtTime(f.z,t,0.02);
    l.upX.setTargetAtTime(u.x,t,0.02); l.upY.setTargetAtTime(u.y,t,0.02);
    l.upZ.setTargetAtTime(u.z,t,0.02);
  } else {
    l.setPosition(cam.position.x,cam.position.y,cam.position.z);
    l.setOrientation(f.x,f.y,f.z,u.x,u.y,u.z);
  }
}

/* ══════════════════════════════════════════════════════════════
   PS1 PIPELINE — fog is shared and mutable, so stepping inside
   can close the whole world down to the width of a room
   ══════════════════════════════════════════════════════════════ */
const FOG_OUT=new THREE.Color(0.788,0.851,0.898);
const FOG_IN =new THREE.Color(0.106,0.055,0.043);
const uFogCol ={value:FOG_OUT.clone()};
const uFogNear={value:80}, uFogFar={value:520};
const SUN_DIR=new THREE.Vector3(-0.62,0.52,0.26).normalize();

const uEcl={value:0};
const ECLIPSE_SKY=new THREE.Color(0.043,0.059,0.125);
const allMats=[];
function ps1(o){
  o=o||{};
  const uni={
    uMap:{value:o.map||null}, uRes:{value:new THREE.Vector2(320,240)},
    uTime:{value:0}, uJitter:{value:o.jitter===undefined?1:o.jitter},
    uFogCol:uFogCol, uTint:{value:o.tint||new THREE.Color(1,1,1)},
    uCut:{value:o.cutout===undefined?-1:o.cutout}, uFlash:{value:0},
    uFogNear:uFogNear, uFogFar:uFogFar,
    uSun:{value:SUN_DIR}, uAmb:{value:o.ambient===undefined?0.62:o.ambient},
    uGlow:{value:o.glow||0}, uEcl:uEcl,
    uAff:{value:o.aff===undefined?1:o.aff}, uAlpha:{value:1}
  };
  const m=new THREE.ShaderMaterial({
    uniforms:uni, transparent:!!o.transparent,
    side:o.side||THREE.FrontSide,
    depthWrite:o.depthWrite===undefined?true:o.depthWrite,
    vertexShader:[
      'uniform vec2 uRes; uniform float uJitter; uniform float uTime;',
      'uniform float uFogNear; uniform float uFogFar; uniform float uAff;',
      'uniform vec3 uSun; uniform float uAmb;',
      'varying vec2 vUv; varying float vW; varying float vFog; varying float vLit;',
      'void main(){',
      '  vec4 wp = modelMatrix * vec4(position,1.0);',
      '  vec4 mv = viewMatrix * wp;',
      '  vec4 cl = projectionMatrix * mv;',
      '  vec2 g = uRes*0.5;',
      '  cl.xy = mix(cl.xy, floor(cl.xy/cl.w*g + 0.5)/g*cl.w, uJitter);',
      '  vec3 wn = normalize(mat3(modelMatrix)*normal);',
      '  vLit = uAmb + (1.0-uAmb)*max(dot(wn,uSun),0.0);',
      '  vFog = clamp((-mv.z-uFogNear)/(uFogFar-uFogNear),0.0,1.0);',
      '  vUv = mix(uv, uv*cl.w, uAff); vW = mix(1.0, cl.w, uAff);',
      '  gl_Position = cl;',
      '}'].join('\n'),
    fragmentShader:[
      'uniform sampler2D uMap; uniform float uTime; uniform vec3 uFogCol;',
      'uniform vec3 uTint; uniform float uCut; uniform float uFlash; uniform float uGlow;',
      'uniform float uEcl; uniform float uAlpha;',
      'varying vec2 vUv; varying float vW; varying float vFog; varying float vLit;',
      'float b2(vec2 a){ a=floor(a); return fract(dot(a, vec2(0.5, a.y*0.75))); }',
      'float b4(vec2 a){ return b2(0.5*a)*0.25 + b2(a); }',
      'void main(){',
      '  vec2 uv = vUv/vW;',
      '  vec4 tex = texture2D(uMap, uv);',
      '  if(uCut > 0.0 && tex.a < uCut) discard;',
      '  vec3 col = tex.rgb * uTint * mix(vLit, 1.0, uGlow);',
      '  /* the light goes silver and then away */',
      '  col = mix(col, vec3(dot(col,vec3(0.30,0.59,0.11)))*vec3(0.80,0.86,1.02), uEcl*0.92);',
      '  col *= mix(1.0, 0.075, uEcl);',
      '  col += uFlash * vec3(1.0,0.86,0.6);',
      '  col = mix(col, uFogCol, vFog*(1.0-uGlow));',
      '  float d = b4(gl_FragCoord.xy)/0.9375;',
      '  gl_FragColor = vec4(floor(col*31.0 + d)/31.0, tex.a*uAlpha);',
      '}'].join('\n')
  });
  m.userData.uni=uni; allMats.push(m); return m;
}

  t.magFilter=t.minFilter=THREE.NearestFilter;
  t.generateMipmaps=false; t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}

const _q=new THREE.Quaternion(), _e=new THREE.Euler(),
      _v=new THREE.Vector3(), _s3=new THREE.Vector3();
function mat(x,y,z,rx,ry,rz,s){
  _e.set(rx||0,ry||0,rz||0); _q.setFromEuler(_e);
  _v.set(x,y,z); _s3.set(s||1,s||1,s||1);
  return new THREE.Matrix4().compose(_v,_q,_s3);
}
function mergeAll(items){
  let vc=0;
  const gs=items.map(function(it){
    const g=it.geo.index?it.geo.toNonIndexed():it.geo.clone();
    g.applyMatrix4(it.m); vc+=g.attributes.position.count; return g;
  });
  const pos=new Float32Array(vc*3), nor=new Float32Array(vc*3), uvs=new Float32Array(vc*2);
  let po=0,uo=0;
  gs.forEach(function(g){
    pos.set(g.attributes.position.array,po);
    if(g.attributes.normal) nor.set(g.attributes.normal.array,po);
    if(g.attributes.uv)     uvs.set(g.attributes.uv.array,uo);
    po+=g.attributes.position.count*3; uo+=g.attributes.position.count*2;
    g.dispose();
  });
  const out=new THREE.BufferGeometry();
  out.setAttribute('position',new THREE.BufferAttribute(pos,3));
  out.setAttribute('normal',  new THREE.BufferAttribute(nor,3));
  out.setAttribute('uv',      new THREE.BufferAttribute(uvs,2));
  return out;
}
function bake(items,material){
  if(!items.length) return null;
  const m=new THREE.Mesh(mergeAll(items),material);
  m.frustumCulled=false; scene.add(m); return m;
}
function ownMats(obj){
  obj.traverse(function(m){
    if(m.material&&m.material.userData&&m.material.userData.uni){
      const c=m.material.clone(); c.userData={uni:c.uniforms};
      allMats.push(c); m.material=c;
    }
  });
  return obj;
}
const targets=[];
function place(o,kind,deg){
  ownMats(o);
  o.userData={kind:kind,deg:deg,flash:0};
  targets.push(o); scene.add(o); return o;
}

const BOWL={ cx:-6, cz:0, rTop:30, rBot:8, steps:6, rise:0.46 };
function bowlLevel(x,z){
  const dx=x-BOWL.cx, dz=z-BOWL.cz;
  const r=Math.hypot(dx,dz);
  if(Math.abs(Math.atan2(dz,dx))>1.92) return 0;        // the open side
  if(r>=BOWL.rTop) return 0;
  if(r<=BOWL.rBot) return BOWL.steps;
  const band=(BOWL.rTop-BOWL.rBot)/BOWL.steps;
  return Math.min(BOWL.steps, Math.floor((BOWL.rTop-r)/band)+0);
}
function groundH(x,z){ return -bowlLevel(x,z)*BOWL.rise; }

function slab(w,d,x,z,y,m,rot,sx,sy){
  const s=new THREE.Mesh(new THREE.PlaneGeometry(w,d,sx||1,sy||1),m);
  s.rotation.x=-Math.PI/2; if(rot) s.rotation.z=rot;
  s.position.set(x,y||0,z); scene.add(s); return s;
}

    sun.add(sp);
  }
  const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.045,1.6,5),silver);
  stem.position.y=-0.85; sun.add(stem);
  sun.scale.set(0.001,0.001,0.001);
  g.add(sun);
  g.position.set(28,0,14);
  scene.add(g);
  const hit=new THREE.Mesh(new THREE.SphereGeometry(1.8,6,5),
            new THREE.MeshBasicMaterial({visible:false}));
  hit.position.set(28,7.6,14);
  place(hit,'wm',3);
  CIRC.push({x:28,z:14,r:0.55});
  return {
    g:g, top:top, sun:sun, phase:'idle', t:0, spk:0,
    begin:function(){
      if(this.phase!=='idle') return;
      this.phase='open'; this.t=0;
      _tp.set(28,7.6,14); fanfare(_tp);
    },
    update:function(dt){
      if(this.phase==='idle') return;
      this.t+=dt;
      const T=this.t;
      if(this.phase==='open'){
        const e=Math.min(1,T/1.1), s=e*e*(3-2*e);
        this.top.position.y=7.6+s*1.25;
        this.top.rotation.z=s*0.95;
        if(T>=1.1){ this.phase='rise'; this.t=0; }
      } else if(this.phase==='rise'){
        const e=Math.min(1,T/1.0), s=e*e*(3-2*e);
        this.sun.position.y=7.6+s*1.9;
        const sc=0.001+s*0.999; this.sun.scale.set(sc,sc,sc);
        this.sun.rotation.y+=dt*2.4;
        if(T>=1.0){ this.phase='shine'; this.t=0; this.spk=0.4; }
      } else if(this.phase==='shine'){
        this.sun.rotation.y+=dt*2.4;
        this.spk-=dt;
        if(this.spk<=0){
          this.spk=rnd(0.9,1.5);
          _tp.set(28,9.5,14); sparkle(_tp);
          puff(28+rnd(-0.7,0.7),8.3,14+rnd(-0.7,0.7),0.5,1.4);
        }
        if(T>=7){ this.phase='fall'; this.t=0; }
      } else if(this.phase==='fall'){
        const e=Math.min(1,T/1.0), s=1-e*e*(3-2*e);
        this.sun.position.y=7.6+s*1.9;
        const sc=0.001+s*0.999; this.sun.scale.set(sc,sc,sc);
        this.sun.rotation.y+=dt*2.4*s;
        if(T>=1.0){ this.phase='close'; this.t=0; }
      } else if(this.phase==='close'){
        const e=Math.min(1,T/1.0), s=1-e*e*(3-2*e);
        this.top.position.y=7.6+s*1.25;
        this.top.rotation.z=s*0.95;
        if(T>=1.0){ this.phase='idle'; }
      }
    }
  };
})();

function Lane(pts){ this.p=pts; this.len=[]; let L=0;
  for(let i=1;i<pts.length;i++){ L+=Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]);
    this.len.push(L); }
  this.total=L;
}
Lane.prototype.at=function(s){
  s=Math.max(0,Math.min(this.total,s));
  let i=0; while(i<this.len.length-1 && this.len[i]<s) i++;
  const a=this.p[i], b=this.p[i+1], s0=i?this.len[i-1]:0, seg=this.len[i]-s0;
  const t=seg>0?(s-s0)/seg:0;
  return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, Math.atan2(b[0]-a[0],b[1]-a[1])];
};

function Walker(o){
  this.g=o.rig; this.lane=o.lane; this.s=o.s; this.dir=o.dir||1;
  this.base=o.speed; this.speed=o.speed; this.off=o.off||0;
  this.travel=0; this.pause=0; this.kind=o.kind;
  place(this.g,o.kind,o.deg); agents.push(this);
}
Walker.prototype.update=function(dt){
  if(this.pause>0){ this.pause-=dt; this.speed+=(0-this.speed)*Math.min(1,dt*5); }
  else{
    this.speed+=(this.base-this.speed)*Math.min(1,dt*2.2);
    if(Math.random()<dt*0.03) this.pause=rnd(1.2,4);
  }
  this.s+=this.speed*this.dir*dt;
  if(this.s>this.lane.total){ this.s=this.lane.total; this.dir=-1; }
  if(this.s<0){ this.s=0; this.dir=1; }
  const a=this.lane.at(this.s), head=a[2]+(this.dir>0?0:Math.PI);
  const gx=a[0]+Math.cos(head)*this.off, gz=a[1]-Math.sin(head)*this.off;
  this.g.position.x=gx; this.g.position.z=gz;
  this.g.rotation.y=head;
  this.travel+=this.speed*dt;
  const R=this.g.userData_rig;
  const sw=Math.sin(this.travel*3.4)*Math.min(1,this.speed*0.55);
  R.legs[0].rotation.x= sw;  R.legs[1].rotation.x=-sw;
  R.arms[0].rotation.x=-sw*0.7; R.arms[1].rotation.x= sw*0.7;
  this.g.position.y=groundH(gx,gz)+Math.abs(Math.sin(this.travel*3.4))*0.045;
};

function pigFlee(P,fx,fz){
  if(P.state==='fly') return;
  const g=P.g;
  const a=Math.atan2(g.position.x-fx, g.position.z-fz)+rnd(-0.5,0.5);
  const dist=rnd(4.5,7.5);
  P.fx=g.position.x; P.fz=g.position.z;
  P.tx=Math.max(-56,Math.min(48, P.fx+Math.sin(a)*dist));
  P.tz=Math.max(-44,Math.min(38, P.fz+Math.cos(a)*dist));
  P.hx=P.tx; P.hz=P.tz;
  P.D=dist/6; P.t=0; P.state='fly';
  if(ready && Math.random()<0.7) flutter(g.position);
}
function pigScare(x,z,r){
  pigeons.forEach(function(P){
    const dx=P.g.position.x-x, dz=P.g.position.z-z;
    if(dx*dx+dz*dz<r*r) pigFlee(P,x,z);
  });
}
function pigUpdate(P,dt,t){
  const g=P.g;
  if(P.state==='fly'){
    P.t+=dt;
    const k=Math.min(1,P.t/P.D);
    const x=P.fx+(P.tx-P.fx)*k, z=P.fz+(P.tz-P.fz)*k;
    const y0=groundH(P.fx,P.fz), y1=groundH(P.tx,P.tz);
    g.position.set(x, y0+(y1-y0)*k+Math.sin(k*Math.PI)*1.5, z);
    g.rotation.y=Math.atan2(P.tx-P.fx,P.tz-P.fz);
    g.rotation.x=-0.35+k*0.5;
    const fl=Math.sin(P.t*34)*0.95;
    P.wl.rotation.z= 0.15+fl; P.wr.rotation.z=-0.15-fl;
    if(k>=1){
      P.state='peck'; P.t=rnd(0.5,2); g.rotation.x=0;
      P.wl.rotation.z=0.15; P.wr.rotation.z=-0.15;
    }
    return;
  }
  const dx=cam.position.x-g.position.x, dz=cam.position.z-g.position.z;
  if(dx*dx+dz*dz<10.5){ pigFlee(P, cam.position.x, cam.position.z); return; }
  P.t-=dt;
  if(P.t<=0){
    P.t=rnd(1.5,4.5);
    const a=rnd(0,6.283), rr=rnd(0.4,2.2);
    P.tx=P.hx+Math.cos(a)*rr; P.tz=P.hz+Math.sin(a)*rr;
  }
  const mx=P.tx-g.position.x, mz=P.tz-g.position.z;
  const md=Math.hypot(mx,mz);
  if(md>0.08){
    g.position.x+=mx/md*dt*0.7; g.position.z+=mz/md*dt*0.7;
    g.rotation.y=Math.atan2(mx,mz);
    g.position.y=groundH(g.position.x,g.position.z)+Math.abs(Math.sin(t*16+P.ph))*0.02;
    P.head.rotation.x=0;
  } else {
    g.position.y=groundH(g.position.x,g.position.z);
    const pk=Math.sin(t*5.2+P.ph);
    P.head.rotation.x=pk>0.55?-0.85:0;
  }
}

let eclBuf=null, eclSrc=null, eclGain=null;
function loadEclipseAudio(){
  if(!ac || eclBuf) return;
  eclGain=ac.createGain(); eclGain.gain.value=0.9; eclGain.connect(master);
  const ev=ac.createGain(); ev.gain.value=0.28; eclGain.connect(ev); ev.connect(verbIn);
  fetch(ECL_SND).then(function(r){ return r.arrayBuffer(); })
    .then(function(ab){ return new Promise(function(res,rej){
      const p=ac.decodeAudioData(ab,res,rej); if(p&&p.then) p.then(res,rej); }); })
    .then(function(buf){ eclBuf=buf; })
    .catch(function(){});
}
const ECL={
  on:false, t:0, T2:4.5, T3:14.5, T4:19.0,
  ecl:0, tot:0, bead:0, moon:new THREE.Vector2(-2.6,0.40),
  start:function(){
    if(this.on) return;
    this.on=true; this.t=0;
    if(ready && eclBuf){
      try{
        eclSrc=ac.createBufferSource(); eclSrc.buffer=eclBuf;
        eclSrc.connect(eclGain); eclSrc.start();
      }catch(e){}
    }
  },
  update:function(dt){
    if(!this.on) return;
    this.t+=dt;
    const t=this.t, k=Math.min(1,t/this.T4);
    this.moon.set(-2.6+k*5.2, 0.40-k*0.80);
    let e;
    if(t<this.T2)      e=Math.pow(t/this.T2,3.0);
    else if(t<this.T3) e=1;
    else               e=Math.pow(Math.max(0,1-(t-this.T3)/(this.T4-this.T3)),3.0);
    this.ecl=Math.max(0,Math.min(1,e));
    this.tot=(t>this.T2&&t<this.T3)
      ? Math.min(1,(t-this.T2)/0.7)*Math.min(1,(this.T3-t)/0.7) : 0;
    const d=Math.min(Math.abs(t-this.T2),Math.abs(t-this.T3));
    this.bead=Math.max(0,1-d/0.5);
    if(t>this.T4){ this.on=false; this.ecl=0; this.tot=0; this.bead=0;
      if(eclSrc){ try{ eclSrc.stop(); }catch(e){} eclSrc=null; } }
  }
};

let yaw=-Math.PI/2, pitch=0.02;
const move={x:0,y:0};
let stickId=null, lookId=null, lx=0, ly=0, moved=0, at=0;
const stick=document.getElementById('stick'), knob=document.getElementById('knob'), R=44;
function stickSet(t){
  const r=stick.getBoundingClientRect();
  let dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2);
  const d=Math.hypot(dx,dy);
  if(d>R){ dx=dx/d*R; dy=dy/d*R; }
  knob.style.transform='translate('+dx+'px,'+dy+'px)';
  move.x=dx/R; move.y=dy/R;
}
function stickClear(){ knob.style.transform=''; move.x=move.y=0;
  stick.classList.remove('on'); stickId=null; }
stick.addEventListener('touchstart',function(e){
  e.preventDefault(); e.stopPropagation();
  const t=e.changedTouches[0]; stickId=t.identifier; stick.classList.add('on'); stickSet(t);
},{passive:false});
stick.addEventListener('touchmove',function(e){
  e.preventDefault(); e.stopPropagation();
  for(const t of e.changedTouches) if(t.identifier===stickId) stickSet(t);
},{passive:false});
['touchend','touchcancel'].forEach(function(ev){
  stick.addEventListener(ev,function(e){
    e.preventDefault(); e.stopPropagation();
    for(const t of e.changedTouches) if(t.identifier===stickId) stickClear();
  },{passive:false});
});
cv.addEventListener('touchstart',function(e){
  e.preventDefault(); if(lookId!==null) return;
  const t=e.changedTouches[0];
  lookId=t.identifier; lx=t.clientX; ly=t.clientY; moved=0; at=performance.now();
},{passive:false});
cv.addEventListener('touchmove',function(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==lookId) continue;
    const dx=t.clientX-lx, dy=t.clientY-ly;
    moved+=Math.hypot(dx,dy);
    yaw-=dx*0.0042; pitch-=dy*0.0042;
    pitch=Math.max(-1.0,Math.min(1.35,pitch));
    lx=t.clientX; ly=t.clientY;
  }
},{passive:false});
['touchend','touchcancel'].forEach(function(ev){
  cv.addEventListener(ev,function(e){
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier!==lookId) continue;
      if(moved<12 && performance.now()-at<380) shoot(t.clientX,t.clientY);
      lookId=null;
    }
  },{passive:false});
});
document.addEventListener('gesturestart',function(e){ e.preventDefault(); });
const keys={};
addEventListener('keydown',function(e){ keys[e.key.toLowerCase()]=true; });
addEventListener('keyup',function(e){ keys[e.key.toLowerCase()]=false; });
let md=false,mx=0,my=0,mm=0;
cv.addEventListener('mousedown',function(e){ md=true; mx=e.clientX; my=e.clientY; mm=0; });
cv.addEventListener('mousemove',function(e){
  if(!md) return;
  const dx=e.clientX-mx, dy=e.clientY-my; mm+=Math.hypot(dx,dy);
  yaw-=dx*0.0042; pitch-=dy*0.0042;
  pitch=Math.max(-1.0,Math.min(1.35,pitch));
  mx=e.clientX; my=e.clientY;
});
addEventListener('mouseup',function(e){ if(md&&mm<8) shoot(e.clientX,e.clientY); md=false; });

                cart:6,max:6,stall:6,coffee:6,statue:6,water:5,plane:3,sun:2};
const COLR={ juke:'#FF3B6B', neon:'#FF6E96', taps:'#FFD9A0', max:'#8FD0F0',
             cart:'#FFC46B', water:'#B8E0EC', plane:'#E8ECF0',
             stall:'#FFD9A0', coffee:'#8FD8A8', statue:'#C8D4C0',
             bird:'#C9D2DA', dog:'#E8C48A', wm:'#C0E8FF', sun:'#FFD98A' };
function flashName(txt,col){
  const n=document.getElementById('name');
  n.textContent=txt; n.style.color=col||'#FFFFFF';
  n.classList.remove('show'); void n.offsetWidth; n.classList.add('show');
}
function owner(o){ while(o){ if(o.userData&&o.userData.kind) return o; o=o.parent; } return null; }
function shoot(cx,cy){
  ndc.x=(cx/innerWidth)*2-1; ndc.y=-(cy/innerHeight)*2+1;
  ray.setFromCamera(ndc,cam);
  const hits=ray.intersectObjects(targets,true);
  let best=null,bp=-1;
  for(let i=0;i<hits.length;i++){
    const o=owner(hits[i].object); if(!o) continue;
    const p=PRIORITY[o.userData.kind]||0;
    if(p>bp){ bp=p; best=o; if(p>=9) break; }
  }
  if(!best) return;
  const k=best.userData.kind, wp=new THREE.Vector3();
  best.getWorldPosition(wp);
  best.userData.flash=1;
  if(k==='wm'){
    WM.begin();
  } else if(k==='sun'){
    if(ECL.on) return;
    ECL.start();
    flashName('the sun','#FFD98A');
    return;
  } else if(k==='bird'){
    coo(wp); flutter(wp);
    if(best.userData_pig) pigFlee(best.userData_pig, cam.position.x, cam.position.z);
  } else if(k==='dog'){
    bark(wp);
  } else {
    touchSound(k,wp,best.userData.deg);
    if(k==='max') chime(wp);
    if(k==='taps') clink();
    if(k==='coffee'){
      steam(wp);
      puff(30+rnd(-1,1), 3.7, 34+rnd(-0.6,0.6), 0.4, 1.1);
    }
  }
  flashName(LABEL[k], COLR[k]||'#FFFFFF');
}

/* ══════════════════════════════════════════════════════════════
   LOOP
   ══════════════════════════════════════════════════════════════ */
const clock=new THREE.Clock();
const _tp=new THREE.Vector3(), _pp=new THREE.Vector3();
let bob=0, inside=0, nextClink=6, nextPlane=14, nextCoo=9, echoed=false;
const roomEl=document.getElementById('room');

function collide(p){
  WALLS.forEach(function(w){
    const dx=p.x-w[0], dz=p.z-w[1];
    const ex=w[2]+0.45, ez=w[3]+0.45;
    if(Math.abs(dx)<ex && Math.abs(dz)<ez){
      const px=ex-Math.abs(dx), pz=ez-Math.abs(dz);
      if(px<pz) p.x += (dx<0?-1:1)*px;
      else      p.z += (dz<0?-1:1)*pz;
    }
  });
  for(let i=0;i<CIRC.length;i++){
    const c=CIRC[i];
    const dx=p.x-c.x, dz=p.z-c.z;
    const d=Math.hypot(dx,dz), rr=c.r+0.42;
    if(d<rr){
      if(d>0.0001){ p.x=c.x+dx/d*rr; p.z=c.z+dz/d*rr; }
      else{ p.x=c.x+rr; p.z=c.z; }
    }
  }
}

function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),0.05), t=clock.elapsedTime;

  let ix=move.x, iy=move.y;
  if(keys['w']||keys['arrowup'])   iy-=1;
  if(keys['s']||keys['arrowdown']) iy+=1;
  if(keys['a']||keys['arrowleft']) ix-=1;
  if(keys['d']||keys['arrowright'])ix+=1;
  const mag=Math.min(1,Math.hypot(ix,iy));
  if(mag>0.04){
    const sp=12.0*dt*mag, den=Math.hypot(ix,iy)||1;
    const nx=ix/den, ny=iy/den;
    const fx=-Math.sin(yaw), fz=-Math.cos(yaw);
    const rx= Math.cos(yaw), rz=-Math.sin(yaw);
    cam.position.x+=(fx*(-ny)+rx*nx)*sp;
    cam.position.z+=(fz*(-ny)+rz*nx)*sp;
    bob+=sp*0.9;
  }
  collide(cam.position);
  cam.position.x=Math.max(-120,Math.min(120,cam.position.x));
  cam.position.z=Math.max(-70,Math.min(42,cam.position.z));
  cam.position.y=groundH(cam.position.x,cam.position.z)+2.3+Math.sin(bob*1.9)*0.055*mag;
  cam.rotation.y=yaw; cam.rotation.x=pitch;
  sky.position.copy(cam.position);
  sunHit.position.copy(cam.position).addScaledVector(SUN_DIR,420);

  /* the sun goes out, if you asked it to */
  ECL.update(dt);
  uEcl.value=ECL.ecl;

  /* inside / outside, crossfaded rather than switched */
  const want=(cam.position.x>x0 && cam.position.x<x1 &&
              cam.position.z>z0 && cam.position.z<z1) ? 1 : 0;
  inside += (want-inside)*Math.min(1,dt*3.4);
  uFogCol.value.copy(FOG_OUT).lerp(FOG_IN, inside);
  uFogNear.value = 80 - inside*72;
  uFogFar.value  = 520 - inside*486;
  renderer.setClearColor(uFogCol.value,1);
  roomEl.style.opacity=inside.toFixed(3);
  if(ready){
    const now=ac.currentTime;
    streetLP.frequency.setTargetAtTime(14000-inside*13640, now, 0.12);
    streetGain.gain.setTargetAtTime(Math.max(0.001,0.085-inside*0.05-ECL.tot*0.045), now, 0.5);
    crowdGain.gain.setTargetAtTime(Math.max(0.001,0.05-inside*0.032-ECL.tot*0.03), now, 0.5);
    barGain.gain.setTargetAtTime(0.0001+inside*0.075, now, 0.2);
    jukeBus.gain.setTargetAtTime(0.0001+inside*0.9, now, 0.25);
  }

  /* the train: run, brake, sit, go */
  (function(){
    const M=train;
    if(M.state==='run'){
      M.v+=(11-M.v)*Math.min(1,dt*0.5);
      if(M.x<PLATFORM_X && M.x+M.v*dt>=PLATFORM_X-52) M.state='brake';
    } else if(M.state==='brake'){
      M.v+=(0-M.v)*Math.min(1,dt*1.15);
      if(Math.abs(M.x-PLATFORM_X)<1.5 || M.v<0.25){
        M.v=0; M.state='dwell'; M.timer=9;
        _tp.set(PLATFORM_X,3,TRACK_Z); chime(_tp);
        pigScare(PLATFORM_X,40,16);
      }
    } else if(M.state==='dwell'){
      M.timer-=dt;
      if(M.timer<=0){ M.state='leave'; _tp.set(M.x,3,TRACK_Z); chime(_tp); }
    } else {
      M.v+=(13-M.v)*Math.min(1,dt*0.45);
      if(M.x>300){ M.x=-320; M.v=0; M.state='run'; }
    }
    /* the crossing bell — ding ding coming in, ding ding going out */
    if(ready){
      M.bell-=dt;
      const coming=(M.state==='run'||M.state==='brake') &&
                   M.x>PLATFORM_X-160 && M.x<PLATFORM_X-4;
      const going =(M.state==='leave') && M.x<PLATFORM_X+110;
      if((coming||going) && M.bell<=0){ dingDing(M.x); M.bell=coming?1.15:1.35; }
    }
    M.x+=M.v*dt;
    M.g.position.x=M.x; M.hit.position.set(M.x,2.6,TRACK_Z);
    if(railGain){
      railGain.gain.setTargetAtTime(Math.min(0.16,M.v*0.014), ac.currentTime, 0.2);
      _tp.set(M.x,2,TRACK_Z); movePan(railPan,_tp);
    }
  })();

  agents.forEach(function(a){ a.update(dt); });

  /* the quiet business of being a square */
  sitters.forEach(function(s){
    s.g.rotation.y=s.base+Math.sin(t*s.spd+s.ph)*0.05;
  });
  standers.forEach(function(s){
    s.g.rotation.y=s.base+Math.sin(t*0.4+s.ph)*0.07;
    s.g.position.y=groundH(s.g.position.x,s.g.position.z)+Math.sin(t*0.8+s.ph)*0.012;
    const R=s.g.userData_rig;
    R.arms[0].rotation.x=Math.sin(t*0.6+s.ph)*0.05;
    R.arms[1].rotation.x=Math.sin(t*0.6+s.ph+2)*0.05;
  });
  pigeons.forEach(function(P){ pigUpdate(P,dt,t); });
  (function(){
    const o=agents[5].g;
    const fx=Math.sin(o.rotation.y), fz=Math.cos(o.rotation.y);
    const tx=o.position.x - fx*1.5 + fz*0.55;
    const tz=o.position.z - fz*1.5 - fx*0.55;
    const g=dog.g, k=Math.min(1,dt*2.8);
    const nx=g.position.x+(tx-g.position.x)*k;
    const nz=g.position.z+(tz-g.position.z)*k;
    const vx=(nx-g.position.x)/Math.max(dt,0.001),
          vz=(nz-g.position.z)/Math.max(dt,0.001);
    const sp=Math.hypot(vx,vz);
    g.position.x=nx; g.position.z=nz;
    g.position.y=groundH(nx,nz);
    if(sp>0.25) g.rotation.y=Math.atan2(vx,vz);
    dog.travel+=sp*dt;
    const sw=Math.sin(dog.travel*7)*Math.min(1,sp*0.5);
    dog.legs[0].rotation.x= sw; dog.legs[3].rotation.x= sw;
    dog.legs[1].rotation.x=-sw; dog.legs[2].rotation.x=-sw;
    dog.tail.rotation.y=Math.sin(t*9)*0.55;
  })();
  trees.forEach(function(T2){ T2.g.rotation.z=Math.sin(t*0.6+T2.ph)*0.022; });
  flags.forEach(function(F){
    F.root.rotation.y=Math.sin(t*F.spd+F.ph)*0.18;
    F.j.rotation.y=Math.sin(t*F.spd+F.ph-0.9)*0.42;
  });
  WM.update(dt);
  puffs.forEach(function(p){
    if(!p.m.visible) return;
    p.t+=dt;
    const k=p.t/p.life;
    if(k>=1){ p.m.visible=false; return; }
    p.m.position.y+=dt*0.7;
    const s=p.s*(0.6+k*1.8); p.m.scale.set(s,s,1);
    p.m.quaternion.copy(cam.quaternion);
    p.m.material.userData.uni.uAlpha.value=(1-k)*(1-k)*0.5;
  });
  flowTex.offset.y-=dt*0.9;
  /* the echo lives in the exact centre, same as it always has */
  if(ready){
    const de=Math.hypot(cam.position.x-BOWL.cx, cam.position.z-BOWL.cz);
    const inSpot=de<1.9 && inside<0.5;
    echoGain.gain.setTargetAtTime(inSpot?0.16:0.0001, ac.currentTime, 0.25);
    if(inSpot && !echoed){ echoed=true; flashName('the echo','#BFD8E8'); }
    if(!inSpot) echoed=false;
  }

  planes.forEach(function(P){
    P.g.position.x+=Math.sin(P.head)*P.sp*dt;
    P.g.position.z+=Math.cos(P.head)*P.sp*dt;
    if(Math.abs(P.g.position.x)>620 || Math.abs(P.g.position.z)>620){
      P.g.position.set(rnd(-500,500),rnd(150,240),rnd(-500,500));
      P.head=rnd(0,6.2832); P.g.rotation.y=P.head;
    }
    P.hit.position.copy(P.g.position);
  });

  if(ready){
    jukePump();
    if(inside>0.5 && t>nextClink){ clink(); nextClink=t+rnd(4,14); }
    if(inside<0.4 && t>nextCoo){
      const P=pigeons[Math.random()*pigeons.length|0];
      if(P.state!=='fly') coo(P.g.position);
      nextCoo=t+rnd(7,17);
    }
    if(t>nextPlane){
      const P=planes[Math.random()*planes.length|0];
      P.g.getWorldPosition(_pp); touchSound('plane',_pp,1);
      nextPlane=t+rnd(30,80);
    }
  }

  targets.forEach(function(o){
    const u=o.userData;
    if(u.flash>0){
      u.flash=Math.max(0,u.flash-dt*2.3);
      o.traverse(function(m){
        if(m.material&&m.material.userData&&m.material.userData.uni)
          m.material.userData.uni.uFlash.value=u.flash*0.5;
      });
    }
  });

  allMats.forEach(function(m){ m.userData.uni.uTime.value=t; });
  updateListener(cam);
  renderer.render(scene,cam);
}

document.getElementById('go').addEventListener('click',function(){
  if(!ready){ try{ ready=initAudio(); }catch(e){ ready=false; }
    if(ready && ac.state==='suspended') ac.resume(); }
  if(ready) loadEclipseAudio();
  const s=document.getElementById('start');
  s.classList.add('gone');
  setTimeout(function(){ s.style.display='none'; },1050);
});
document.addEventListener('visibilitychange',function(){
  if(!ac) return;
  if(document.hidden) ac.suspend(); else ac.resume();
});

fit(); tick();
})();
</script>
