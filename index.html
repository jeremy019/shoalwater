<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The House">
<meta name="theme-color" content="#140D07">
<title>The House</title>
<style>
  :root{
    --dark:#140D07; --oak:#4A3520; --lamp:#FFD9A0; --plaster:#C9A96B;
    --craft: Copperplate, "Copperplate Gothic Light", "Trajan Pro", Optima, "Gill Sans", serif;
    --body: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    height:100%; width:100%; overflow:hidden; background:var(--dark); color:var(--lamp);
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent; overscroll-behavior:none; touch-action:none;
  }
  #c{ position:fixed; inset:0; display:block; touch-action:none;
      image-rendering:pixelated; image-rendering:-webkit-optimize-contrast; }

  #vig{
    position:fixed; inset:0; pointer-events:none; z-index:2;
    background:radial-gradient(ellipse at 50% 44%, transparent 32%, rgba(10,6,3,.72) 100%);
  }

  #plate{
    position:fixed; z-index:4; left:0; right:0;
    bottom:calc(env(safe-area-inset-bottom,0px) + 26px);
    text-align:center; pointer-events:none;
    font-family:var(--craft); font-size:.78rem;
    letter-spacing:.34em; text-transform:uppercase;
    color:rgba(255,217,160,.5); opacity:0; transition:opacity .35s ease;
  }
  #plate.on{ opacity:1; }
  #plate small{
    display:block; margin-top:9px; font-family:var(--body); font-style:italic;
    font-size:.82rem; letter-spacing:.02em; text-transform:none;
    color:rgba(255,217,160,.36);
  }

  #start{
    position:fixed; inset:0; z-index:20; background:var(--dark);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 34px; transition:opacity 1.2s ease;
  }
  #start.gone{ opacity:0; pointer-events:none; }
  #start h1{
    font-family:var(--craft); font-weight:400;
    font-size:clamp(1.5rem,7vw,2.2rem); letter-spacing:.3em;
    text-transform:uppercase; color:var(--lamp); text-align:center;
    text-shadow:0 0 50px rgba(255,180,90,.3);
  }
  #start .rule{
    width:120px; height:1px; margin:26px 0 24px;
    background:linear-gradient(90deg,transparent,rgba(255,217,160,.5),transparent);
  }
  #start p{
    font-family:var(--body); font-size:1rem; line-height:1.7;
    color:rgba(255,217,160,.6); text-align:center; max-width:20rem;
  }
  #go{
    margin-top:22px; padding:14px 40px; background:transparent; color:var(--lamp);
    border:1px solid rgba(255,217,160,.34);
    font-family:var(--craft); font-size:.82rem; letter-spacing:.26em;
    text-transform:uppercase; cursor:pointer; -webkit-appearance:none;
  }
  #go:active{ background:rgba(255,217,160,.1); }
  #go:focus-visible{ outline:2px solid var(--lamp); outline-offset:4px; }

  #fade{
    position:fixed; inset:0; z-index:30; background:#fff;
    opacity:0; pointer-events:none; transition:opacity .8s ease;
  }
  #fade.on{ opacity:1; }

  /* joystick */
  #stick{
    position:fixed; z-index:5;
    right:calc(env(safe-area-inset-right,0px) + 22px);
    bottom:calc(env(safe-area-inset-bottom,0px) + 30px);
    width:122px; height:122px; border-radius:50%;
    border:1px solid rgba(255,217,160,.20);
    background:rgba(20,13,7,.34);
    backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
    touch-action:none;
  }
  #knob{
    position:absolute; left:50%; top:50%; width:50px; height:50px;
    margin:-25px 0 0 -25px; border-radius:50%;
    border:1px solid rgba(255,217,160,.46);
    background:rgba(255,217,160,.13);
    transition:background .2s;
  }
  #stick.on #knob{ background:rgba(255,217,160,.26); }

  #hud{
    position:fixed; z-index:5; left:calc(env(safe-area-inset-left,0px) + 20px);
    bottom:calc(env(safe-area-inset-bottom,0px) + 34px);
    font-family:var(--craft); font-size:.56rem; letter-spacing:.2em;
    text-transform:uppercase; color:rgba(255,217,160,.30);
    pointer-events:none; line-height:2.1;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="vig"></div>
<div id="plate"></div>
<div id="hud">drag to look<br>wasd or the stick to walk<br>touch a door, or a cat</div>
<div id="stick"><div id="knob"></div></div>
<div id="fade"></div>

<div id="start">
  <h1>The House</h1>
  <div class="rule"></div>
  <button id="go">Enter</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
(function(){
if(typeof THREE === 'undefined'){
  document.getElementById('go').textContent = 'three.js failed to load';
  return;
}

/* ══════════════════════════════════════════════════════════════
   THE FIVE DOORS
   `file` is what the door opens. Set it to null and the door
   stays shut — the glass goes dark and the sign reads as unlit.
   ══════════════════════════════════════════════════════════════ */
const DOORS = [
  { key:'shoal',     name:'SHOAL',     file:'beach.html',
    blurb:'a warm beach, low sun',        glass:[1.00,0.72,0.34], x:-10.2, y:3.5 },
  { key:'douglas',   name:'DOUGLAS',   file:'douglas.html',
    blurb:'cold rock, glaciers, a fire',  glass:[0.60,0.78,0.86], x:  0.0, y:3.5 },
  { key:'cathedral', name:'CATHEDRAL', file:'cathedral.html',
    blurb:'one enormous spruce',          glass:[0.32,0.62,0.36], x: 10.2, y:3.5 },
  { key:'hilyard',   name:'HILYARD',   file:'hilyard.html',
    blurb:'campus, bicycles, ducks',      glass:[0.85,0.80,0.34], x: -5.1, y:13.4 },
  { key:'reedway',   name:'REEDWAY',   file:'reedway.html',
    blurb:'downtown, a train, a bar',     glass:[0.92,0.55,0.30], x:  5.1, y:13.4 }
];

const DW = 3.5, DH = 6.4, SIGNH = 1.15;

/* ══════════════════════════════════════════════════════════════
   PS1 PIPELINE  (same rules as the scenes)
   ══════════════════════════════════════════════════════════════ */
const FOG_COL  = new THREE.Color(0.078, 0.048, 0.028);
const FOG_NEAR = 12, FOG_FAR = 62;
const LAMP_DIR = new THREE.Vector3(0.18, 0.9, 0.62).normalize();

const allMats = [];
function ps1(o){
  o = o || {};
  const uni = {
    uMap:{value:o.map||null}, uRes:{value:new THREE.Vector2(320,240)},
    uTime:{value:0}, uJitter:{value:o.jitter===undefined?1:o.jitter},
    uFogCol:{value:FOG_COL}, uTint:{value:o.tint||new THREE.Color(1,1,1)},
    uCut:{value:o.cutout===undefined?-1:o.cutout}, uFlash:{value:0},
    uFogNear:{value:FOG_NEAR}, uFogFar:{value:o.fogFar||FOG_FAR},
    uSun:{value:LAMP_DIR}, uAmb:{value:o.ambient===undefined?0.42:o.ambient},
    uGlow:{value:o.glow||0}
  };
  const m = new THREE.ShaderMaterial({
    uniforms:uni, transparent:!!o.transparent,
    side:o.side||THREE.FrontSide,
    depthWrite:o.depthWrite===undefined?true:o.depthWrite,
    vertexShader:[
      'uniform vec2 uRes; uniform float uJitter;',
      'uniform float uFogNear; uniform float uFogFar;',
      'uniform vec3 uSun; uniform float uAmb;',
      'varying vec2 vUv; varying float vW; varying float vFog; varying float vLit;',
      'void main(){',
      '  vec4 mv = modelViewMatrix * vec4(position,1.0);',
      '  vec4 cl = projectionMatrix * mv;',
      '  vec2 g = uRes*0.5;',
      '  cl.xy = mix(cl.xy, floor(cl.xy/cl.w*g + 0.5)/g*cl.w, uJitter);',
      '  vec3 wn = normalize(mat3(modelMatrix)*normal);',
      '  vLit = uAmb + (1.0-uAmb)*max(dot(wn,uSun),0.0);',
      '  vFog = clamp((-mv.z-uFogNear)/(uFogFar-uFogNear),0.0,1.0);',
      '  vUv = uv*cl.w; vW = cl.w;',
      '  gl_Position = cl;',
      '}'].join('\n'),
    fragmentShader:[
      'uniform sampler2D uMap; uniform float uTime; uniform vec3 uFogCol;',
      'uniform vec3 uTint; uniform float uCut; uniform float uFlash; uniform float uGlow;',
      'varying vec2 vUv; varying float vW; varying float vFog; varying float vLit;',
      'float b2(vec2 a){ a=floor(a); return fract(dot(a, vec2(0.5, a.y*0.75))); }',
      'float b4(vec2 a){ return b2(0.5*a)*0.25 + b2(a); }',
      'void main(){',
      '  vec2 uv = vUv/vW;',
      '  vec4 t = texture2D(uMap, uv);',
      '  if(uCut > 0.0 && t.a < uCut) discard;',
      '  vec3 c = t.rgb * uTint * mix(vLit, 1.0, uGlow);',
      '  c += uFlash * vec3(1.0,0.82,0.52);',
      '  c = mix(c, uFogCol, vFog*(1.0-uGlow));',
      '  float d = b4(gl_FragCoord.xy)/0.9375;',
      '  gl_FragColor = vec4(floor(c*31.0 + d)/31.0, t.a);',
      '}'].join('\n')
  });
  m.userData.uni = uni;
  allMats.push(m);
  return m;
}

/* ══════════════════════════════════════════════════════════════
   TEXTURES — quartersawn oak, lime plaster, leaded glass
   ══════════════════════════════════════════════════════════════ */
function tex(w,h,draw){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  draw(c.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(c);
  t.magFilter=t.minFilter=THREE.NearestFilter;
  t.generateMipmaps=false; t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}
function rnd(a,b){ return a+Math.random()*(b-a); }

const T={};
/* fumed oak — dark, with the ray fleck quartersawn is prized for */
T.oak = tex(64,64,function(g,w,h){
  g.fillStyle='#3A2716'; g.fillRect(0,0,w,h);
  for(let i=0;i<90;i++){
    const y=rnd(0,h), a=rnd(.06,.3);
    g.strokeStyle='rgba('+(rnd(70,120)|0)+','+(rnd(46,80)|0)+','+(rnd(22,44)|0)+','+a+')';
    g.lineWidth=rnd(.6,2.2); g.beginPath();
    g.moveTo(0,y);
    for(let x=0;x<=w;x+=8) g.lineTo(x, y+Math.sin(x*0.16+i)*1.7);
    g.stroke();
  }
  for(let i=0;i<26;i++){                       // ray flecks
    g.fillStyle='rgba(150,110,62,'+rnd(.1,.3)+')';
    g.fillRect(rnd(0,w)|0, rnd(0,h)|0, rnd(2,7)|0, 1);
  }
});
T.oakLit = tex(64,64,function(g,w,h){
  g.fillStyle='#5A3E22'; g.fillRect(0,0,w,h);
  for(let i=0;i<80;i++){
    g.strokeStyle='rgba('+(rnd(96,150)|0)+','+(rnd(66,104)|0)+','+(rnd(34,60)|0)+','+rnd(.08,.3)+')';
    g.lineWidth=rnd(.6,2); g.beginPath();
    const y=rnd(0,h); g.moveTo(0,y);
    for(let x=0;x<=w;x+=8) g.lineTo(x, y+Math.sin(x*0.2+i)*1.4);
    g.stroke();
  }
});
/* rough lime plaster above the rail */
T.plaster = tex(64,64,function(g,w,h){
  g.fillStyle='#B8965E'; g.fillRect(0,0,w,h);
  for(let i=0;i<1400;i++){
    const v=rnd(-24,20);
    g.fillStyle='rgba('+(184+v|0)+','+(150+v|0)+','+(94+v|0)+',.7)';
    g.fillRect(rnd(0,w)|0, rnd(0,h)|0, 1,1);
  }
  for(let i=0;i<40;i++){
    g.fillStyle='rgba(120,92,54,.18)';
    g.fillRect(rnd(0,w)|0, rnd(0,h)|0, rnd(2,6)|0, rnd(1,3)|0);
  }
});
/* Solid strip hardwood — quartersawn white oak, laid the length of
   the room. Eight boards across the tile, each cut from a different
   part of the log, so the tone shifts board to board the way real
   flooring does. Butt joints are staggered rather than lining up. */
T.floor = tex(128,128,function(g,w,h){
  const NP=8, pw=w/NP;
  for(let p=0;p<NP;p++){
    const x0=p*pw, k=rnd(0.84,1.16);
    const r=96*k, gr=62*k, b=31*k;
    g.fillStyle='rgb('+(r|0)+','+(gr|0)+','+(b|0)+')';
    g.fillRect(x0,0,pw,h);
    /* grain, running the length of the board */
    for(let i=0;i<24;i++){
      const gx=x0+rnd(1,pw-1);
      g.strokeStyle='rgba('+((r*.52)|0)+','+((gr*.48)|0)+','+((b*.42)|0)+','+rnd(.06,.30).toFixed(2)+')';
      g.lineWidth=rnd(.5,1.8);
      g.beginPath(); g.moveTo(gx,0);
      for(let y=0;y<=h;y+=6) g.lineTo(gx+Math.sin(y*0.07+i)*1.5, y);
      g.stroke();
    }
    /* the ray fleck quartersawn oak is prized for */
    for(let i=0;i<8;i++){
      g.fillStyle='rgba('+((r*1.55)|0)+','+((gr*1.5)|0)+','+((b*1.35)|0)+','+rnd(.08,.24).toFixed(2)+')';
      g.fillRect((x0+rnd(1,pw-3))|0, rnd(0,h)|0, rnd(1,3)|0, rnd(4,15)|0);
    }
    /* one butt joint per board, stepped along so they never line up */
    const jy=(((p*37)%100)/100)*h;
    g.fillStyle='rgba(16,9,4,.85)'; g.fillRect(x0, jy|0, pw, 1);
    /* the seam, and the light catching the bevel beside it */
    g.fillStyle='rgba(13,7,3,.92)';      g.fillRect(x0, 0, 1, h);
    g.fillStyle='rgba(158,118,68,.13)';  g.fillRect(x0+1, 0, 1, h);
  }
});
/* nothing at all, behind an open door */
T.white = tex(4,4,function(g,w,h){ g.fillStyle='#fff'; g.fillRect(0,0,w,h); });

/* leaded art glass — squares and a stylised rose, tinted per door */
function glassTex(rgb){
  return tex(64,96,function(g,w,h){
    const c='rgb('+(rgb[0]*255|0)+','+(rgb[1]*255|0)+','+(rgb[2]*255|0)+')';
    g.fillStyle=c; g.fillRect(0,0,w,h);
    g.fillStyle='rgba(255,255,255,.16)';
    for(let y=0;y<h;y+=12) for(let x=0;x<w;x+=12)
      if(((x/12)+(y/12))%2===0) g.fillRect(x,y,12,12);
    g.fillStyle='rgba(255,246,220,.4)';
    g.fillRect(w*0.34, h*0.30, w*0.32, h*0.22);
    g.fillStyle='rgba(0,0,0,.34)';
    g.fillRect(w*0.42, h*0.38, w*0.16, h*0.07);
    g.strokeStyle='rgba(28,18,10,.8)'; g.lineWidth=2;         // came lines
    for(let y=0;y<=h;y+=12){ g.beginPath(); g.moveTo(0,y); g.lineTo(w,y); g.stroke(); }
    for(let x=0;x<=w;x+=12){ g.beginPath(); g.moveTo(x,0); g.lineTo(x,h); g.stroke(); }
    g.strokeStyle='rgba(28,18,10,.95)'; g.lineWidth=3;
    g.strokeRect(1,1,w-2,h-2);
  });
}
/* the carved sign over each door */
function signTex(name, lit){
  return tex(320,80,function(g,w,h){
    g.fillStyle = lit ? '#4E3519' : '#33220F'; g.fillRect(0,0,w,h);
    for(let i=0;i<200;i++){
      g.strokeStyle='rgba('+(rnd(76,124)|0)+','+(rnd(50,84)|0)+','+(rnd(24,44)|0)+',.3)';
      g.lineWidth=rnd(.5,2); const y=rnd(0,h);
      g.beginPath(); g.moveTo(0,y);
      for(let x=0;x<=w;x+=16) g.lineTo(x,y+Math.sin(x*0.05+i)*2.4);
      g.stroke();
    }
    g.strokeStyle='rgba(22,14,6,.8)'; g.lineWidth=4; g.strokeRect(6,6,w-12,h-12);
    /* Letters were spaced with a fixed pair of thin spaces, which put
       CATHEDRAL well past the edge of the plate — centred, so it lost a
       letter off each end and read as a different word. Set the letters
       individually instead: hold the height, give back the tracking, and
       only drop the size if even zero tracking will not fit. */
    const FAM = 'Copperplate, "Copperplate Gothic Light", "Trajan Pro", Optima, serif';
    const chars = name.split(''), avail = w - 46;
    let size = 40, base = 0;
    for(let pass=0; pass<14; pass++){
      g.font = '600 ' + size + 'px ' + FAM;
      base = 0;
      for(let i=0;i<chars.length;i++) base += g.measureText(chars[i]).width;
      if(base <= avail || size <= 16) break;
      size -= 2;
    }
    let track = chars.length > 1 ? (avail - base)/(chars.length - 1) : 0;
    track = Math.max(0, Math.min(13, track));
    g.textAlign='center'; g.textBaseline='middle';
    let x = (w - (base + track*(chars.length - 1)))/2;
    for(let i=0;i<chars.length;i++){
      const cw = g.measureText(chars[i]).width;
      g.fillStyle='rgba(18,10,4,.85)';                       // carved shadow
      g.fillText(chars[i], x + cw/2 + 2, h/2 + 2);
      g.fillStyle = lit ? '#FFD9A0' : '#6E5636';
      g.fillText(chars[i], x + cw/2, h/2);
      x += cw + track;
    }
  });
}

/* ══════════════════════════════════════════════════════════════
   ROOM
   ══════════════════════════════════════════════════════════════ */
const cv=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:false});
renderer.setPixelRatio(1); renderer.setClearColor(FOG_COL,1);
const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(58,1,0.3,300);
cam.rotation.order='YXZ';
cam.position.set(0,5.4,17.5);

let RW=320,RH=240;
function fit(){
  const w=innerWidth,h=innerHeight;
  const s=Math.max(1,Math.min(w,h)/188);
  RW=Math.max(96,Math.round(w/s)); RH=Math.max(96,Math.round(h/s));
  renderer.setSize(RW,RH,false);
  cv.style.width=w+'px'; cv.style.height=h+'px';
  cam.aspect=w/h; cam.updateProjectionMatrix();
  allMats.forEach(function(m){ m.userData.uni.uRes.value.set(RW,RH); });
}
addEventListener('resize',fit);
addEventListener('orientationchange',function(){ setTimeout(fit,260); });

function box(w,h,d,mat,x,y,z){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); scene.add(m); return m;
}
function plane(w,h,mat,x,y,z,rx,ry){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat);
  m.position.set(x,y,z);
  if(rx) m.rotation.x=rx; if(ry) m.rotation.y=ry;
  scene.add(m); return m;
}
function tiled(t,rx,ry){ const c=t.clone(); c.needsUpdate=true; c.repeat.set(rx,ry); return c; }

const WALLW=36, WALLH=24, ROOMD=30;

/* far wall: wainscot, chair rail, plaster, picture rail, frieze */
plane(WALLW, 4.0, ps1({map:tiled(T.oak,9,1.2), ambient:.30}),      0, 2.0,  -6, 0,0);
box (WALLW, 0.34, 0.5, ps1({map:tiled(T.oakLit,14,.2), ambient:.5}),0, 4.12, -5.78);
plane(WALLW, 6.2, ps1({map:tiled(T.plaster,7,1.4), ambient:.34}),  0, 7.3,  -6, 0,0);
box (WALLW, 0.3, 0.62, ps1({map:tiled(T.oakLit,14,.2), ambient:.52}),0,10.5, -5.72);
plane(WALLW, 7.4, ps1({map:tiled(T.plaster,7,1.6), ambient:.32}),  0,14.2,  -6, 0,0);
box (WALLW, 0.42, 0.7, ps1({map:tiled(T.oakLit,14,.2), ambient:.5}),0,18.1, -5.68);
plane(WALLW, 4.0, ps1({map:tiled(T.plaster,7,.9), ambient:.26}),   0,20.1,  -6, 0,0);

/* the wall at your back — the fixed camera never had to have one */
plane(WALLW, 4.0, ps1({map:tiled(T.oak,9,1.2), ambient:.26}),        0, 2.0,  24, 0, Math.PI);
box (WALLW, 0.34, 0.5, ps1({map:tiled(T.oakLit,14,.2), ambient:.44}),0, 4.12, 23.76);
plane(WALLW, 19.8, ps1({map:tiled(T.plaster,7,4), ambient:.20}),     0, 14.1, 24, 0, Math.PI);
box (WALLW, 0.3, 0.62, ps1({map:tiled(T.oakLit,14,.2), ambient:.46}),0,10.5,  23.7);

/* side walls, floor, ceiling with box beams */
plane(ROOMD, WALLH, ps1({map:tiled(T.plaster,6,4), ambient:.2}), -WALLW/2, WALLH/2, -6+ROOMD/2, 0, Math.PI/2);
plane(ROOMD, WALLH, ps1({map:tiled(T.plaster,6,4), ambient:.2}),  WALLW/2, WALLH/2, -6+ROOMD/2, 0,-Math.PI/2);
/* 8 boards per tile x 12 tiles across 36 units = 4.6in boards */
plane(WALLW, ROOMD, ps1({map:tiled(T.floor,12,3), ambient:.28}), 0, 0, -6+ROOMD/2, -Math.PI/2);
plane(WALLW, ROOMD, ps1({map:tiled(T.oak,8,7), ambient:.16}), 0, WALLH, -6+ROOMD/2, Math.PI/2);
for(let i=-2;i<=2;i++)
  box(1.5, 0.9, ROOMD, ps1({map:tiled(T.oak,.6,8), ambient:.2}), i*7.2, WALLH-0.45, -6+ROOMD/2);

/* ══════════════════════════════════════════════════════════════
   DOORS
   ══════════════════════════════════════════════════════════════ */
const targets=[];
DOORS.forEach(function(D){
  const open = !!D.file;
  const grp = new THREE.Group();
  grp.position.set(D.x, D.y, -5.55);

  const caseMat = ps1({map:tiled(T.oakLit,1.4,3), ambient:open?.5:.34});
  const slabMat = ps1({map:tiled(T.oak,1.2,2.4), ambient:open?.44:.28});
  const glMat   = ps1({map:glassTex(D.glass), ambient:1,
                       glow: open?0.82:0.10, jitter:1});

  /* casing */
  const cw=0.55;
  [[-(DW/2+cw/2),0,cw,DH+cw*2],[ (DW/2+cw/2),0,cw,DH+cw*2],
   [0, DH/2+cw/2, DW+cw*2, cw]].forEach(function(p){
    const m=new THREE.Mesh(new THREE.BoxGeometry(p[2],p[3],0.34), caseMat);
    m.position.set(p[0],p[1],0.04); grp.add(m);
  });

  /* slab + three lower panels + art glass light on top */
  const pivot=new THREE.Object3D();
  pivot.position.set(-DW/2, 0, 0);
  grp.add(pivot);

  const slab=new THREE.Mesh(new THREE.BoxGeometry(DW,DH,0.2), slabMat);
  slab.position.x = DW/2;
  pivot.add(slab);
  for(let i=0;i<3;i++){
    const p=new THREE.Mesh(new THREE.BoxGeometry(DW*0.74, DH*0.155, 0.08),
                           ps1({map:tiled(T.oakLit,1,.6), ambient:open?.46:.3}));
    p.position.set(DW/2, -DH*0.34 + i*DH*0.19, 0.12); pivot.add(p);
  }
  const gl=new THREE.Mesh(new THREE.PlaneGeometry(DW*0.7, DH*0.26), glMat);
  gl.position.set(DW/2, DH*0.28, 0.12); pivot.add(gl);

  const kn=new THREE.Mesh(new THREE.SphereGeometry(0.15,6,5),
                          ps1({map:T.oakLit, tint:new THREE.Color(1.4,1.1,.6), ambient:.7}));
  kn.position.set(DW*0.86, -0.2, 0.2); pivot.add(kn);

  /* Pure white behind the slab. Wider and taller than the opening so
     the casing hides its edges, but flush with the bottom of the door,
     where there is no casing to hide anything. Glow 1 means the shader
     neither shades nor fogs it, so it stays pure white at any distance. */
  const vd = new THREE.Mesh(new THREE.PlaneGeometry(DW+0.28, DH+0.14),
                            ps1({map:T.white, ambient:1, glow:1}));
  vd.position.set(0, 0.07, -0.13);
  vd.visible = false;
  grp.add(vd);

  /* The sign. The frieze rail crosses the wall at y=18.1 and stands
     0.7 proud of it, which is nearer the room than the sign face — so
     the upper doors' plates were sitting inside it with the lettering
     hidden. They get a shorter plate, hung lower, in the 1.29 units of
     clear wall between the door head and the rail. */
  const upper = D.y > 8;
  const sh = upper ? 0.95 : SIGNH;
  const sy = upper ? 3.80 : DH/2 + 1.35;
  const sg=new THREE.Mesh(new THREE.BoxGeometry(DW*1.06, sh, 0.2),
                          ps1({map:signTex(D.name, open), ambient:open?.72:.42}));
  sg.position.set(0, sy, 0.06); grp.add(sg);

  scene.add(grp);
  grp.userData={ door:D, glMat:glMat, pivot:pivot, open:open,
                 flash:0, sway:0, voidPanel:vd };
  targets.push(grp);
});

/* a hammered-copper lantern, and the light it throws */
const lantern=new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.9,2.2,6,1),
  ps1({map:T.oakLit, tint:new THREE.Color(2.4,1.7,.9), ambient:1, glow:.7}));
lantern.position.set(0,19.4,7); scene.add(lantern);

const moteMat=ps1({map:tex(8,8,function(g,w,h){
  g.clearRect(0,0,w,h); g.fillStyle='rgba(255,226,180,.9)'; g.fillRect(3,3,2,2);
}), cutout:.2, transparent:true, ambient:1, glow:.9, jitter:.2, depthWrite:false});
const motes=[];
for(let i=0;i<44;i++){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(.11,.11), moteMat);
  m.position.set(rnd(-15,15), rnd(1,20), rnd(-5,14));

/* ══════════════════════════════════════════════════════════════
   THE STAIR AND THE GALLERY

   The two upper doors sit with their sills at y=10.2 and nothing
   led to them, so the stair lands exactly there and the gallery
   runs along the far wall to reach both.

   Seventeen risers of 0.6 over a run of 15 — at this room's scale
   that is a 7.5in rise on an 11in tread, pitched 34 degrees, which
   is a stair you could actually build. Box newels and square
   balusters: Craftsman, not the turned spindles of a Victorian.
   ══════════════════════════════════════════════════════════════ */
const ST  = { x0:12.7, x1:17.9, zBot:13.2, zTop:-1.8, n:17, rise:0.6, top:10.2 };
ST.run = (ST.zBot - ST.zTop) / ST.n;
ST.ang = Math.atan2(ST.top - ST.rise, ST.zBot - ST.zTop);
const BAL = { x0:-7.9, x1:17.9, z0:-5.85, z1:-1.4, y:10.2 };
const RAILH = 2.75, GRAIL = 2.9;

/* the handrail follows the nosings, so baluster lengths vary a little */
function stairRailY(z){
  return ST.rise + (ST.zBot - z)/(ST.zBot - ST.zTop)*(ST.top - ST.rise) + RAILH;
}

(function buildStair(){
  const W = ST.x1 - ST.x0, cx = (ST.x0 + ST.x1)/2;
  const tread = ps1({ map:tiled(T.oakLit,1.7,.45), ambient:.46 });
  const riser = ps1({ map:tiled(T.oak,1.5,.5),     ambient:.26 });
  const trim  = ps1({ map:tiled(T.oakLit,1,1),     ambient:.44 });
  const dark  = ps1({ map:tiled(T.oak,2.5,2.5),    ambient:.17 });

  function put(g,m,x,y,z,rx){
    const o = new THREE.Mesh(g,m);
    o.position.set(x,y,z);
    if(rx) o.rotation.x = rx;
    scene.add(o); return o;
  }

  /* treads, with a bullnose over each riser */
  const tg = new THREE.BoxGeometry(W, 0.17, ST.run + 0.16);
  const rg = new THREE.BoxGeometry(W, ST.rise, 0.11);
  for(let i=0;i<ST.n;i++){
    const y = (i+1)*ST.rise, z = ST.zBot - i*ST.run;
    put(tg, tread, cx, y - 0.085, z - ST.run/2 + 0.08);
    put(rg, riser, cx, y - ST.rise/2, z - 0.055);
  }

  /* the raked stringer on the open side, parallel to the nosings */
  const len = Math.sqrt(Math.pow(ST.top-ST.rise,2) + Math.pow(ST.zBot-ST.zTop,2));
  put(new THREE.BoxGeometry(0.24, 1.2, len + 0.7), trim,
      ST.x0 - 0.12,
      (ST.rise + ST.top)/2 - 0.6/Math.cos(ST.ang),
      (ST.zBot + ST.zTop)/2, ST.ang);

  /* close the open side, and the wall under the top of the flight */
  const sg = new THREE.BufferGeometry();
  sg.setAttribute('position', new THREE.Float32BufferAttribute([
    ST.x0,0,ST.zBot,  ST.x0,0,ST.zTop,  ST.x0,ST.top,ST.zTop ],3));
  sg.setAttribute('uv', new THREE.Float32BufferAttribute([0,0, 1,0, 1,1],2));
  sg.computeVertexNormals();
  scene.add(new THREE.Mesh(sg, ps1({ map:tiled(T.oak,3,3), ambient:.16,
                                     side:THREE.DoubleSide })));
  put(new THREE.BoxGeometry(W, ST.top, 0.2), dark, cx, ST.top/2, ST.zTop - 0.1);

  /* ── the gallery ─────────────────────────────────────────── */
  const BW = BAL.x1 - BAL.x0, BD = BAL.z1 - BAL.z0;
  const bcx = (BAL.x0 + BAL.x1)/2, bcz = (BAL.z0 + BAL.z1)/2;
  put(new THREE.BoxGeometry(BW, 0.22, BD),
      ps1({ map:tiled(T.floor, BW/3, BD/10), ambient:.30 }),
      bcx, BAL.y - 0.11, bcz);
  put(new THREE.BoxGeometry(BW, 0.52, BD - 0.1), dark, bcx, BAL.y - 0.48, bcz);
  put(new THREE.BoxGeometry(BW, 0.66, 0.36), trim, bcx, BAL.y - 0.56, BAL.z1 + 0.18);

  /* posts carrying the gallery, set in the gaps between the lower doors
     and lined up under the two upper ones */
  [-5.1, 5.1].forEach(function(x){
    const ph = BAL.y - 0.9;
    put(new THREE.BoxGeometry(0.64, ph, 0.64), trim, x, ph/2, BAL.z1 - 0.42);
    put(new THREE.BoxGeometry(0.94, 0.3, 0.94), trim, x, ph + 0.15, BAL.z1 - 0.42);
  });

  /* ── box newels ──────────────────────────────────────────── */
  function newel(x, z, base, h){
    put(new THREE.BoxGeometry(0.78, h, 0.78), trim, x, base + h/2, z);
    put(new THREE.BoxGeometry(1.04, 0.14, 1.04), trim, x, base + h + 0.07, z);
    put(new THREE.BoxGeometry(0.68, 0.2, 0.68), trim, x, base + h + 0.24, z);
  }
  newel(ST.x0,  ST.zBot,      0,     3.95);
  newel(ST.x0,  BAL.z1,       BAL.y, 3.10);
  newel(BAL.x0, BAL.z1,       BAL.y, 3.10);
  newel(BAL.x0, BAL.z0 + 0.4, BAL.y, 3.10);

  /* ── square balusters, one to a tread ───────────────────── */
  const bg = new THREE.BoxGeometry(0.17, 1, 0.17);
  function baluster(x, z, y0, y1){
    const o = new THREE.Mesh(bg, trim);
    o.position.set(x, (y0+y1)/2, z);
    o.scale.y = y1 - y0;
    scene.add(o);
  }
  for(let i=0;i<ST.n;i++){
    const z = ST.zBot - (i + 0.45)*ST.run;
    baluster(ST.x0, z, (i+1)*ST.rise, stairRailY(z));
  }
  /* the raked handrail */
  put(new THREE.BoxGeometry(0.36, 0.22, len + 0.5), trim,
      ST.x0, (stairRailY(ST.zBot) + stairRailY(ST.zTop))/2,
      (ST.zBot + ST.zTop)/2, ST.ang);

  /* gallery rail, along the open edge and round the end */
  for(let x = BAL.x0 + 0.62; x < ST.x0 - 0.5; x += 0.62)
    baluster(x, BAL.z1, BAL.y, BAL.y + GRAIL);
  put(new THREE.BoxGeometry(ST.x0 - BAL.x0, 0.22, 0.36), trim,
      (BAL.x0 + ST.x0)/2, BAL.y + GRAIL + 0.11, BAL.z1);
  for(let z = BAL.z0 + 0.9; z < BAL.z1 - 0.4; z += 0.62)
    baluster(BAL.x0, z, BAL.y, BAL.y + GRAIL);
  put(new THREE.BoxGeometry(0.36, 0.22, BAL.z1 - BAL.z0 - 0.4), trim,
      BAL.x0, BAL.y + GRAIL + 0.11, (BAL.z0 + BAL.z1)/2 - 0.2);
})();

  t.magFilter = t.minFilter = THREE.NearestFilter;
  t.generateMipmaps = false;
  /* clamped, not repeated — these are not power-of-two */
  t.wrapS = t.wrapT = THREE.ClampToEdgeWrapping;
  im.onload = function(){ t.needsUpdate = true; };
  im.src = srcUri;
  return t;
}

const arts = [];
(function hang(){
  const PW = 3.2, PH = PW*4/3, FW = 0.42, FD = 0.26;
  const RAILY = 10.5;

  /* a picture rail down each side wall, to hang them from */
  [-1, 1].forEach(function(s){

        s*(WALLW/2 - 0.25), RAILY, -6 + ROOMD/2);

  [['bleat', 15], ['peep', 9], ['reh', 3]].forEach(function(p){

                       tint:new THREE.Color(1.08,0.97,0.84) });

    /* the four members of the frame */
    [[0,  PH/2+FW/2, PW+FW*2, FW],

    const lip = new THREE.Mesh(new THREE.BoxGeometry(PW+0.16, PH+0.16, 0.1), lmat);
    lip.position.z = -0.02; g.add(lip);
    const ph = new THREE.Mesh(new THREE.PlaneGeometry(PW, PH), pmat);
    ph.position.z = 0.05; g.add(ph);

    /* picture wire, up to a hook on the rail */
    const dy = RAILY - y - (PH/2 + FW), dx = PW*0.34;

      w.position.set(s*dx/2, PH/2 + FW + dy/2, 0.28);
      w.rotation.z = s*th;
      g.add(w);
    });
    const hk = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.34, 0.2), fmat);
    hk.position.set(0, PH/2 + FW + dy + 0.1, 0.28); g.add(hk);

    /* a small brass picture light over each */
    const pl = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.22, 0.44),
      ps1({ map:T.oakLit, tint:new THREE.Color(2.3,1.7,0.9), ambient:1, glow:.72 }));
    pl.position.set(0, PH/2 + FW + 0.34, 0.40); g.add(pl);
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.14, 0.5), fmat);
    arm.position.set(0, PH/2 + FW + 0.34, 0.18); g.add(arm);

    g.userData = { cat:key, flash:0 };
    scene.add(g); arts.push(g);
  });
})();

/* ══════════════════════════════════════════════════════════════
   SOUND — a room tone, and a chord per door
   ══════════════════════════════════════════════════════════════ */
let ac=null, master=null, verbIn=null, ready=false;
function initAudio(){
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC) return false;
  ac=new AC();
  master=ac.createGain(); master.gain.value=0.0001;
  const comp=ac.createDynamicsCompressor();
  comp.threshold.value=-16; comp.ratio.value=4;
  master.connect(comp); comp.connect(ac.destination);
  master.gain.setTargetAtTime(0.85, ac.currentTime, 0.8);

  const n=ac.sampleRate*4, b=ac.createBuffer(2,n,ac.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=b.getChannelData(ch);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2.4);
  }
  const conv=ac.createConvolver(); conv.buffer=b;
  const lv=ac.createGain(); lv.gain.value=.6;
  verbIn=ac.createGain(); verbIn.connect(conv); conv.connect(lv); lv.connect(master);

  /* the sound of an empty old house */
  const nb=ac.createBuffer(1, ac.sampleRate*4, ac.sampleRate);
  const nd=nb.getChannelData(0); let last=0;
  for(let i=0;i<nd.length;i++){ last=last*0.93+(Math.random()*2-1)*0.07; nd[i]=last*4; }
  const ns=ac.createBufferSource(); ns.buffer=nb; ns.loop=true;
  const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=210;
  const ng=ac.createGain(); ng.gain.value=0.09;
  ns.connect(lp); lp.connect(ng); ng.connect(master); ns.start();
  [49,49.3,73.5].forEach(function(f){
    const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f;
    const g=ac.createGain(); g.gain.value=0.022;
    o.connect(g); g.connect(master); o.start();
  });
  return true;
}
function chord(semis, open){
  if(!ready) return;
  const t=ac.currentTime+0.01;
  /* the latch, whatever happens */
  const nb=ac.createBuffer(1,2000,ac.sampleRate), nd=nb.getChannelData(0);
  for(let i=0;i<2000;i++) nd[i]=(Math.random()*2-1)*Math.pow(1-i/2000,7);
  const ns=ac.createBufferSource(); ns.buffer=nb;
  const nf=ac.createBiquadFilter(); nf.type='bandpass';
  nf.frequency.value=open?2300:1500; nf.Q.value=3;
  const ng=ac.createGain(); ng.gain.value=open?0.26:0.16;
  ns.connect(nf); nf.connect(ng); ng.connect(master); ng.connect(verbIn); ns.start(t);
  if(!open) return;
  [0,7,12,19].forEach(function(iv,i){
    const o=ac.createOscillator(); o.type=i<2?'triangle':'sine';
    o.frequency.value=110*Math.pow(2,(semis+iv)/12);
    const f=ac.createBiquadFilter(); f.type='lowpass';
    f.frequency.setValueAtTime(700,t); f.frequency.linearRampToValueAtTime(2600,t+0.6);
    const g=ac.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(0.13/(1+i*0.5), t+0.06+i*0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t+2.6);
    o.connect(f); f.connect(g); g.connect(master); g.connect(verbIn);
    o.start(t); o.stop(t+2.7);
  });
}

/* ══════════════════════════════════════════════════════════════
   THREE VOICES
   A meow is a mouth opening and closing on a voiced tone — the
   formants ride up as the jaw drops and back down as it shuts.
   All three share that; what separates them is the contours.

   The first bleats because the whole tone is shaken at 9Hz, which
   is what a sheep does and almost nothing else. The second peeps
   because it is short, high, and opens almost before it starts.
   The third is low, barely opens at all, and carries a subharmonic
   underneath so it lands rough rather than sung.
   ══════════════════════════════════════════════════════════════ */
const CATS = {
  bleat:{ f0:395, dur:1.15, atk:.12, amp:.30, bright:1.00, rough:.10,
    pitch:[[0,.70],[.14,1.06],[.45,1.00],[.78,.92],[1,.60]],
    open: [[0,.10],[.22,1.00],[.62,.86],[1,.12]],
    form: [[760,5,1.00],[1620,6,.62],[2850,7,.22]],
    trem: { rate:9.4, amp:.46, pitch:.030 } },

  peep: { f0:735, dur:.60, atk:.06, amp:.26, bright:1.55, rough:.04,
    pitch:[[0,.86],[.10,1.30],[.34,1.06],[1,.74]],
    open: [[0,.30],[.14,1.00],[.52,.78],[1,.16]],
    form: [[1060,5,1.00],[2210,6,.66],[3420,7.5,.30]],
    trem: { rate:6.2, amp:.13, pitch:.012 } },

  reh:  { f0:232, dur:.58, atk:.035, amp:.36, bright:.66, rough:.36,
    pitch:[[0,.88],[.09,1.08],[.40,1.00],[1,.80]],
    open: [[0,.22],[.16,.72],[.55,.62],[1,.14]],
    form: [[610,4,1.00],[1340,5,.58],[2480,6,.18]],
    trem: { rate:24, amp:.18, pitch:.020 } }      /* creak, not bleat */
};

const _cv = new THREE.Vector3(), _cq = new THREE.Quaternion();
function panFor(obj){
  obj.getWorldPosition(_cv);
  _cv.sub(cam.position).applyQuaternion(_cq.copy(cam.quaternion).invert());
  const l = Math.max(0.001, Math.sqrt(_cv.x*_cv.x + _cv.z*_cv.z));
  return Math.max(-1, Math.min(1, _cv.x/l));
}

function meow(kind, obj){
  if(!ready) return;
  const C = CATS[kind]; if(!C) return;
  const t0 = ac.currentTime + 0.01;
  /* no cat says it exactly the same way twice */
  const D  = C.dur * (0.94 + Math.random()*0.12);
  const f0 = C.f0  * (0.96 + Math.random()*0.08);

  const o = ac.createOscillator(); o.type = 'sawtooth';
  const F = o.frequency;
  F.setValueAtTime(f0*C.pitch[0][1], t0);
  for(let i=1;i<C.pitch.length;i++)
    F.exponentialRampToValueAtTime(f0*C.pitch[i][1], t0 + D*C.pitch[i][0]);

  const tr = ac.createOscillator(); tr.type = 'sine';
  tr.frequency.value = C.trem.rate;
  const tp = ac.createGain(); tp.gain.value = f0*C.trem.pitch;
  tr.connect(tp); tp.connect(F);

  const src = ac.createGain(); src.gain.value = 1;
  o.connect(src);
  let sub = null;
  if(C.rough > 0.01){
    sub = ac.createOscillator(); sub.type = 'square';
    sub.frequency.setValueAtTime(f0*C.pitch[0][1]*0.5, t0);
    for(let i=1;i<C.pitch.length;i++)
      sub.frequency.exponentialRampToValueAtTime(f0*C.pitch[i][1]*0.5, t0 + D*C.pitch[i][0]);
    const sg = ac.createGain(); sg.gain.value = C.rough;
    sub.connect(sg); sg.connect(src);
  }

  /* the mouth */
  const sum = ac.createGain(); sum.gain.value = 1;
  C.form.forEach(function(fm){
    const bp = ac.createBiquadFilter(); bp.type='bandpass'; bp.Q.value = fm[1];
    bp.frequency.setValueAtTime(fm[0]*(0.55 + 0.45*C.open[0][1]), t0);
    for(let i=1;i<C.open.length;i++)
      bp.frequency.linearRampToValueAtTime(fm[0]*(0.55 + 0.45*C.open[i][1]), t0 + D*C.open[i][0]);
    const g = ac.createGain(); g.gain.value = fm[2];
    src.connect(bp); bp.connect(g); g.connect(sum);
  });
  const lp = ac.createBiquadFilter(); lp.type='lowpass'; lp.Q.value = 0.9;
  lp.frequency.setValueAtTime(560 + 2600*C.open[0][1]*C.bright, t0);
  for(let i=1;i<C.open.length;i++)
    lp.frequency.linearRampToValueAtTime(560 + 2600*C.open[i][1]*C.bright, t0 + D*C.open[i][0]);
  const bodyG = ac.createGain(); bodyG.gain.value = 0.55;
  src.connect(lp); lp.connect(bodyG); bodyG.connect(sum);

  const env = ac.createGain();
  env.gain.setValueAtTime(0.0001, t0);
  env.gain.exponentialRampToValueAtTime(C.amp, t0 + D*C.atk);
  env.gain.exponentialRampToValueAtTime(C.amp*0.70, t0 + D*0.72);
  env.gain.exponentialRampToValueAtTime(0.0001, t0 + D*1.04);

  /* the shake rides on the level, which is what makes a bleat a bleat */
  const shake = ac.createGain(); shake.gain.value = 1;
  const sd = ac.createGain(); sd.gain.value = C.trem.amp;
  tr.connect(sd); sd.connect(shake.gain);

  const pn = ac.createStereoPanner ? ac.createStereoPanner() : null;
  sum.connect(env); env.connect(shake);
  if(pn){ pn.pan.value = obj ? panFor(obj) : 0; shake.connect(pn); pn.connect(master); }
  else shake.connect(master);
  const send = ac.createGain(); send.gain.value = 0.30;
  shake.connect(send); send.connect(verbIn);

  o.start(t0);  o.stop(t0 + D*1.12);
  tr.start(t0); tr.stop(t0 + D*1.12);
  if(sub){ sub.start(t0); sub.stop(t0 + D*1.12); }
}

/* ══════════════════════════════════════════════════════════════
   LOOK + CHOOSE
   ══════════════════════════════════════════════════════════════ */
let yaw=0, pitch=0.02, tYaw=0, tPitch=0.02;
let lookId=null, lx=0, ly=0, moved=0, at=0;
const ray=new THREE.Raycaster(), ndc=new THREE.Vector2();
const plate=document.getElementById('plate');
let leaving=false;

cv.addEventListener('touchstart',function(e){
  e.preventDefault(); if(lookId!==null) return;
  const t=e.changedTouches[0];
  lookId=t.identifier; lx=t.clientX; ly=t.clientY; moved=0; at=performance.now();
},{passive:false});
cv.addEventListener('touchmove',function(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==lookId) continue;
    const dx=t.clientX-lx, dy=t.clientY-ly;
    moved+=Math.hypot(dx,dy);
    tYaw  -= dx*0.0032;                       /* no longer penned in */
    tPitch = Math.max(-0.95, Math.min(0.90, tPitch - dy*0.0032));
    lx=t.clientX; ly=t.clientY;
  }
},{passive:false});
['touchend','touchcancel'].forEach(function(ev){
  cv.addEventListener(ev,function(e){
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier!==lookId) continue;
      if(moved<12 && performance.now()-at<400) pick(t.clientX,t.clientY);
      lookId=null;
    }
  },{passive:false});
});
let md=false,mmv=0,mx=0,my=0;
cv.addEventListener('mousedown',function(e){ md=true; mx=e.clientX; my=e.clientY; mmv=0; });
cv.addEventListener('mousemove',function(e){
  if(!md) return;
  const dx=e.clientX-mx, dy=e.clientY-my; mmv+=Math.hypot(dx,dy);
  tYaw  -= dx*0.0032;
  tPitch = Math.max(-0.95, Math.min(0.90, tPitch - dy*0.0032));
  mx=e.clientX; my=e.clientY;
});
addEventListener('mouseup',function(e){ if(md&&mmv<8) pick(e.clientX,e.clientY); md=false; });
document.addEventListener('gesturestart',function(e){ e.preventDefault(); });

/* ══════════════════════════════════════════════════════════════
   WALKING
   Height comes from whatever surface is under you that a stride
   could actually reach. That one rule does the whole job: you can
   climb the stair a step at a time, you cannot step up onto the
   gallery from underneath it, and you cannot walk off the edge of
   it, because the drop back to the floor is further than a stride.
   ══════════════════════════════════════════════════════════════ */
const EYE = 5.4, STEP = 0.95, SPEED = 7.5;
const move = { x:0, y:0 };
let stickId = null, feet = 0, camY = EYE, bob = 0;

function stairY(x, z){
  if(x < ST.x0 || x > ST.x1) return null;
  if(z > ST.zBot || z < ST.zTop) return null;
  return Math.min(ST.top, (Math.floor((ST.zBot - z)/ST.run) + 1) * ST.rise);
}
function galleryY(x, z){
  if(x < BAL.x0 || x > BAL.x1) return null;
  if(z < BAL.z0 || z > BAL.z1) return null;
  return BAL.y;
}
function groundAt(x, z, from){
  let g = 0;                                  /* the floor is always there */
  const s = stairY(x, z);
  if(s !== null && s <= from + STEP && s > g) g = s;
  const b = galleryY(x, z);
  if(b !== null && b <= from + STEP && b > g) g = b;
  return g;
}
function tryStep(nx, nz){
  const cx = Math.max(-16.4, Math.min(17.1, nx));   /* clear of the picture lights */
  const cz = Math.max( -4.6, Math.min(23.3, nz));   /* near plane is 0.3 */
  const g = groundAt(cx, cz, feet);
  if(g < feet - STEP) return false;           /* that would be a fall */
  cam.position.x = cx; cam.position.z = cz; feet = g;
  return true;
}

const stick = document.getElementById('stick');
const knob  = document.getElementById('knob');
const SR = 44;
function stickSet(t){
  const r = stick.getBoundingClientRect();
  let dx = t.clientX - (r.left + r.width/2);
  let dy = t.clientY - (r.top  + r.height/2);
  const d = Math.hypot(dx,dy);
  if(d > SR){ dx = dx/d*SR; dy = dy/d*SR; }
  knob.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
  move.x = dx/SR; move.y = dy/SR;
}
function stickClear(){
  knob.style.transform = ''; move.x = move.y = 0;
  stick.classList.remove('on'); stickId = null;
}
stick.addEventListener('touchstart', function(e){
  e.preventDefault(); e.stopPropagation();
  const t = e.changedTouches[0];
  stickId = t.identifier; stick.classList.add('on'); stickSet(t);
}, {passive:false});
stick.addEventListener('touchmove', function(e){
  e.preventDefault(); e.stopPropagation();
  for(const t of e.changedTouches) if(t.identifier === stickId) stickSet(t);
}, {passive:false});
['touchend','touchcancel'].forEach(function(ev){
  stick.addEventListener(ev, function(e){
    e.preventDefault(); e.stopPropagation();
    for(const t of e.changedTouches) if(t.identifier === stickId) stickClear();
  }, {passive:false});
});

const keys = {};
addEventListener('keydown', function(e){ keys[e.key.toLowerCase()] = true; });
addEventListener('keyup',   function(e){ keys[e.key.toLowerCase()] = false; });

function walk(dt){
  let ix = move.x, iy = move.y;
  if(keys['w']||keys['arrowup'])    iy -= 1;
  if(keys['s']||keys['arrowdown'])  iy += 1;
  if(keys['a']||keys['arrowleft'])  ix -= 1;
  if(keys['d']||keys['arrowright']) ix += 1;
  const mag = Math.min(1, Math.hypot(ix,iy));

  if(mag > 0.04){
    const sp = SPEED*dt*mag, h = Math.hypot(ix,iy) || 1;
    const nx = ix/h, ny = iy/h;
    const fx = -Math.sin(yaw), fz = -Math.cos(yaw);
    const rx =  Math.cos(yaw), rz = -Math.sin(yaw);
    const dx = (fx*(-ny) + rx*nx)*sp;
    const dz = (fz*(-ny) + rz*nx)*sp;
    const px = cam.position.x, pz = cam.position.z;
    /* try the whole move, then each axis alone, so you slide along
       a rail or a wall instead of sticking to it */
    if(!tryStep(px+dx, pz+dz)){
      if(!tryStep(px+dx, pz)) tryStep(px, pz+dz);
    }
    bob += sp*0.9;
  }
  /* ease the eye up the risers rather than snapping a step at a time */
  camY += (feet + EYE - camY) * Math.min(1, dt*11);
  cam.position.y = camY + Math.sin(bob*1.9)*0.085*mag;
}

function pick(cx,cy){
  if(leaving) return;
  ndc.x=(cx/innerWidth)*2-1; ndc.y=-(cy/innerHeight)*2+1;
  ray.setFromCamera(ndc,cam);
  const hits=ray.intersectObjects(targets.concat(arts),true);
  if(!hits.length) return;
  let g=hits[0].object;
  while(g && !g.userData.door && !g.userData.cat) g=g.parent;
  if(!g) return;

  if(g.userData.cat){
    meow(g.userData.cat, g);
    g.userData.flash=1;
    const L=CATLABEL[g.userData.cat];
    plate.innerHTML = L[0] + '<small>' + L[1] + '</small>';
    plate.classList.add('on');
    clearTimeout(plate._t);
    plate._t=setTimeout(function(){ plate.classList.remove('on'); }, 2600);
    return;
  }

  const D=g.userData.door, i=DOORS.indexOf(D);
  chord([-5,0,3,7,10][i]||0, g.userData.open);
  g.userData.flash=1;

  plate.innerHTML = D.name + '<small>' +
    (g.userData.open ? D.blurb : D.blurb + ' — not built yet') + '</small>';
  plate.classList.add('on');
  clearTimeout(plate._t);
  plate._t=setTimeout(function(){ plate.classList.remove('on'); }, 2600);

  if(!g.userData.open) return;
  leaving=true;
  g.userData.sway=1;
  /* hold the fade back a moment, so you see the door open onto the
     white before the white takes the whole screen */
  const fd=document.getElementById('fade');
  setTimeout(function(){ fd.classList.add('on'); }, 340);
  setTimeout(function(){ location.href = D.file; }, 1150);
}

/* ══════════════════════════════════════════════════════════════
   LOOP
   ══════════════════════════════════════════════════════════════ */
const clock=new THREE.Clock();
function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),0.05), t=clock.elapsedTime;

  yaw   += (tYaw-yaw)*Math.min(1,dt*6);
  pitch += (tPitch-pitch)*Math.min(1,dt*6);
  cam.rotation.y = yaw;
  cam.rotation.x = pitch;
  walk(dt);

  targets.forEach(function(g){
    const u=g.userData;
    /* lit glass breathes; dark glass stays dark */
    const base=u.open?0.82:0.10;
    u.glMat.userData.uni.uGlow.value =
      base + (u.open ? Math.sin(t*0.9 + g.position.x)*0.07 : 0) + u.flash*0.15;
    if(u.flash>0){
      u.flash=Math.max(0,u.flash-dt*1.7);
      g.traverse(function(m){
        if(m.material && m.material.userData && m.material.userData.uni)
          m.material.userData.uni.uFlash.value=u.flash*0.34;
      });
    }
    if(u.sway>0){                       /* the door swings before you go through */
      if(u.voidPanel) u.voidPanel.visible=true;
      u.sway=Math.min(1, u.sway+dt*1.15);
      const e=1-Math.pow(1-u.sway,3);   // ease out, like a heavy door
      u.pivot.rotation.y = -e*1.25;
    }
  });

  arts.forEach(function(g){
    const u=g.userData;
    if(u.flash>0){
      u.flash=Math.max(0,u.flash-dt*1.9);
      g.traverse(function(m){
        if(m.material && m.material.userData && m.material.userData.uni)
          m.material.userData.uni.uFlash.value=u.flash*0.30;
      });
    }
  });

  motes.forEach(function(m){
    const u=m.userData;
    m.position.y += u.sp*dt;
    m.position.x += Math.sin(t*0.5+u.ph)*dt*0.35;
    if(m.position.y>21) m.position.y=0.6;
    m.lookAt(cam.position);
  });

  lantern.rotation.y=t*0.12;
  allMats.forEach(function(m){ m.userData.uni.uTime.value=t; });
  renderer.render(scene,cam);
}

document.getElementById('go').addEventListener('click',function(){
  if(!ready){ try{ ready=initAudio(); }catch(e){ ready=false; }
    if(ready && ac.state==='suspended') ac.resume(); }
  const s=document.getElementById('start');
  s.classList.add('gone');
  setTimeout(function(){ s.style.display='none'; },1250);
});
document.addEventListener('visibilitychange',function(){
  if(!ac) return;
  if(document.hidden) ac.suspend(); else ac.resume();
});

fit(); tick();
})();
</script>
</body>
